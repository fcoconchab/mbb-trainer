  function handleFitClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    if (target.disabled) return;
    const action = target.dataset.action;
    // ── M9: gimnasio FIT. Prefijo propio fitgym- (los fit-* son congelados). ──
    if (action === 'fitgym-open') {
      // Entrada al picker desde la biblioteca, desde el reveal ("otra pregunta")
      // o post-grade. Siempre estado fresco: rep a medias = abandono = cero señal.
      resetFitgym();
      fitState.view = 'gym';
      renderFit();
      const sh = document.getElementById('scroll-host');
      if (sh) sh.scrollTop = 0;
      return;
    }
    if (action === 'fitgym-exit') {
      // Salida a la biblioteca (2ª salida del timer). Sin grade previo = cero señal.
      resetFitgym();
      fitState.view = 'list';
      fitState.questionIdx = null;
      renderFit();
      return;
    }
    if (action === 'fitgym-start') {
      const bank = target.dataset.bank === 'base' ? 'base' : 'mc';
      const idx = parseInt(target.dataset.index, 10);
      const pool = bank === 'mc' ? FIT_MC : FIT_QUESTIONS;
      if (isNaN(idx) || !pool[idx]) return;
      resetFitgym();
      fitgymState.view = 'rep';
      fitgymState.bank = bank;
      fitgymState.idx = idx;
      renderFit();               // pinta la rep; renderFit arranca el timer (idempotente)
      startFitgymRecording();    // degrade limpio a "sin micrófono" si no hay API/permiso
      const sh = document.getElementById('scroll-host');
      if (sh) sh.scrollTop = 0;
      return;
    }
    if (action === 'fitgym-back') {
      // Cancelar la rep → picker. Abandono: timer + media mueren, cero señal.
      resetFitgym();
      renderFit();
      return;
    }
    if (action === 'fitgym-stop') {
      if (fitgymState.view !== 'rep') return;
      stopFitgymTimer();
      fitgymState.overTime = fitgymState.startMs ? ((Date.now() - fitgymState.startMs) / 1000 > FITGYM_LIMIT_SEC) : false;
      fitgymState.view = 'reveal';
      stopFitgymRecording();     // el onstop llega async y re-pinta el reveal con el playback
      renderFit();
      const sh = document.getElementById('scroll-host');
      if (sh) sh.scrollTop = 0;
      return;
    }
    if (action === 'fitgym-check') {
      if (fitgymState.view !== 'reveal' || fitgymState.graded) return;
      const k = target.dataset.k;
      if (!(k in fitgymState.checks)) return;
      fitgymState.checks[k] = !fitgymState.checks[k];
      renderFit();
      return;
    }
    if (action === 'fitgym-grade') {
      if (fitgymState.view !== 'reveal' || fitgymState.graded) return;   // guard del commit único
      const c = fitgymState.checks;
      const n = (c.s?1:0) + (c.t?1:0) + (c.a?1:0) + (c.r?1:0) + (c.trapOk?1:0);
      fitgymState.pass = n >= 4;                                          // pass = ≥4 de 5 binarios
      fitgymState.graded = true;
      recordStepStat('fit', fitgymState.pass);                            // ÚNICO punto de señal del gym
      renderFit();
      return;
    }
    if (action === 'fit-open') {
      fitState.view = 'detail';
      fitState.questionIdx = parseInt(target.dataset.index, 10);
      renderFit();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    if (action === 'fit-back') {
      fitState.view = 'list';
      fitState.questionIdx = null;
      renderFit();
      return;
    }
    if (action === 'fit-prev') {
      if (fitState.questionIdx > 0) {
        fitState.questionIdx -= 1;
        renderFit();
        const scrollHost = document.getElementById('scroll-host');
        if (scrollHost) scrollHost.scrollTop = 0;
      }
      return;
    }
    if (action === 'fit-next') {
      if (fitState.questionIdx < FIT_QUESTIONS.length - 1) {
        fitState.questionIdx += 1;
        renderFit();
        const scrollHost = document.getElementById('scroll-host');
        if (scrollHost) scrollHost.scrollTop = 0;
      }
      return;
    }
  }

  // ============================================================
  // PROGRESS TAB — analytics, mastery breakdown, reset
  // ============================================================
  let progressMounted = false;
  let progressResetConfirm = false;
  let progressImportPending = null;   // F3: JSON parseado y validado, esperando confirmación (memory only)
  let progressImportError = '';       // F3: error de 1 línea del último intento de import (memory only)

  function renderProgress() {
    const root = document.getElementById('progress-root');
    if (!root) return;
    root.innerHTML = renderProgressBody();
    if (!progressMounted) {
      root.addEventListener('click', handleProgressClick);
      root.addEventListener('change', handleProgressImportFile);  // F3: change burbujea desde el file input (delegado — el input se re-crea en cada render)
      progressMounted = true;
    }
  }

  // F3 — lee el archivo elegido, valida sentinelas del state y deja el objeto en pending (la escritura
  // solo pasa tras confirmación explícita). JSON inválido o sin sentinelas → error de 1 línea, no importa nada.
  function handleProgressImportFile(e) {
    const input = e.target && e.target.closest ? e.target.closest('[data-role="import-file"]') : null;
    if (!input || !input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function () {
      let parsed = null;
      try { parsed = JSON.parse(reader.result); } catch (err) { parsed = null; }
      const isObj = v => v && typeof v === 'object' && !Array.isArray(v);
      const ok = isObj(parsed) && isObj(parsed.mathPats) && isObj(parsed.stepStats) && isObj(parsed.drillHistory);
      if (!ok) {
        progressImportError = 'Archivo inválido — no parece un respaldo de MBB Trainer.';
        progressImportPending = null;
      } else {
        progressImportError = '';
        progressImportPending = parsed;
      }
      renderProgress();
    };
    reader.onerror = function () {
      progressImportError = 'No se pudo leer el archivo.';
      progressImportPending = null;
      renderProgress();
    };
    reader.readAsText(file);
    input.value = '';
  }

  function findWeakestBranch() {
    let weakest = null;
    for (const f of FRAMEWORKS) {
      const fw = FRAMEWORK_DATA[f.id];
      for (const b of fw.branches) {
        const m = branchMastery(f.id, b.id);
        if (!weakest || m.score < weakest.score) {
          weakest = {
            score: m.score,
            attempts: m.attempts,
            fwId: f.id,
            fwName: fw.name,
            branchId: b.id,
            branchName: b.name,
            fwColor: f.color
          };
        }
      }
    }
    return weakest;
  }

  function renderProgressBody() {
    const totalCases = (state.completedCases || []).length;
    const totalDrillsN = totalDrills();
    const streak = state.streakDays || 0;
    const weakest = findWeakestBranch();

    let html = `
      <div class="cases-header">
        <div class="cases-title">Avance</div>
        <div class="cases-subtitle">Tu posición real en cada drill, caso y rama de framework. Sin métricas de vanidad — solo dónde estás realmente.</div>
      </div>

      <div class="progress-header">
        <div class="progress-tile">
          <div class="progress-tile-value">${streak}</div>
          <div class="progress-tile-label">Racha de días</div>
        </div>
        <div class="progress-tile">
          <div class="progress-tile-value">${totalCases}</div>
          <div class="progress-tile-label">Casos hechos</div>
        </div>
        <div class="progress-tile">
          <div class="progress-tile-value">${totalDrillsN}</div>
          <div class="progress-tile-label">Drills hechos</div>
        </div>
      </div>
    `;

    // Weakest branch callout
    if (weakest && weakest.attempts > 0) {
      html += `
        <div class="weakest-callout">
          <div class="weakest-label">Rama más débil — drillea esta ahora</div>
          <div class="weakest-branch">${escapeHtml(weakest.fwName)} · ${escapeHtml(weakest.branchName)}</div>
          <div class="weakest-body">Dominio ${weakest.score}% tras ${weakest.attempts} intento${weakest.attempts === 1 ? '' : 's'}. Abre el framework en <strong>Teoría</strong> y relee esta rama, después reintenta recall mañana.</div>
        </div>
      `;
    }

    // Framework mastery with branch breakdown
    html += `<div class="progress-section-title">Dominio de frameworks</div>`;
    html += FRAMEWORKS.map(f => {
      const fw = FRAMEWORK_DATA[f.id];
      const fwMastery = frameworkMastery(f.id);
      return `
        <div class="progress-fw-card">
          <div class="progress-fw-head">
            <span class="color-dot color-dot-md" style="background:${f.color}"></span>
            <span class="progress-fw-name">${escapeHtml(fw.name)}</span>
            <span class="progress-fw-pct">${fwMastery}%</span>
          </div>
          <div class="progress-fw-bar"><div class="progress-fw-bar-fill" style="width:${fwMastery}%;background:${f.color}"></div></div>
          <div class="progress-branches">
            ${fw.branches.map(b => {
              const bm = branchMastery(f.id, b.id);
              return `
                <div class="progress-branch">
                  <span class="progress-branch-dot" style="background:${b.dot}"></span>
                  <span class="progress-branch-name">${escapeHtml(b.name)}</span>
                  <span class="progress-branch-score">${bm.score}%</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }).join('');

    // Drill history per type
    const drillTypes = [
      { key: 'hypothesis', label: 'Hipótesis',     total: HYPOTHESIS_DRILLS.length },
      { key: 'math',       label: 'Case Math',      total: 0 },
      { key: 'mece',       label: 'Chequeo MECE',     total: MECE_DRILLS.length },
      { key: 'synthesis',  label: 'Síntesis',      total: SYNTHESIS_DRILLS.length },
      { key: 'builder',    label: 'Arma un árbol',   total: BUILDER_DRILLS.length },
      { key: 'sizing',     label: 'Market Sizing',  total: SIZING_DRILLS.length }
    ];
    html += `<div class="progress-section-title">Historial de drills</div>`;
    html += drillTypes.map(dt => {
      const gen = DRILL_TYPES[dt.key] && DRILL_TYPES[dt.key].generated;
      if (gen) {
        // Infinite types have no fixed denominator; show the persisted aggregate count.
        const n = (state.drillHistory && state.drillHistory[dt.key]) || 0;
        return `
        <div class="progress-drill-row">
          <div class="progress-drill-name">${dt.label}</div>
          <div class="progress-drill-bar"><div class="progress-drill-bar-fill" style="width:${n > 0 ? 100 : 0}%"></div></div>
          <div class="progress-drill-count">${n} · ∞</div>
        </div>
      `;
      }
      const done = countDone(dt.key);
      const pct = (done / dt.total) * 100;
      return `
        <div class="progress-drill-row">
          <div class="progress-drill-name">${dt.label}</div>
          <div class="progress-drill-bar"><div class="progress-drill-bar-fill" style="width:${pct}%"></div></div>
          <div class="progress-drill-count">${done}/${dt.total}</div>
        </div>
      `;
    }).join('');

    // ---- Rendimiento de Math (Math Performance Layer): accuracy × velocidad por patrón P1–P4 ----
    html += `<div class="progress-section-title">Rendimiento de Math</div>`;
    if (mathPatsTotal() === 0) {
      html += `<div class="progress-drill-row"><div class="progress-drill-name c-2">Resuelve drills de math para llenar tu perfil de velocidad.</div></div>`;
    } else {
      const mpWeak     = MCMATH.weakestPat(state.mathPats);
      const mpWeakName = (MCMATH.PAT[mpWeak] && MCMATH.PAT[mpWeak].name) || mpWeak;
      const mpWeakSt   = (state.mathPats || {})[mpWeak] || { ok: 0, tot: 0 };
      const mpWeakAcc  = mpWeakSt.tot > 0 ? Math.round(mpWeakSt.ok / mpWeakSt.tot * 100) : null;
      const mpWeakMed  = mathMedian((state.mathTimes || {})[mpWeak]);
      const mpWeakTgt  = MATH_TARGET[mpWeak] || 30;
      const mpWeakTag  = mathSpeedTag(mpWeak);
      const headTag    = mpWeakTag ? ` — <span class="${mpWeakTag.cls}">${mpWeakTag.label}</span>` : '';
      const headStats  = (mpWeakAcc != null && mpWeakMed != null)
        ? ` (${mpWeakAcc}% · ${mpWeakMed}s vs meta ${mpWeakTgt}s)`
        : (mpWeakAcc != null ? ` (${mpWeakAcc}% · aún sin tiempo)` : '');
      html += `
        <div class="weakest-callout">
          <div class="weakest-label">Tu cuello en math</div>
          <div class="weakest-branch">${escapeHtml(mpWeakName)}${headTag}</div>
          <div class="weakest-body">Patrón más débil cruzando precisión y velocidad${headStats}. Bájalo con drills de math.</div>
        </div>
      `;
      html += ['P1','P2D','P2R','P3','P4'].map(p => {
        const st     = (state.mathPats || {})[p] || { ok: 0, tot: 0 };
        const acc    = st.tot > 0 ? Math.round(st.ok / st.tot * 100) + '%' : '—';
        const med    = mathMedian((state.mathTimes || {})[p]);
        const nSamp  = (Array.isArray((state.mathTimes || {})[p]) ? state.mathTimes[p].length : 0);
        const medTxt = med != null ? 'mediana ' + med + 's · n=' + nSamp : '—';
        const tgt    = MATH_TARGET[p] || 30;
        const tag    = mathSpeedTag(p);
        const tagHtml = tag
          ? `<span class="${tag.cls}">${tag.label}</span>`
          : `<span class="c-2" style="font-size:11px">sin datos</span>`;
        const nm     = (MCMATH.PAT[p] && MCMATH.PAT[p].name) || p;
        return `
          <div class="progress-drill-row">
            <div class="progress-drill-name">${escapeHtml(nm)}</div>
            <div class="progress-drill-count">${acc} · ${medTxt} <span class="c-3">meta ${tgt}s</span></div>
            ${tagHtml}
          </div>
        `;
      }).join('');
    }

    // Case completion list
    const completedSet = new Set(state.completedCases || []);
    const casesDone = CASES.filter(c => completedSet.has(c.id)).length;
    html += `<div class="progress-section-title">Casos · ${casesDone}/${CASES.length}</div>`;
    html += CASES.map((c, i) => `
      <div class="progress-drill-row">
        <div class="progress-drill-name">${String(i+1).padStart(2,'0')} · ${escapeHtml(c.title)}</div>
        <span class="color-dot" style="background:${completedSet.has(c.id) ? 'var(--emerald)' : 'var(--border-mid)'};${completedSet.has(c.id) ? 'box-shadow:0 0 8px rgba(34,197,94,0.5)' : ''}"></span>
      </div>
    `).join('');

    // F3 — Respaldo: export/import del state completo. Sin red: Blob + a[download] / FileReader.
    html += `
      <div class="backup-zone">
        <div class="reset-zone-label">Respaldo</div>
        <div class="reset-zone-body">Descarga todo tu progreso como archivo JSON, o restáuralo desde un respaldo previo (por ejemplo en otro dispositivo). Importar reemplaza el estado actual completo.</div>
        ${progressImportError ? `<div class="backup-error">${escapeHtml(progressImportError)}</div>` : ''}
        ${!progressImportPending ? `
          <div class="backup-actions">
            <button class="reveal-btn" style="margin-top:0" data-action="export-state">Exportar respaldo</button>
            <button class="reset-btn" data-action="import-state">Importar</button>
          </div>
          <input type="file" data-role="import-file" accept=".json,application/json" style="display:none">
        ` : `
          <div class="reset-confirm">
            <strong>Esto reemplaza TODO tu progreso actual.</strong> ¿Restaurar el respaldo importado?
            <div class="reset-actions">
              <button class="reset-cancel" data-action="import-cancel">Cancelar</button>
              <button class="reset-confirm-btn" data-action="import-confirm">Sí, restaurar</button>
            </div>
          </div>
        `}
      </div>
    `;

    // Reset zone
    html += `
      <div class="reset-zone">
        <div class="reset-zone-label">Resetear avance</div>
        <div class="reset-zone-body">Borra todos los scores de dominio, drills completados, casos completados y la racha. Esto no se puede deshacer — úsalo si quieres drillear el mismo contenido desde cero, o si el estado de avance se siente mal.</div>
        ${!progressResetConfirm ? `
          <button class="reset-btn" data-action="progress-reset-ask">Resetear todo el avance</button>
        ` : `
          <div class="reset-confirm">
            <strong>¿Estás seguro?</strong> Todos los scores de dominio, drills completados, casos completados y rachas se borrarán permanentemente.
            <div class="reset-actions">
              <button class="reset-cancel" data-action="progress-reset-cancel">Cancelar</button>
              <button class="reset-confirm-btn" data-action="progress-reset-confirm">Sí, resetear todo</button>
            </div>
          </div>
        `}
      </div>
    `;

    return html;
  }

  function handleProgressClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;
    // F3 — Respaldo (export/import). Sin red, sin state persistente nuevo (_backupV vive solo en el archivo).
    if (action === 'export-state') {
      const payload = Object.assign({}, state, { _backupV: 1 });
      const d = new Date();
      const ymd = d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'mbb-trainer-backup-' + ymd + '.json';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      return;
    }
    if (action === 'import-state') {
      const input = document.querySelector('#progress-root [data-role="import-file"]');
      if (input) input.click();
      return;
    }
    if (action === 'import-cancel') {
      progressImportPending = null;
      progressImportError = '';
      renderProgress();
      return;
    }
    if (action === 'import-confirm') {
      if (!progressImportPending) return;
      try {
        const obj = progressImportPending;
        delete obj._backupV;                                   // el sentinel del archivo NO entra al state vivo
        localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); // mismo path que saveState: STORAGE_KEY directo
        location.reload();                                      // loadState() re-mergea contra DEFAULT_STATE al arrancar
      } catch (err) {
        progressImportError = 'No se pudo escribir el respaldo. Intenta de nuevo.';
        progressImportPending = null;
        renderProgress();
      }
      return;
    }
    if (action === 'progress-reset-ask') {
      progressResetConfirm = true;
      renderProgress();
      return;
    }
    if (action === 'progress-reset-cancel') {
      progressResetConfirm = false;
      renderProgress();
      return;
    }
    if (action === 'progress-reset-confirm') {
      // Deep-reset all progress while preserving the loaded-state shape.
      state.streakDays = 0;
      state.streak = 0;
      state.lastSessionDate = null;
      state.sessionCount = 0;
      state.casesCompleted = 0;
      state.completedCases = [];
      state.exhibitsCompleted = [];
      state.mastery = {};
      state.drillHistory = { hypothesis: 0, math: 0, mece: 0, synthesis: 0, builder: 0, sizing: 0, ambiguedad: 0, experimento: 0, protocolo: 0 };  // M3 · M10
      state.drillCompletions = {};
      state.lastRecall = {};
      state.srs = {};
      state.stepStats = { diagnose:[], hypothesis:[], math:[], mece:[], synthesis:[], clarifying:[], ambiguedad:[], giro:[], experimento:[], fit:[], protocolo:[] };  // M3 · M9 · M10
      state.mathPats = deepClone(DEFAULT_STATE.mathPats);
      state.mathTimes = deepClone(DEFAULT_STATE.mathTimes);
      state.synthLog = [];
      state.liveCaseLog = [];
      saveState();
      progressResetConfirm = false;
      renderProgress();
      return;
    }
  }

  // ============================================================
  // BOOT
  // ============================================================
  document.getElementById('top-bar-meta').textContent = TAB_LABELS[currentTab];
  document.getElementById('dashboard-root').addEventListener('click', handleDashboardClick);
  renderDashboard();

})();
</script>
<script>
/* ── PWA: service worker registration (offline + installable) ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').catch(function (e) {
      console.warn('SW registration failed:', e);
    });
  });
}
</script>
