  function renderRecallSummary() {
    const fw = FRAMEWORK_DATA[recallState.frameworkId];
    const branches = fw.branches;
    // Score: Got = 1, Partial = 0.5, Missed = 0 — normalized %
    let earned = 0;
    branches.forEach(b => {
      const g = recallState.branchGrades[b.id];
      if (g === 'got') earned += 1;
      else if (g === 'partial') earned += 0.5;
    });
    const pct = Math.round((earned / branches.length) * 100);

    // SRS: si el framework NO estaba vencido, esta sesión fue cramming → no commiteamos
    // mastery ni reprogramamos (mismo efecto protector que tenía el cooldown plano).
    const crammed = !recallState.wasDue;
    const srsNow = state.srs && state.srs[recallState.frameworkId];
    const nextDueTxt = (srsNow && typeof srsNow.due === 'number') ? srsDueLabel(srsNow.due) : null;

    // Mastery movement (sólo significativo si NO fue cramming, porque ahí no commiteamos)
    const masteryBefore = recallState.masteryBefore != null ? recallState.masteryBefore : frameworkMastery(recallState.frameworkId);
    const masteryAfter = frameworkMastery(recallState.frameworkId);
    const masteryDelta = masteryAfter - masteryBefore;

    let tier, tierLabel, coach;
    if (pct >= 85) {
      tier = 'tier-mastery';
      tierLabel = 'Nivel de dominio';
      coach = 'Este framework está listo para usar en una entrevista real. Sigue: haz un drill de otro framework — el dominio viene de la amplitud, no de re-drillear lo que ya sabes.';
    } else if (pct >= 65) {
      tier = 'tier-solid';
      tierLabel = 'Recall sólido';
      coach = 'La estructura está pero hay vacíos. Mira abajo las ramas parciales/no logradas — relee esas específicamente esta noche, después reintenta este drill mañana.';
    } else if (pct >= 35) {
      tier = 'tier-solid';
      tierLabel = 'La base está';
      coach = 'Tienes el esqueleto pero las ramas todavía no están cargadas en profundidad. Anda a Teoría, relee el framework de principio a fin, y reintenta este drill en 24 horas.';
    } else {
      tier = 'tier-weak';
      tierLabel = 'Aún no cargado';
      coach = 'Este framework no está en memoria. No reintentes al tiro — no es así como funciona el aprendizaje. Léelo lento en Teoría, déjalo reposar una noche, después reintenta mañana.';
    }

    // Mastery delta panel content
    let masteryPanel = '';
    if (crammed) {
      masteryPanel = `
        <div class="mastery-delta-panel cooldown">
          <div class="mastery-delta-label">Repaso adelantado · dominio no actualizado</div>
          <div class="mastery-delta-body">Este framework todavía no estaba vencido${nextDueTxt ? ` — toca de nuevo ${escapeHtml(nextDueTxt)}` : ''}. Esta sesión te dio feedback pero <strong>no cambió tu score de dominio</strong> ni el calendario de repaso — la consolidación real pasa con el espaciado, no con reps seguidas. Vuelve cuando esté due y va a contar.</div>
        </div>
      `;
    } else {
      const deltaText = masteryDelta > 0 ? `+${masteryDelta}` : String(masteryDelta);
      const deltaClass = masteryDelta > 0 ? 'delta-up' : masteryDelta < 0 ? 'delta-down' : 'delta-flat';
      masteryPanel = `
        <div class="mastery-delta-panel">
          <div class="mastery-delta-label">Dominio del framework</div>
          <div class="mastery-delta-row">
            <span class="mastery-num">${masteryBefore}<span style="font-size:13px;opacity:0.5">%</span></span>
            <svg class="mastery-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            <span class="mastery-num ${masteryDelta > 0 ? 'up' : masteryDelta < 0 ? 'down' : ''}">${masteryAfter}<span style="font-size:13px;opacity:0.5">%</span></span>
            <span class="mastery-delta ${deltaClass}">${deltaText}</span>
          </div>
          ${nextDueTxt ? `<div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-3);margin-top:10px">Próximo repaso · ${escapeHtml(nextDueTxt)}</div>` : ''}
        </div>
      `;
    }

    return `
      <div class="summary-banner ${tier}">
        <div class="summary-score">${pct}<span style="font-size:28px;opacity:0.5">%</span></div>
        <div class="summary-tier-label">${tierLabel}</div>
        <div class="summary-coach">${coach}</div>
      </div>

      ${masteryPanel}

      <div class="summary-breakdown">
        ${branches.map(b => {
          const g = recallState.branchGrades[b.id] || 'missed';
          const label = g === 'got' ? 'La tuve' : g === 'partial' ? 'Parcial' : 'No la tuve';
          return `
            <div class="summary-row">
              <span class="color-dot" style="background:${b.dot}"></span>
              <span class="summary-row-name">${escapeHtml(b.name)}</span>

      <div class="recall-actions">
        <button class="reveal-btn" style="background:var(--bg-elevated);border-style:solid;border-color:var(--border-mid);color:var(--text-1)" data-action="recall-back-to-list">Volver a Recall</button>

      </div>
    `;

  // Timer logic
  function startRecallTimer() {
    stopRecallTimer();
    recallState.timerStart = Date.now();
    recallTimerInterval = setInterval(tickRecallTimer, 100);
  }
  function stopRecallTimer() {
    if (recallTimerInterval) {
      clearInterval(recallTimerInterval);
      recallTimerInterval = null;
    }
  }
  function tickRecallTimer() {
    const elapsed = Date.now() - recallState.timerStart;
    const remaining = Math.max(0, recallState.timerDuration - elapsed);
    if (remaining <= 0) {
      stopRecallTimer();
      advanceToGrade();
      return;
    }
    updateTimerDisplay(remaining);
  }
  function updateTimerDisplay(remainingMs) {
    const secEl = document.querySelector('.timer-seconds');
    const progressEl = document.querySelector('.timer-ring-progress');
    const seconds = Math.ceil(remainingMs / 1000);
    if (secEl) secEl.textContent = seconds;
    if (progressEl) {
      const circumference = 2 * Math.PI * 70;
      const fraction = remainingMs / recallState.timerDuration;
      progressEl.setAttribute('stroke-dashoffset', String(circumference * (1 - fraction)));
      if (seconds <= 15) {
        progressEl.classList.add('urgent');
        if (secEl) secEl.classList.add('urgent');
      }
    }
  }
  function advanceToGrade() {
    recallState.phase = 'grade';
    recallState.currentBranchIdx = 0;
    recallState.branchGrades = {};
    recallState.transitioning = false;
    renderRecall();
  }

  function handleRecallClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;

    if (action === 'start-recall') {
      const fwId = target.dataset.fw;
      if (!fwId || !FRAMEWORK_DATA[fwId]) return;
      recallState.frameworkId = fwId;
      recallState.phase = 'timer';
      recallState.currentBranchIdx = 0;
      recallState.branchGrades = {};
      recallState.transitioning = false;
      recallState.masteryBefore = frameworkMastery(fwId);
      recallState.wasDue = srsIsDue(fwId); // SRS reemplaza el cooldown: ¿estaba vencido al iniciar?
      renderRecall();
      startRecallTimer();
      return;
    }
    if (action === 'cancel-recall') {
      stopRecallTimer();
      recallState.phase = 'pick';
      renderRecall();
      return;
    }
    if (action === 'end-timer') {
      stopRecallTimer();
      advanceToGrade();
      return;
    }
    if (action === 'grade-branch') {
      if (recallState.transitioning) return;
      const grade = target.dataset.grade;
      const fw = FRAMEWORK_DATA[recallState.frameworkId];
      const branch = fw.branches[recallState.currentBranchIdx];
      recallState.branchGrades[branch.id] = grade;
      // SRS gate: solo commitea mastery si el framework estaba VENCIDO al iniciar la sesión.
      // Repasar antes de tiempo (cramming) da feedback pero no infla el score — el espaciado
      // es justamente lo que consolida la memoria. Reemplaza el cooldown plano de 30 min.
      if (recallState.wasDue) {
        gradeBranch(recallState.frameworkId, branch.id, grade);
      }
      recallState.transitioning = true;
      renderRecall();
      setTimeout(() => {
        recallState.transitioning = false;
        recallState.currentBranchIdx += 1;
        if (recallState.currentBranchIdx >= fw.branches.length) {
          recallState.phase = 'summary';
          // SM-2 lite: reprograma el próximo repaso a partir del veredicto agregado de la sesión.
          // Solo si estaba vencido — el cramming no mueve el calendario.
          if (recallState.wasDue) {
            srsApply(recallState.frameworkId, srsSessionGrade(recallState.branchGrades, fw.branches));
          }
          registerSession();
        }
        renderRecall();
        const scrollHost = document.getElementById('scroll-host');
        if (scrollHost) scrollHost.scrollTop = 0;
      }, 360);
      return;
    }
    if (action === 'recall-back-to-list') {
      recallState.phase = 'pick';
      recallState.frameworkId = null;
      renderRecall();
      return;
    }
    if (action === 'recall-retry') {
      const fwId = recallState.frameworkId;
      recallState.phase = 'timer';
      recallState.currentBranchIdx = 0;
      recallState.branchGrades = {};
      recallState.transitioning = false;
      recallState.masteryBefore = frameworkMastery(fwId);
      // Reintento inmediato = cramming: la sesión anterior ya reprogramó el framework al futuro,
      // así que srsIsDue será false → da feedback pero no commitea ni vuelve a reprogramar.
      recallState.wasDue = srsIsDue(fwId);
      renderRecall();
      startRecallTimer();
      return;
    }
  }

  /* ═══════════════════ MOTOR DE MATH PARAMÉTRICO (portado de MC Precisión, namespaced) ═══════════════════
     12 generadores 'correctos por construcción' + distractores por patrón de error + radar P1–P4.
     Núcleo portado verbatim; solo se neutralizó el lore Mastercard-específico (transcript). Taxonomía y framing personal intactos. */
  const MCMATH = (function(){
    'use strict';
  /* ---------- RNG (inyectable para "caso del día" determinista) ---------- */
  let RAND = Math.random;
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function seededRun(seed,fn){const old=RAND;RAND=mulberry32(seed);try{return fn();}finally{RAND=old;}}
  const ri=(a,b)=>a+Math.floor(RAND()*(b-a+1));
  const pick=a=>a[Math.floor(RAND()*a.length)];
  const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(RAND()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;};

  /* ---------- formato español: 1.000.000,5 ---------- */
  function fmtN(n,dec){
    if(!isFinite(n))return '—';
    if(dec==null){const a=Math.abs(n);dec = a>=100?0:(Number.isInteger(+a.toFixed(6))?0:(a>=10?1:2));}
    const neg=n<0;n=Math.abs(n);
    let s=n.toFixed(dec),i=s,d='';
    if(s.indexOf('.')>=0){[i,d]=s.split('.');d=d.replace(/0+$/,'');}
    i=i.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
    return (neg?'−':'')+i+(d?','+d:'');
  }
  const fmt$=(n,dec)=>(n<0?'−$':'$')+fmtN(Math.abs(n),dec);
  function fmtC(n){ /* compacto: $3,2 M · $450 k */
    const neg=n<0;n=Math.abs(n);let out;
    if(n>=1e9)out='$'+fmtN(n/1e9,n/1e9>=100?0:1)+' MM';
    else if(n>=1e6)out='$'+fmtN(n/1e6,n/1e6>=100?0:1)+' M';
    else if(n>=10000)out='$'+fmtN(n/1e3,0)+' k';
    else out='$'+fmtN(n);
    return (neg?'−':'')+out;
  }
  const fmtPct=(p,dec)=>fmtN(p,dec==null?(Math.abs(p)<10&&p%1?1:(p%1?1:0)):dec)+'%';
  const pad=(s,w)=>String(s).padStart(w);

  /* ---------- parser de respuesta (acepta 1.500 · 1,5 · 2k · 3,2M · 12%) ---------- */
  function parseAns(raw){
    if(raw==null)return NaN;
    let s=String(raw).trim().toLowerCase()
      .replace(/[−–]/g,'-')
      .replace(/^\((.+)\)$/,'-$1')
      .replace(/\$|€|£|usd|clp|aprox\.?|≈|~|\s/g,'').replace(/%$/,'');
    if(!s)return NaN;
    let mult=1;
    const sm=s.match(/(mm|[kmb])$/);
    if(sm){const u=sm[1];mult=u==='k'?1e3:(u==='b'?1e9:(u==='mm'?1e6:1e6));s=s.slice(0,-u.length);}
    const hasD=s.indexOf('.')>=0,hasC=s.indexOf(',')>=0;
    if(hasD&&hasC){
      const lastD=s.lastIndexOf('.'),lastC=s.lastIndexOf(',');
      if(lastC>lastD){s=s.replace(/\./g,'').replace(',','.');}
      else{s=s.replace(/,/g,'');}
    }else if(hasC){
      const parts=s.split(',');
      if(parts.length===2&&parts[1].length<=2)s=parts.join('.');
      else s=s.replace(/,/g,'');
    }else if(hasD){
      const parts=s.split('.');
      if(parts.length===2&&parts[1].length<=2&&!(parts[0].length<=3&&parts[1].length===3))s=s;
      else if(parts.every((p,ix)=>ix===0||p.length===3))s=parts.join('');
      else s=parts.join('');
    }
    const v=parseFloat(s);
    return isNaN(v)?NaN:v*mult;
  }
  function tolOK(user,target,kind){
    if(!isFinite(user))return false;
    const a=Math.abs(target);
    let tol;
    if(kind==='pct')tol=Math.max(0.051,a*0.02);
    else if(kind==='years')tol=Math.max(0.05,a*0.03);
    else if(kind==='sizing')tol=a*0.04;
    else tol=Math.max(0.5,a*0.02);
    return Math.abs(user-target)<=tol;
  }
  function magFlag(user,target){ /* ¿error de orden de magnitud? */
    if(!isFinite(user)||user===0||target===0)return 0;
    const r=Math.abs(user/target);
    for(const k of [10,100,1000,0.1,0.01,0.001]){
      if(Math.abs(r-k)/k<0.03)return Math.round(Math.log10(k));
    }
    return 0;
  }

  /* ---------- patrones de error (los 4 de Francisco + conceptuales) ---------- */
  const PAT={
    P1:{id:'P1',name:'#1 · Ceros al re-escalar',tip:'Zero Ledger: separa dígitos y ceros. Anota "k/M" al lado de CADA número antes de operar y verifica la magnitud final (¿$k, $M?).'},
    P2D:{id:'P2D',name:'#2 · División por fracción',tip:'÷ fracción = × inversa (÷0,5 = ×2; ÷0,25 = ×4). Verifica SIEMPRE con la inversa: resultado × divisor ≈ dividendo.'},
    P2R:{id:'P2R',name:'#2 · Confusión de tasas / base ⚠',tip:'Tu vulnerabilidad #1. Escribe cada tasa ETIQUETADA en su caja antes de calcular ("Premium = 20%, Estándar = 10%"). Nunca apliques la tasa de un segmento a otro, ni arrastres la base de un cálculo al siguiente.'},
    P3:{id:'P3',name:'#3 · Multiplicación multi-paso',tip:'Un paso por línea, nunca dos porcentajes de golpe. Anota el resultado intermedio con su unidad antes de seguir.'},
    P4:{id:'P4',name:'#4 · División final a escala',tip:'Antes de la división grande: redondea el divisor a un ancla (10%, 1×, ×12), estima el orden de magnitud, luego refina. Verifica con la inversa.'}
  };
  const CON={
    doscajas:{name:'Estructura · caja A olvidada',tip:'Dos cajas SIEMPRE: A = existentes × (margen nuevo − viejo) [casi siempre NEGATIVA] + B = unidades nuevas × margen nuevo.'},
    margen:{name:'Trampa de margen',tip:'Margen nuevo = precio nuevo − costo. NUNCA tasa de margen × precio nuevo: el costo no baja con el descuento.'},
    fijo:{name:'Costo fijo olvidado',tip:'Resta el costo fijo incremental (one-time) ANTES de escalar a la red. Distingue one-time vs. recurrente.'},
    canib:{name:'Canibalización · margen, no ventas',tip:'Resta el MARGEN perdido en el activo existente (unidades robadas × margen viejo), no las ventas perdidas.'},
    canib0:{name:'Canibalización ignorada',tip:'Incremental = standalone − margen perdido en lo existente. Sin esa resta, sobreestimas (CaféRápido: payback 2,8 → 20,7 años).'},
    loyalty:{name:'Loyalty · costo por redención',tip:'El costo es puntos × tasa de REDENCIÓN × valor. Breakage = 1 − redención; los puntos no redimidos no cuestan.'},
    anual:{name:'Periodo confundido',tip:'Declara el periodo de cada dato (semana / mes / año) y conviértelo TODO a un solo periodo antes de operar.'},
    subst:{name:'Sustitución cross-canal ignorada',tip:'Al cerrar un sitio, parte del margen MIGRA a otros canales. Pérdida real = margen × (1 − tasa de retención).'},
    prom:{name:'Promedio simple vs. ponderado',tip:'Rate Rule: una tasa blended es promedio PONDERADO por volumen $. El promedio simple solo vale con volúmenes iguales.'},
    ot:{name:'Revolventes vs. puntuales',tip:'El interés se cobra sobre quienes NO pagan a tiempo: gasto × (1 − % a tiempo) × tasa. No inviertas el segmento.'}
  };

  /* ---------- leyenda de datos: cada dato = cantidad+unidad+alcance+periodo ---------- */
  function leg(label,value,scope,period){return {l:label,v:value,s:scope||'—',p:period||'—'};}

  /* ---------- saneamiento: un distractor jamás puede coincidir con la respuesta ---------- */
  function fixDrill(d){

  }


  /* ════════ GENERADORES DE DRILLS (correctos por construcción) ════════ */
  /* Cada drill: {type,eyebrow,scenario,legend[],ask,unitNote,answer,kind,

  const D={}; // registro de generadores

  /* helper de pasos tipo ledger */

  /* ── 1 · DOS CAJAS (promoción / incrementalidad) ─────────────────── */
  D.doscajas=function(lv){
    const surf=pick([
      {ind:'retail de moda',u:'abrigos',ctx:'Una cadena de retail evalúa una promoción de invierno en sus tiendas comparables.'},
      {ind:'QSR',u:'combos',ctx:'Una cadena QSR (comida rápida) probó una promoción de combos en un grupo de prueba.'},
      {ind:'CPG / supermercados',u:'packs',ctx:'Un fabricante CPG corrió una promoción de packs en supermercados de prueba.'},
      {ind:'farmacias',u:'unidades de la marca',ctx:'Una cadena de farmacias testeó un descuento en una marca propia.'}
    ]);
    let P,d;
    do{P=pick([60,80,100,120,160,200]);d=pick(lv>=2?[0.10,0.20,0.25]:[0.10,0.20]);}while((P*d)%1!==0);
    const m=pick([0.4,0.5,0.6]), cost=P*(1-m), om=P-cost, nP=P*(1-d), nm=nP-cost, chg=nm-om;
    const u=pick([40,50,60,80,100]), mult=pick(lv>=2?[1.5,2,2.5]:[1.5,2]), uInc=u*(mult-1);
    const W=pick([4,6,8]), F=pick([500,1000,2000]), N=pick(lv>=3?[150,250,400,500]:[100,200,300]);
    const wk=u*chg+uInc*nm, store=wk*W-F, net=store*N;
    const askNet=lv>=2&&RAND()<0.6;
    const answer=askNet?net:store;
    const sc=`${surf.ctx} Descuento de ${fmtPct(d*100,0)} sobre el precio de lista. El volumen semanal por tienda se multiplicó por ${fmtN(mult,1)}× durante la promoción.`;
    const legend=[
      leg('Precio de lista',fmt$(P)+' por '+surf.u.replace(/s$/,''),'por unidad','—'),
      leg('Margen actual',fmtPct(m*100,0)+' del precio ('+fmt$(om)+')','por unidad','—'),
      leg('Costo unitario',fmt$(cost)+' (no cambia con el descuento)','por unidad','—'),
      leg('Descuento',fmtPct(d*100,0)+' → precio promo '+fmt$(nP),'por unidad','durante la promo'),
      leg('Línea base de volumen',fmtN(u)+' '+surf.u,'por tienda','por semana'),
      leg('Volumen en promo',fmtN(mult,1)+'× → '+fmtN(u*mult)+' '+surf.u,'por tienda','por semana'),
      leg('Señalización / setup',fmt$(F)+' (one-time)','por tienda','única vez'),
      leg('Duración',fmtN(W)+' semanas','—','—'),
      leg('Tiendas de la red',fmtN(N)+' tiendas','red completa','—')
    ];
    const steps=led([
      'MARGEN  (margen nuevo = precio nuevo − costo, NUNCA tasa × precio nuevo)',
      `  margen viejo   = ${fmt$(P)} − ${fmt$(cost)}  = ${fmt$(om)}/u`,
      `  margen nuevo   = ${fmt$(nP)} − ${fmt$(cost)}  = ${fmt$(nm)}/u`,
      `  Δ margen       = ${fmt$(nm)} − ${fmt$(om)}  = ${fmt$(chg)}/u`,
      'DOS CAJAS  (por tienda · por semana)',
      `  Caja A existentes = ${fmtN(u)} u × ${fmt$(chg)}  = ${fmt$(u*chg)}`,
      `  Caja B nuevas     = ${fmtN(uInc)} u × ${fmt$(nm)}  = ${fmt$(uInc*nm)}`,
      `  Neto semanal      = ${fmt$(wk)}  por tienda`,
      'PERIODO Y FIJO  (por tienda)',
      `  ${fmt$(wk)} × ${W} sem − ${fmt$(F)} fijo  = ${fmt$(store)}`,
      ...(askNet?['ESCALAR A LA RED  ← Zero Ledger: cuida los ceros',`  ${fmt$(store)} × ${fmtN(N)} tiendas  = ${fmt$(net)}  (${fmtC(net)})`]:[]),
      `VERIFICACIÓN: signo de caja A ${u*chg<0?'negativo ✓ (descuento sacrifica margen en existentes)':'revisar'}`
    ]);
    const distract=[
      {v:askNet?(uInc*nm*W-F)*N:(uInc*nm*W-F),p:CON.doscajas,why:'Solo contaste la caja B (unidades nuevas) y olvidaste que las existentes ahora dejan menos margen.'},
      {v:(()=>{const wnm=nP*m;const wwk=u*(wnm-om)+uInc*wnm;const wst=wwk*W-F;return askNet?wst*N:wst;})(),p:CON.margen,why:'Usaste margen nuevo = tasa × precio nuevo. El costo unitario no baja con el descuento.'},
      {v:askNet?wk*W*N:wk*W,p:CON.fijo,why:'Olvidaste restar el costo fijo one-time por tienda.'},
    ];
    if(askNet)distract.push({v:net/10,p:PAT.P1,why:'Resultado correcto pero con un cero de menos al escalar a la red.'},{v:net*10,p:PAT.P1,why:'Resultado correcto pero con un cero de más al escalar a la red.'});
    return {type:'doscajas',eyebrow:'Promoción · dos cajas',archetype:'promo',
      scenario:sc,legend,kind:'money',
      ask:askNet?`¿Cuál es el profit incremental TOTAL de la red durante las ${W} semanas de promoción?`:`¿Cuál es el profit incremental POR TIENDA durante las ${W} semanas de promoción?`,
      unitNote:askNet?`$ totales · red de ${fmtN(N)} tiendas · ${W} semanas`:`$ totales · una tienda · ${W} semanas`,
      answer,steps,distractors:distract,pats:['P1','P3'],targetSec:lv>=3?100:120};
  };

    ];
    if(askTotal)distract.push({v:total/10,p:PAT.P1,why:'Un cero de menos al multiplicar por el pool.'},{v:total*10,p:PAT.P1,why:'Un cero de más al multiplicar por el pool.'});
    return {type:'percliente',eyebrow:'Per-cliente · lanzamiento de tarjeta',archetype:'percliente',
      scenario:`${surf.who[0].toUpperCase()+surf.who.slice(1)} lanza una ${surf.card}. Modela la economía del año 1 con los datos de la leyenda.`,
      legend,kind:'money',
      ask:askTotal?'¿Cuál es el profit NETO TOTAL del programa en el año 1?':'¿Cuál es el profit NETO POR CLIENTE en el año 1?',
      unitNote:askTotal?'$ totales · todos los clientes captados · año 1':'$ · por cliente · año 1',
      answer:askTotal?total:netC,steps,distractors:distract,pats:['P2R','P3','P1'],targetSec:lv>=3?110:140};
  };

  /* ── 3 · TRAMPA DE TASAS (dos segmentos · el error del transcript) ── */
  D.tasas=function(lv){
    const pair=pick([['Gen X','Gen Z'],['Premium','Estándar'],['Urbano','Rural'],['Afluente','Masivo']]);
    let n1,n2,S1,S2;
    do{
      n1=pick([100,200,300])*1e3; n2=pick([200,400,500])*1e3;
      S1=pick([6,8,10,12])*1e3; S2=pick([2,3,4,5])*1e3;
    }while(S1*n1===S2*n2); /* volúmenes iguales colapsan la trampa simple vs. ponderado */
    let q1=pick([0.10,0.20,0.30]), q2=pick([0.10,0.20,0.40]);
    if(q1===q2)q2=q1===0.10?0.40:0.10;
    const i=pick([0.15,0.18,0.20]);
    const int1=S1*q1*i, int2=S2*q2*i;
    const T1=int1*n1, T2=int2*n2, TT=T1+T2;
    const mode=pick(lv>=2?['seg2','total']:['seg2']);
    const answer=mode==='seg2'?T2:TT;
    const legend=[
      leg(`Clientes ${pair[0]}`,fmtN(n1/1e3,0)+' mil clientes','segmento '+pair[0],'—'),
      leg(`Clientes ${pair[1]}`,fmtN(n2/1e3,0)+' mil clientes','segmento '+pair[1],'—'),
      leg(`Gasto anual ${pair[0]}`,fmt$(S1),'por cliente '+pair[0],'por año'),
      leg(`Gasto anual ${pair[1]}`,fmt$(S2),'por cliente '+pair[1],'por año'),
      leg(`% que revuelve ${pair[0]}`,fmtPct(q1*100,0)+' del gasto','segmento '+pair[0],'—'),
      leg(`% que revuelve ${pair[1]}`,fmtPct(q2*100,0)+' del gasto  ⚠ distinta',`segmento ${pair[1]}`,'—'),
      leg('Tasa de interés',fmtPct(i*100,0)+' anual (igual para ambos)','ambos segmentos','por año')
    ];
    const steps=led([
      'PROTOCOLO DE TASAS  ← escribe cada tasa etiquetada en su caja',
      `  ┌ ${pair[0]}: revuelve ${fmtPct(q1*100,0)} ┐   ┌ ${pair[1]}: revuelve ${fmtPct(q2*100,0)} ┐`,
      `POR CLIENTE`,
      `  ${pair[0]}: ${fmt$(S1)} × ${fmtPct(q1*100,0)} × ${fmtPct(i*100,0)} = ${fmt$(int1)}`,
      `  ${pair[1]}: ${fmt$(S2)} × ${fmtPct(q2*100,0)} × ${fmtPct(i*100,0)} = ${fmt$(int2)}`,
      `POR SEGMENTO`,
      `  ${pair[0]}: ${fmt$(int1)} × ${fmtN(n1)} = ${fmt$(T1)}  (${fmtC(T1)})`,
      `  ${pair[1]}: ${fmt$(int2)} × ${fmtN(n2)} = ${fmt$(T2)}  (${fmtC(T2)})`,
      ...(mode==='total'?[`TOTAL = ${fmt$(TT)}  (${fmtC(TT)})`]:[]),
      'NOTA: el error clásico es usar la tasa de un segmento en el otro',
      `(o arrastrar la base equivocada) — es tu vulnerabilidad #1. No lo repitas.`
    ]);
    const wrongSwap=mode==='seg2'?S2*q1*i*n2:(S1*q1*i*n1+S2*q1*i*n2);
    const distract=[
      {v:wrongSwap,p:PAT.P2R,why:`Aplicaste el ${fmtPct(q1*100,0)} de ${pair[0]} al segmento ${pair[1]}. Es exactamente la confusión de tasa/base que es tu vulnerabilidad #1.`},
      {v:mode==='seg2'?S2*((q1+q2)/2)*i*n2:( (S1*n1+S2*n2)*((q1+q2)/2)*i ),p:CON.prom,why:'Usaste el promedio simple de las tasas. Cada segmento usa SU tasa; un blended sería ponderado por volumen $.'},
      {v:answer/10,p:PAT.P1,why:'Un cero de menos al escalar por clientes.'},
      {v:answer*10,p:PAT.P1,why:'Un cero de más al escalar por clientes.'}
    ];
    return {type:'tasas',eyebrow:'Trampa de tasas · dos segmentos',archetype:'percliente',
      scenario:`Un emisor lanza la misma tarjeta a dos segmentos, ${pair[0]} y ${pair[1]}, con comportamientos de pago distintos.`,
      legend,kind:'money',
      ask:mode==='seg2'?`¿Cuál es el ingreso por INTERESES total del segmento ${pair[1]} en un año?`:'¿Cuál es el ingreso por INTERESES total (ambos segmentos) en un año?',
      unitNote:mode==='seg2'?`$ totales · solo ${pair[1]} · por año`:'$ totales · ambos segmentos · por año',
      answer,steps,distractors:distract,pats:['P2R','P1'],targetSec:90};
  };

  /* ── 4 · MIX SHIFT / RATE RULE (tasa blended ponderada) ───────────── */
  D.mix=function(lv){
    const surf=pick([
      {a:'crédito',b:'débito',ctx:'Una red de pagos cobra take rates distintos por producto.'},
      {a:'crossborder',b:'doméstico',ctx:'Un adquirente cobra MDR distinto según el tipo de transacción.'},
      {a:'premium',b:'estándar',ctx:'Un procesador cobra tasas distintas por tier de tarjeta.'}
    ]);
    let t1,t2,v1,v2,w1,w2;
    do{
      t1=pick([1.8,2.0,2.4]); t2=pick([0.6,0.8,1.0]);
      v1=pick([0.6,0.5,0.4]); v2=1-v1;
      w1=v1-pick([0.1,0.2]); if(w1<=0.1)w1=0.2; w2=1-w1;
    }while(w1===0.5||Math.abs((t1+t2)/2-(t1*w1+t2*w2))<=0.1); /* el promedio simple debe distinguirse del ponderado */
    const b0=t1*v1+t2*v2, b1=t1*w1+t2*w2;
    const G=pick([10,20,50])*1e9;
    const mode=lv>=2&&RAND()<0.5?'rev':'rate';
    const dRev=(b1-b0)/100*G;
    const answer=mode==='rate'?b1:dRev;
    const legend=[
      leg(`Take rate ${surf.a}`,fmtPct(t1,1)+' del volumen','producto '+surf.a,'—'),
      leg(`Take rate ${surf.b}`,fmtPct(t2,1)+' del volumen','producto '+surf.b,'—'),
      leg('Mix HOY',`${surf.a} ${fmtPct(v1*100,0)} / ${surf.b} ${fmtPct(v2*100,0)} del volumen $`,'red','hoy'),
      leg('Mix PROYECTADO',`${surf.a} ${fmtPct(w1*100,0)} / ${surf.b} ${fmtPct(w2*100,0)} del volumen $`,'red','próximo año'),
      ...(mode==='rev'?[leg('GDV (volumen procesado)',fmtC(G)+' ('+fmt$(G)+')','red','por año')]:[])
    ];
    const steps=led([
      'RATE RULE: blended = promedio PONDERADO por volumen $',
      `  hoy   = ${fmtPct(t1,1)}×${fmtN(v1*100,0)}% + ${fmtPct(t2,1)}×${fmtN(v2*100,0)}% = ${fmtPct(b0,2)}`,
      `  nuevo = ${fmtPct(t1,1)}×${fmtN(w1*100,0)}% + ${fmtPct(t2,1)}×${fmtN(w2*100,0)}% = ${fmtPct(b1,2)}`,
      `  el mix se corre hacia ${surf.b} (tasa menor) → el blended SE DILUYE`,
      `  sin que ningún precio unitario haya cambiado`,
      ...(mode==='rev'?[`IMPACTO EN REVENUE`,`  Δtasa = ${fmtPct(b1-b0,2)} → ${fmtN((b1-b0),2)}% × ${fmtC(G)} = ${fmtC(dRev)} (${fmt$(dRev)})`]:[])
    ]);
    const distract=mode==='rate'?[
      {v:(t1+t2)/2,p:CON.prom,why:'Promedio simple de las tasas. Debe ponderarse por participación de volumen $.'},
      {v:b0,p:PAT.P3,why:'Calculaste el blended de HOY, no el del mix proyectado.'}
    ]:[
      {v:dRev*10,p:PAT.P1,why:'Cuidado con los ceros: % de un número en miles de millones.'},
      {v:dRev/10,p:PAT.P1,why:'Cuidado con los ceros: % de un número en miles de millones.'},
      {v:((t1+t2)/2-b0)/100*G,p:CON.prom,why:'Partiste de un promedio simple, no ponderado.'}
    ];
    return {type:'mix',eyebrow:'Rate Rule · mix shift',archetype:'pricing',
      scenario:surf.ctx+' El mix de volumen se está corriendo entre productos; los precios unitarios NO cambian.',
      legend,kind:mode==='rate'?'pct':'money',
      ask:mode==='rate'?'¿Cuál será la take rate BLENDED con el mix proyectado? (en %)':'¿Cuál es el impacto anual en revenue del cambio de mix? (puede ser negativo)',
      unitNote:mode==='rate'?'% blended · red · mix proyectado':'$ por año · red · vs. mix de hoy',
      answer,steps,distractors:distract,pats:['P2R','P1'],targetSec:75};
  };

  /* ── 5 · CEROS / ESCALA (Zero Ledger) ─────────────────────────────── */
  D.ceros=function(lv){
    const dig=[1.5,2,2.5,3,4,5,6,8,12,15,25];
    const a=pick(dig), pa=pick(lv>=2?[4,5,6]:[3,4,5]);
    const b=pick(dig.filter(x=>x!==a)), pb=pick([0,1,2]);
    const A=a*Math.pow(10,pa), B=b*Math.pow(10,pb);
    const ans=A*B;
    const surf=pick([
      {x:'transacciones por mes',y:'comisión por transacción',q:'ingreso mensual'},
      {x:'clientes activos',y:'margen anual por cliente',q:'margen anual total'},
      {x:'unidades vendidas al año',y:'profit por unidad',q:'profit anual total'},
      {x:'visitas mensuales',y:'revenue por visita',q:'revenue mensual'}
    ]);
    const za=Math.round(Math.log10(Math.pow(10,pa)/(Number.isInteger(a)?1:10)))+(Number.isInteger(a)?0:0);
    const steps=led([
      'ZERO LEDGER  ← separa dígitos y magnitud, anota los ceros',
      `  ${fmtN(A)} = ${fmtN(a)} × 10^${pa}`,
      `  ${fmtN(B)} = ${fmtN(b)} × 10^${pb}`,
      `  dígitos:   ${fmtN(a)} × ${fmtN(b)} = ${fmtN(a*b)}`,
      `  exponente: 10^${pa} × 10^${pb} = 10^${pa+pb}`,
      `  resultado: ${fmtN(a*b)} × 10^${pa+pb} = ${fmt$(ans)}  (${fmtC(ans)})`,
      `VERIFICACIÓN de magnitud: ¿${fmtC(ans)} suena razonable? ✓`
    ]);
    return {type:'ceros',eyebrow:'Escala · Zero Ledger',archetype:'sizing',
      scenario:`Cálculo rápido a escala: ${fmtN(A)} ${surf.x} × ${fmt$(B)} de ${surf.y}.`,
      legend:[leg(surf.x[0].toUpperCase()+surf.x.slice(1),fmtN(A),'total','según enunciado'),leg(surf.y[0].toUpperCase()+surf.y.slice(1),fmt$(B),'por unidad','según enunciado')],
      kind:'money',ask:`¿Cuál es el ${surf.q}?`,unitNote:'$ totales · mismo periodo del enunciado',
      answer:ans,steps,
      distractors:[{v:ans*10,p:PAT.P1,why:'Un cero de más: contaste mal los exponentes.'},{v:ans/10,p:PAT.P1,why:'Un cero de menos: contaste mal los exponentes.'},{v:ans*100,p:PAT.P1,why:'Dos órdenes de magnitud arriba.'},{v:ans/100,p:PAT.P1,why:'Dos órdenes de magnitud abajo.'}],
      pats:['P1'],targetSec:lv>=2?20:30};
  };

  /* ── 6 · DIVISIÓN POR FRACCIÓN ────────────────────────────────────── */
  D.divfrac=function(lv){
    const f=pick(lv>=2?[0.05,0.2,0.25,0.4,0.5,0.8,1.25,2.5]:[0.25,0.5,0.2,0.05]);
    const mode=pick(['breakeven','clientes','simple']);
    let legend;
    if(mode==='breakeven'){
      const F=pick([20,40,50,100,200])*1e3;
      const ans=F/f;
      legend=[leg('Costo fijo del proyecto',fmt$(F)+' (one-time)','total','única vez'),leg('Margen de contribución',fmt$(f,2)+' por unidad','por unidad','—')];
      return {type:'divfrac',eyebrow:'División · breakeven',archetype:'pricing',
        scenario:'¿Cuántas unidades hay que vender para cubrir el costo fijo?',legend,kind:'number',
        ask:'¿Cuántas unidades se necesitan para el punto de equilibrio (breakeven)?',unitNote:'unidades · total',
        answer:ans,steps:led(['DIVISIÓN POR FRACCIÓN = MULTIPLICAR POR LA INVERSA',`  ${fmt$(F)} ÷ ${fmt$(f,2)} = ${fmt$(F)} × ${fmtN(1/f,f===0.05?0:2)}`,`  = ${fmtN(ans)} unidades`,`VERIFICACIÓN (inversa): ${fmtN(ans)} × ${fmt$(f,2)} = ${fmt$(ans*f)} ≈ ${fmt$(F)} ✓`]),
        distractors:[{v:F*f,p:PAT.P2D,why:'Multiplicaste por la fracción en vez de dividir. ÷'+fmtN(f,2).replace('.',',')+' = ×'+fmtN(1/f,2)+'.'},{v:ans*10,p:PAT.P1,why:'Cero de más.'},{v:ans/10,p:PAT.P1,why:'Cero de menos.'}],
        pats:['P2D','P1'],targetSec:25};
    }
    if(mode==='clientes'){
      const T=pick([1,2,5])*1e6; const npc=pick([20,25,40,50,80]);
      const ans=T/npc;
      return {type:'divfrac',eyebrow:'División final a escala',archetype:'percliente',
        scenario:'El cliente quiere saber cuántos clientes se necesitan para alcanzar la meta de profit del programa.',
        legend:[leg('Meta de profit',fmtC(T)+' ('+fmt$(T)+')','programa','por año'),leg('Profit neto',fmt$(npc)+' por cliente','por cliente','por año')],
        kind:'number',ask:'¿Cuántos clientes se necesitan?',unitNote:'clientes · total',
        answer:ans,steps:led(['DIVISIÓN A ESCALA  ← ancla primero la magnitud',`  ${fmt$(T)} ÷ ${fmt$(npc)} → dígitos: ${fmtN(T/Math.pow(10,Math.floor(Math.log10(T))),1)} ÷ ${fmtN(npc)}`,`  = ${fmtN(ans)} clientes  (${fmtN(ans/1e3,0)} mil)`,`VERIFICACIÓN: ${fmtN(ans)} × ${fmt$(npc)} = ${fmt$(ans*npc)} ✓`]),
        distractors:[{v:ans*10,p:PAT.P4,why:'Orden de magnitud: verifica con la inversa.'},{v:ans/10,p:PAT.P4,why:'Orden de magnitud: verifica con la inversa.'},{v:T*npc,p:PAT.P2D,why:'Multiplicaste en vez de dividir.'}],
        pats:['P4','P1'],targetSec:30};
    }
    const X2=pick([120,300,600,900,1500]);
    const ans=X2/f;
    return {type:'divfrac',eyebrow:'División por fracción',archetype:'pricing',
      scenario:`Cálculo directo bajo presión: ${fmtN(X2)} ÷ ${fmtN(f,2)}.`,
      legend:[leg('Dividendo',fmtN(X2),'—','—'),leg('Divisor',fmtN(f,2)+' (fracción)','—','—')],
      kind:'number',ask:`¿Cuánto es ${fmtN(X2)} ÷ ${fmtN(f,2)}?`,unitNote:'número puro',
      answer:ans,steps:led(['÷ FRACCIÓN = × INVERSA',`  ÷${fmtN(f,2)} = ×${fmtN(1/f,2)}`,`  ${fmtN(X2)} × ${fmtN(1/f,2)} = ${fmtN(ans)}`,`VERIFICACIÓN: ${fmtN(ans)} × ${fmtN(f,2)} = ${fmtN(ans*f)} ✓`]),
      distractors:[{v:X2*f,p:PAT.P2D,why:'Invertiste la operación: multiplicaste por la fracción. ÷0,5 agranda, ×0,5 achica.'}],
      pats:['P2D'],targetSec:15};
  };

  /* ── 7 · PAYBACK (con variante canibalización · motor CaféRápido) ── */
  D.payback=function(lv){
    const canib=lv>=2&&RAND()<0.55;
    const surf=pick([
      {what:'remodelación de sucursales',inv:'remodelar cada sucursal'},
      {what:'apertura de un local nuevo',inv:'abrir el local'},
      {what:'nueva línea de autoservicio',inv:'instalar los kioscos'},
      {what:'renovación de cabina business',inv:'renovar cada avión'}
    ]);
    const I=pick([200,300,500,800])*1e3;
    if(!canib){
      const Pm=pick([10,20,25,40])*1e3; // profit incremental MENSUAL
      const Pa=Pm*12, ans=I/Pa;
      return {type:'payback',eyebrow:'Payback',archetype:'capital',
        scenario:`El cliente evalúa ${surf.what}. Quiere saber en cuánto tiempo recupera la inversión.`,
        legend:[leg('Inversión',fmtC(I)+' ('+fmt$(I)+') one-time','por sitio','única vez'),leg('Profit incremental',fmt$(Pm)+' ('+fmtC(Pm)+')','por sitio','por MES')],
        kind:'years',ask:'¿Cuál es el periodo de payback, en AÑOS?',unitNote:'años (acepta decimales)',
        answer:ans,steps:led(['CONVERSIÓN DE PERIODO  ← el profit viene por MES',`  profit anual = ${fmt$(Pm)} × 12 = ${fmt$(Pa)}/año`,'PAYBACK = inversión ÷ profit anual',`  ${fmt$(I)} ÷ ${fmt$(Pa)} = ${fmtN(ans,1)} años`,`VERIFICACIÓN (inversa): ${fmtN(ans,1)} × ${fmt$(Pa)} ≈ ${fmt$(I)} ✓`]),
        distractors:[{v:I/Pm,p:CON.anual,why:'Dividiste por el profit MENSUAL: eso da meses, no años (o olvidaste el ×12).'},{v:Pa/I,p:PAT.P2D,why:'Invertiste la división (eso es el ROI anual, no el payback).'}],
        pats:['P2D','P4'],targetSec:40};
    }
    /* motor CaféRápido: standalone vs incremental */
    const ps=pick([100,150,200])*1e3;           // profit standalone anual del activo nuevo
    const lostShare=pick([0.6,0.7,0.75]);   /* 0,5 colapsa la trampa: robado == incremental */        // % del profit nuevo que viene robado
    const stolen=ps*lostShare;                  // margen anual robado al activo existente
    const inc=ps-stolen;
    const ansS=I/ps, ansI=I/inc;
    return {type:'payback',eyebrow:'Payback · con canibalización',archetype:'capital',
      scenario:`El cliente quiere ${surf.what} cerca de un activo propio existente. El análisis standalone se ve bien… pero parte de las ventas nuevas serían robadas al activo existente.`,
      legend:[
        leg('Inversión',fmtC(I)+' one-time','por sitio','única vez'),
        leg('Profit standalone del sitio nuevo',fmtC(ps)+' ('+fmt$(ps)+')','sitio nuevo','por año'),
        leg('Margen robado al activo existente',fmtPct(lostShare*100,0)+' del profit nuevo proviene de clientes que ya compraban ahí','red','por año')],
      kind:'years',ask:'¿Cuál es el payback INCREMENTAL (a nivel de la red), en años?',unitNote:'años · usando profit incremental de la red',
      answer:ansI,steps:led([
        'INCREMENTAL = STANDALONE − MARGEN PERDIDO EN LO EXISTENTE',
        `  margen robado    = ${fmtC(ps)} × ${fmtPct(lostShare*100,0)} = ${fmtC(stolen)}`,
        `  profit incremental = ${fmtC(ps)} − ${fmtC(stolen)} = ${fmtC(inc)}/año`,
        'PAYBACK',
        `  standalone  : ${fmtC(I)} ÷ ${fmtC(ps)} = ${fmtN(ansS,1)} años  ← espejismo`,
        `  incremental : ${fmtC(I)} ÷ ${fmtC(inc)} = ${fmtN(ansI,1)} años  ← realidad de la red`,
        'Motor CaféRápido: 2,8 años standalone se convirtieron en 20,7 con canibalización.']),
      distractors:[
        {v:ansS,p:CON.canib0,why:'Usaste el profit standalone. La red solo gana el incremental.'},
        {v:I/stolen,p:PAT.P3,why:'Dividiste por el margen robado, no por el incremental.'},
        {v:inc/I,p:PAT.P2D,why:'Invertiste la división.'}],
      pats:['P2D','P4'],targetSec:75};
  };

  /* ── 8 · CANIBALIZACIÓN (incremental real) ────────────────────────── */
  D.canib=function(lv){
    const surf=pick([
      {nu:'el canal e-commerce',ex:'las tiendas físicas',un:'pedidos'},
      {nu:'el delivery por agregadores',ex:'el mostrador',un:'órdenes'},
      {nu:'la ruta aérea nueva',ex:'la ruta existente vía hub',un:'pasajes'},
      {nu:'el formato express',ex:'el supermercado grande',un:'tickets'}
    ]);
    const V=pick([20,40,50,100])*1e3;          // unidades nuevas al año
    const mN=pick([4,5,8,10]);                  // margen $ nuevo
    const mO=mN+pick([2,4,5]);                  // margen $ viejo (mayor)
    const x=pick([0.3,0.4,0.5,0.6]);            // % de robo
    const inc=V*mN - V*x*mO;
    const price=mO+pick([10,15,20]);
    return {type:'canib',eyebrow:'Canibalización · incremental real',archetype:'canal',
      scenario:`El cliente lanzó ${surf.nu}. Vende bien, pero una parte de esos ${surf.un} habría ocurrido igual en ${surf.ex} (con mejor margen).`,
      legend:[
        leg('Volumen del canal nuevo',fmtN(V)+' '+surf.un,'canal nuevo','por año'),
        leg('Margen canal nuevo',fmt$(mN)+' por '+surf.un.replace(/s$/,''),'por unidad','—'),
        leg('Margen canal existente',fmt$(mO)+' por '+surf.un.replace(/s$/,''),'por unidad','—'),
        leg('Precio promedio',fmt$(price)+' por '+surf.un.replace(/s$/,'')+' (referencia, NO se usa)','por unidad','—'),
        leg('Canibalización',fmtPct(x*100,0)+' de los '+surf.un+' nuevos vienen robados del canal existente','del volumen nuevo','—')],
      kind:'money',ask:'¿Cuál es el profit INCREMENTAL anual real para la compañía?',unitNote:'$ por año · compañía completa (ambos canales)',
      answer:inc,steps:led([
        'INCREMENTAL = NUEVO − MARGEN PERDIDO EN LO EXISTENTE',
        `  profit canal nuevo   = ${fmtN(V)} × ${fmt$(mN)} = ${fmtC(V*mN)}`,
        `  unidades robadas     = ${fmtN(V)} × ${fmtPct(x*100,0)} = ${fmtN(V*x)}`,
        `  margen perdido       = ${fmtN(V*x)} × ${fmt$(mO)} = ${fmtC(V*x*mO)}   ← margen VIEJO, no nuevo`,
        `  incremental          = ${fmtC(V*mN)} − ${fmtC(V*x*mO)} = ${fmtC(inc)} (${fmt$(inc)})`,
        'Se resta MARGEN perdido, nunca ventas perdidas.']),
      distractors:[
        {v:V*mN,p:CON.canib0,why:'Ignoraste la canibalización: parte de ese volumen ya era tuyo con mejor margen.'},
        {v:V*mN-V*x*price,p:CON.canib,why:'Restaste VENTAS perdidas (precio), no margen perdido.'},
        {v:V*mN-V*x*mN,p:PAT.P2R,why:'Usaste el margen del canal NUEVO para lo robado. Lo robado dejaba el margen VIEJO ('+fmt$(mO)+').'}],
      pats:['P2R','P3'],targetSec:70};
  };

  /* ── 9 · MARKET SIZING (potencias de diez · assessment) ───────────── */
  D.sizing=function(lv){
    const pop=pick([10,20,50,100])*1e6;
    const ad=pick([0.4,0.5,0.6]);     // % adulta/bancarizada
    const pen=pick([0.2,0.4,0.5]);    // % que adopta el medio de pago
    const tx=pick([5,10,20]);         // transacciones por persona por MES
    const tk=pick([10,20,25,40]);     // ticket promedio $
    const asm=pick([0.0010,0.0012,0.0015]);
    const users=pop*ad*pen;
    const gdv=users*tx*12*tk;
    const rev=gdv*asm;
    const mode=lv>=2&&RAND()<0.5?'rev':'gdv';
    const answer=mode==='gdv'?gdv:rev;
    const e=x=>Math.floor(Math.log10(x));
    return {type:'sizing',eyebrow:'Market sizing · potencias de diez',archetype:'sizing',
      scenario:'Estima de abajo hacia arriba (bottom-up) el volumen de pagos digitales de un país y lo que captura la red.',
      legend:[
        leg('Población',fmtN(pop/1e6,0)+' millones de personas','país','—'),
        leg('% adulta bancarizada',fmtPct(ad*100,0)+' de la población','país','—'),
        leg('% que adopta el medio de pago',fmtPct(pen*100,0)+' de los bancarizados','país','—'),
        leg('Transacciones',fmtN(tx)+' por usuario','por usuario','por MES'),
        leg('Ticket promedio',fmt$(tk)+' por transacción','por transacción','—'),
        ...(mode==='rev'?[leg('Assessment de la red',fmtPct(asm*100,2)+' del GDV','red','sobre GDV')]:[])],
      kind:'sizing',
      ask:mode==='gdv'?'¿Cuál es el GDV (volumen bruto) ANUAL del país?':'¿Cuál es el revenue ANUAL de la red vía assessment?',
      unitNote:mode==='gdv'?'$ GDV · país · por año':'$ revenue de la red · país · por año',
      answer,steps:led([
        'CADENA  (potencias de diez: multiplica dígitos, suma exponentes)',
        `  usuarios = ${fmtN(pop/1e6,0)}M × ${fmtPct(ad*100,0)} × ${fmtPct(pen*100,0)} = ${fmtN(users/1e6,1)}M`,
        `  tx/año   = ${fmtN(tx)}/mes × 12 = ${fmtN(tx*12)} por usuario   ← no olvides el ×12`,
        `  GDV      = ${fmtN(users/1e6,1)}M × ${fmtN(tx*12)} × ${fmt$(tk)}`,
        `           = ${fmtC(gdv)}  (${fmt$(gdv)})`,
        ...(mode==='rev'?[`  revenue  = ${fmtC(gdv)} × ${fmtPct(asm*100,2)} = ${fmtC(rev)}  (${fmt$(rev)})`]:[]),
        'SANITY per cápita:',
        `  GDV/población = ${fmt$(Math.round(gdv/pop))} por persona-año → ¿plausible? ✓`]),
      distractors:[
        {v:answer/12,p:CON.anual,why:'Olvidaste anualizar las transacciones (×12).'},
        {v:answer*10,p:PAT.P1,why:'Exponente: suma de ceros con un 10 de más.'},
        {v:answer/10,p:PAT.P1,why:'Exponente: suma de ceros con un 10 de menos.'},
        ...(mode==='rev'?[{v:gdv*asm*10,p:PAT.P2R,why:'Corriste la coma del assessment (0,'+fmtN(asm*1000,1).replace('.',',')+'% ≠ '+fmtN(asm*1000,1)+'%).'}]:[])],
      pats:['P1','P3'],targetSec:lv>=2?90:120};
  };

  /* ── 10 · LOYALTY (costo por redención · breakage) ────────────────── */
  D.loyalty=function(lv){
    const surf=pick([
      {who:'Una aerolínea',pt:'millas'},{who:'Un retailer',pt:'puntos'},{who:'Un banco emisor',pt:'puntos'},{who:'Una cadena hotelera',pt:'puntos'}
    ]);
    const spend=pick([200,400,500])*1e6;        // gasto anual del programa
    const earn=pick([1,2]);                      // puntos por $
    const val=pick([0.01,0.005]);                // $ por punto al redimir
    const red=pick([0.6,0.7,0.8]);            /* 0,5 colapsa la trampa breakage vs. redención */           // tasa de redención
    const pts=spend*earn;
    const cost=pts*red*val;
    const costPct=cost/spend*100;
    const mode=RAND()<0.6?'cost':'pct';
    return {type:'loyalty',eyebrow:'Loyalty · costo por redención',archetype:'loyalty',
      scenario:`${surf.who} quiere presupuestar el costo real de su programa de ${surf.pt} para el próximo año.`,
      legend:[
        leg('Gasto elegible del programa',fmtC(spend)+' ('+fmt$(spend)+')','programa','por año'),
        leg('Acumulación',fmtN(earn)+' '+surf.pt+' por $1 de gasto','por $ gastado','—'),
        leg('Valor al redimir',fmt$(val,3)+' por '+surf.pt.replace(/s$/,''),'por punto','al redimir'),
        leg('Tasa de redención',fmtPct(red*100,0)+' de los '+surf.pt+' emitidos se redimen','programa','histórica'),
        leg('Breakage',fmtPct((1-red)*100,0)+' (= 1 − redención) expira sin costo','programa','—')],
      kind:mode==='cost'?'money':'pct',
      ask:mode==='cost'?'¿Cuál es el costo anual REAL del programa?':'¿Cuál es el costo del programa como % del gasto elegible?',
      unitNote:mode==='cost'?'$ por año · programa completo':'% del gasto · por año',
      answer:mode==='cost'?cost:costPct,
      steps:led([
        'LOYALTY COST RULE: el costo lo dispara la REDENCIÓN, no la emisión',
        `  ${surf.pt} emitidos = ${fmtC(spend)} × ${fmtN(earn)} = ${fmtN(pts/1e6,0)}M ${surf.pt}`,
        `  redimidos          = ${fmtN(pts/1e6,0)}M × ${fmtPct(red*100,0)} = ${fmtN(pts*red/1e6,0)}M`,
        `  costo              = ${fmtN(pts*red/1e6,0)}M × ${fmt$(val,3)} = ${fmtC(cost)} (${fmt$(cost)})`,
        `  como % del gasto   = ${fmtC(cost)} ÷ ${fmtC(spend)} = ${fmtPct(costPct,1)}`,
        `  breakage ${fmtPct((1-red)*100,0)}: esos ${surf.pt} expiran y NO cuestan`]),
      distractors:[
        {v:mode==='cost'?pts*val:pts*val/spend*100,p:CON.loyalty,why:'Costeaste TODOS los '+surf.pt+' emitidos. Solo cuestan los redimidos ('+fmtPct(red*100,0)+').'},
        {v:mode==='cost'?pts*(1-red)*val:pts*(1-red)*val/spend*100,p:PAT.P2R,why:'Usaste el breakage como si fuera la tasa de redención (tasas invertidas).'},
        {v:(mode==='cost'?cost:costPct)*10,p:PAT.P1,why:'Cuidado con la coma del valor por punto ($0,01 vs $0,1).'}],
      pats:['P2R','P1'],targetSec:60};
  };

  /* ── 11 · CAMBIO DE FEE (late / annual con attrition) ─────────────── */
  D.fee=function(lv){
    const surf=pick([
      {fee:'late fee (cargo por atraso)',base:'tarjetahabientes',hit:'pagan tarde al menos una vez al año'},
      {fee:'cuota anual',base:'clientes del plan',hit:'están afectos a la cuota'}
    ]);
    const C=pick([500,1000,2000])*1e3;
    const L=pick([0.2,0.25,0.4]);
    const f0=pick([20,25,30]), f1=f0+pick([10,15,20]);
    const a=pick([0.05,0.10,0.20]);   // attrition de los afectados
    const m=pick([40,60,80]);          // margen anual por cliente que se va
    const aff=C*L;
    const newRev=aff*(1-a)*f1, oldRev=aff*f0, lost=aff*a*m;
    const net=newRev-oldRev-lost;
    return {type:'fee',eyebrow:'Cambio de fee · con attrition',archetype:'fee',
      scenario:`Un emisor sube su ${surf.fee} de ${fmt$(f0)} a ${fmt$(f1)}. Una parte de los clientes afectados se irá.`,
      legend:[
        leg('Base de clientes',fmtN(C/1e3,0)+' mil '+surf.base,'portafolio','—'),
        leg('Afectados por el fee',fmtPct(L*100,0)+' '+surf.hit,'del portafolio','por año'),
        leg('Fee actual → nuevo',fmt$(f0)+' → '+fmt$(f1)+' por cliente afectado','por cliente afectado','por año'),
        leg('Attrition por el alza',fmtPct(a*100,0)+' DE LOS AFECTADOS cancela la tarjeta','solo afectados','—'),
        leg('Margen del cliente que se va',fmt$(m)+' por cliente','por cliente','por año')],
      kind:'money',ask:'¿Cuál es el impacto NETO anual del alza? (puede ser negativo)',
      unitNote:'$ por año · portafolio completo · vs. statu quo',
      answer:net,steps:led([
        'ALCANCE  ← el attrition aplica SOLO a los afectados, no a toda la base',
        `  afectados = ${fmtN(C)} × ${fmtPct(L*100,0)} = ${fmtN(aff)}`,
        'DOS CAJAS DEL FEE',
        `  fee nuevo (quedan)  = ${fmtN(aff)} × (1−${fmtPct(a*100,0)}) × ${fmt$(f1)} = ${fmtC(newRev)}`,
        `  fee viejo (perdido) = ${fmtN(aff)} × ${fmt$(f0)} = ${fmtC(oldRev)}`,
        `  margen de los que se van = ${fmtN(aff)} × ${fmtPct(a*100,0)} × ${fmt$(m)} = ${fmtC(lost)}`,
        `  NETO = ${fmtC(newRev)} − ${fmtC(oldRev)} − ${fmtC(lost)} = ${fmtC(net)} (${fmt$(net)})`]),
      distractors:[
        {v:aff*f1-oldRev,p:CON.canib0,why:'Ignoraste el attrition: ni pierden el fee los que se van, ni su margen.'},
        {v:C*(1-a)*f1*L-oldRev-C*a*m,p:PAT.P2R,why:'Aplicaste el attrition a TODA la base. El alcance era "de los afectados".'},
        {v:newRev-oldRev,p:CON.canib,why:'Olvidaste el margen perdido de los clientes que cancelan.'}],
      pats:['P2R','P3'],targetSec:90};
  };

  /* ── 12 · CIERRE DE SUCURSAL (sustitución cross-canal) ────────────── */
  D.sucursal=function(lv){
    const surf=pick([
      {site:'una sucursal bancaria',ch:'canales digitales y sucursales vecinas'},
      {site:'una tienda del centro',ch:'el e-commerce y la tienda del mall'},
      {site:'un local de comida',ch:'el delivery y los locales cercanos'}
    ]);
    const R=pick([400,600,800])*1e3;   // margen bruto anual del sitio
    const OC=pick([300,500,700])*1e3;  // costo operativo anual ahorrable
    const s=pick([0.4,0.6,0.7]);              /* 0,5 colapsa la trampa de complemento */   // retención cross-canal
    const K=pick([50,100,200])*1e3;    // costo one-time del cierre
    const annual=OC - R*(1-s);
    const mode=lv>=2&&annual>0&&RAND()<0.4?'pay':'annual';
    const answer=mode==='annual'?annual:K/annual;
    return {type:'sucursal',eyebrow:'Cierre de sitio · sustitución',archetype:'cierre',
      scenario:`El cliente evalúa cerrar ${surf.site}. Parte de sus clientes migrarían a ${surf.ch}; el resto se pierde.`,
      legend:[
        leg('Margen bruto del sitio',fmtC(R)+' ('+fmt$(R)+')','sitio a cerrar','por año'),
        leg('Costo operativo ahorrable',fmtC(OC)+' (desaparece al cerrar)','sitio a cerrar','por año'),
        leg('Retención cross-canal',fmtPct(s*100,0)+' del margen migra a otros canales','red','por año'),
        leg('Costo del cierre',fmtC(K)+' (one-time: finiquitos, término de arriendo)','sitio','única vez')],
      kind:mode==='annual'?'money':'years',
      ask:mode==='annual'?'¿Cuál es el impacto anual NETO del cierre en la utilidad de la red? (puede ser negativo)':'Si el impacto anual es positivo, ¿en cuántos años se paga el costo del cierre?',
      unitNote:mode==='annual'?'$ por año · red completa · vs. mantener abierto':'años',
      answer,steps:led([
        'STOCKS Y FLUJOS DEL CIERRE  (por año, nivel red)',
        `  ahorro de costos        = +${fmtC(OC)}`,
        `  margen del sitio        = −${fmtC(R)}`,
        `  margen retenido (migra) = +${fmtC(R)} × ${fmtPct(s*100,0)} = +${fmtC(R*s)}`,
        `  pérdida real de margen  = ${fmtC(R)} × (1−${fmtPct(s*100,0)}) = ${fmtC(R*(1-s))}`,
        `  NETO anual = ${fmtC(OC)} − ${fmtC(R*(1-s))} = ${fmtC(annual)} (${fmt$(annual)})`,
        ...(mode==='pay'?[`PAYBACK del cierre = ${fmtC(K)} ÷ ${fmtC(annual)} = ${fmtN(K/annual,1)} años`]:[]),
        'El one-time del cierre NO entra al flujo anual.']),
      distractors:mode==='annual'?[
        {v:OC-R,p:CON.subst,why:'Ignoraste la sustitución: '+fmtPct(s*100,0)+' del margen migra a otros canales.'},
        {v:OC-R*(1-s)-K,p:CON.anual,why:'Mezclaste el one-time del cierre con el flujo anual.'},
        {v:OC-R*s,p:PAT.P2R,why:'Usaste la tasa de retención como tasa de pérdida (complementos invertidos).'}]:[
        {v:annual/K,p:PAT.P2D,why:'Invertiste la división del payback.'},
        {v:K/(OC-R*s),p:PAT.P2R,why:'Complemento invertido en la pérdida de margen.'}],
      pats:['P2R','P3'],targetSec:90};
  };

  /* ── registro y selector ── */
  const DRILL_TYPES=[
    {id:'doscajas',label:'Dos cajas / promo'},
    {id:'percliente',label:'Per-cliente'},
    {id:'tasas',label:'Trampa de tasas ⚠'},
    {id:'mix',label:'Rate Rule / mix'},
    {id:'ceros',label:'Ceros / escala'},
    {id:'divfrac',label:'División ÷ fracción'},
    {id:'payback',label:'Payback'},
    {id:'canib',label:'Canibalización'},
    {id:'sizing',label:'Market sizing'},
    {id:'loyalty',label:'Loyalty / breakage'},
    {id:'fee',label:'Cambio de fee'},
    {id:'sucursal',label:'Cierre de sitio'}
  ];
  function genDrill(type,lv){
    /* salida siempre saneada */
    lv=lv||2;
    if(type&&type!=='mix-all'&&D[type])return fixDrill(D[type](lv));
    return fixDrill(D[pick(DRILL_TYPES.map(t=>t.id))](lv));
  }

  /* formateo de la respuesta canónica para mostrar (portado verbatim) */
  function fmtAns(v,kind){
    if(kind==='pct')return fmtN(v,Math.abs(v)%1?1:0)+'%';
    if(kind==='years')return fmtN(v,1)+' años';
    if(kind==='sizing')return fmtN(v);
    return fmt$(v)+(Math.abs(v)>=1e6?'  ('+fmtC(v)+')':'');
  }

  /* ════════ patrones → drills que los entrenan (para el nudge del radar) ════════ */
  const PRACT={P1:['ceros','doscajas'],P2D:['divfrac'],P2R:['tasas','loyalty','mix','percliente'],P3:['percliente','doscajas','fee'],P4:['divfrac','sizing','payback']};

  /* peor patrón según stats acumuladas (mín. 3 intentos); default = tu vulnerabilidad #1 */
  function weakestPat(patStats){
    patStats=patStats||{};
    let worst='P2R',wacc=2;
    ['P1','P2D','P2R','P3','P4'].forEach(p=>{
      const s=patStats[p];
      if(s&&s.tot>=3){const a=s.ok/s.tot;if(a<wacc){wacc=a;worst=p;}}
    });
    return worst;
  }

  /* radar de los 5 patrones — re-skineado a tokens MBB Trainer (gold/emerald) */
  function radarSVG(patStats){
    patStats=patStats||{};
    const ks=['P1','P2D','P2R','P3','P4'];
    const lab={P1:'P1 ceros',P2D:'P2 ÷frac',P2R:'P2 tasas/base ⚠',P3:'P3 multi',P4:'P4 ÷escala'};
    const C=115,R=64,W=230,H=216;
    const pt=(i,r)=>{const a=(-90+i*72)*Math.PI/180;return [C+r*Math.cos(a),(C-12)+r*Math.sin(a)];};
    const poly=r=>ks.map((k,i)=>pt(i,r).map(x=>x.toFixed(1)).join(',')).join(' ');
    const vals=ks.map(k=>{const s=patStats[k];return s&&s.tot?s.ok/s.tot:0;});
    const dataPoly=ks.map((k,i)=>pt(i,Math.max(4,vals[i]*R)).map(x=>x.toFixed(1)).join(',')).join(' ');
    let axes='',labels='';
    ks.forEach((k,i)=>{
      const p1=pt(i,R);
      axes+='<line x1="'+C+'" y1="'+(C-12)+'" x2="'+p1[0].toFixed(1)+'" y2="'+p1[1].toFixed(1)+'" stroke="var(--border-mid)"/>';
      const p2=pt(i,R+24);
      const s=patStats[k];const has=s&&s.tot>0;
      const t=lab[k]+(has?' · '+Math.round(vals[i]*100)+'%':'');
      labels+='<text x="'+p2[0].toFixed(1)+'" y="'+(p2[1]+3).toFixed(1)+'" text-anchor="middle" font-size="9.5" fill="'+(k==='P2R'?'var(--gold)':(has?'var(--text-1)':'var(--text-3)'))+'">'+t+'</text>';
    });
    return '<svg viewBox="0 0 '+W+' '+H+'" width="250" role="img" aria-label="Radar de precisión por patrón de error">'
      +'<polygon points="'+poly(R)+'" fill="none" stroke="var(--border-mid)"/>'
      +'<polygon points="'+poly(R*0.5)+'" fill="none" stroke="var(--border-mid)" stroke-dasharray="3 3"/>'
      +axes
      +'<polygon points="'+dataPoly+'" fill="rgba(34,197,94,.15)" stroke="var(--emerald)" stroke-width="2"/>'
      +labels+'</svg>';
  }

  /* tolerancia ABSOLUTA derivada de las MISMAS ramas que tolOK (single source of truth).
     Garantiza que el grading de la base con tolerancia fija ≡ tolOK del donante: para cualquier
     answer/kind, |user−answer| ≤ tolFor(answer,kind)  ⇔  tolOK(user,answer,kind). */
  function tolFor(target,kind){
    const a=Math.abs(target);
    if(kind==='pct')   return Math.max(0.051,a*0.02);
    if(kind==='years') return Math.max(0.05, a*0.03);
    if(kind==='sizing')return a*0.04;
    return Math.max(0.5, a*0.02);
  }

  /* API expuesta al resto de la app — el motor del donante queda namespaced aquí dentro */
  return {
    gen: genDrill,            // gen(type?, lv?) → drill saneado (type opcional; sin type = aleatorio)
    TYPES: DRILL_TYPES,       // [{id,label}] de los 12 generadores
    PAT, CON, PRACT,
    tolOK, tolFor, magFlag, parseAns, fmtAns,
    fmtN, fmt$, fmtC, fmtPct,
    radarSVG, weakestPat,
    shuffle,                  // F2: barajar con el RAND del motor (inyectable), no Math.random directo
    ri, pick,                 // Brick G (liveMathGen): sorteo con el RAND del motor — inyectable vía seededRun, no Math.random directo
    mulberry32                // Brick I (skillGraph): FACTORÍA de RNG sembrable, solo lectura — el plan SdH crea su instancia LOCAL; jamás toca RAND del motor
  };
  })();

  // M10 — P2R_LABELS vive fuera del IIFE MCMATH y solo lee la salida pública
  // del generador: {type, legend[], ask}. Devuelve 2-4 slots enfocados en
  // inputs confundibles P2R; jamás etiqueta toda la leyenda ni toca answers.
  const P2R_LABELS = (function () {
    function hay(s) {
      return String(s || '').toLowerCase();
    }
    function rowText(r) {
      return hay((r && r.l) + ' ' + (r && r.v) + ' ' + (r && r.s) + ' ' + (r && r.p));
    }
    function findIdx(legend, tests, used) {
      for (let i = 0; i < (legend || []).length; i++) {
        if (used && used[i]) continue;
        const txt = rowText(legend[i]);
        if (tests.every(t => txt.indexOf(hay(t)) >= 0)) return i;
      }
      return -1;
    }
    function add(out, legend, used, id, label, tests, why) {
      const idx = findIdx(legend, tests, used);
      if (idx < 0) return;
      used[idx] = true;
      out.push({ id: id, label: label, legendIndex: idx, why: why });
    }
    function targetSegment(d) {
      const m = String(d && d.ask || '').match(/segmento\s+(.+?)\s+en un año/i);
      return m ? m[1] : '';
    }
    function forDrill(d) {
      const legend = (d && Array.isArray(d.legend)) ? d.legend : [];
      const used = {};
      const out = [];
      if (!legend.length || !d || P2R_PROTOCOL_TYPES.indexOf(d.type) === -1) return out;

      if (d.type === 'tasas') {
        const seg = targetSegment(d);
        add(out, legend, used, 'base', 'Base del segmento objetivo', ['clientes', seg || 'clientes'], 'Primero fija qué segmento estás calculando; no arrastres la base del otro segmento.');
        add(out, legend, used, 'revolving', 'Tasa revolving correcta', ['% que revuelve', seg || 'revuelve'], 'Esta tasa pertenece al segmento objetivo; es la caja que suele cruzarse.');
        add(out, legend, used, 'interest', 'Tasa de interés anual', ['tasa de interés'], 'La tasa anual se aplica después de aislar la base revolvente correcta.');
      } else if (d.type === 'loyalty') {
        add(out, legend, used, 'base', 'Base elegible del programa', ['gasto elegible'], 'La base son los dólares elegibles, no todos los puntos como costo automático.');
        add(out, legend, used, 'redemption', 'Tasa que sí genera costo', ['tasa de redención'], 'Solo los puntos redimidos generan costo.');
        add(out, legend, used, 'breakage', 'Tasa que NO genera costo', ['breakage'], 'Breakage es el complemento que expira; no lo uses como redención.');
      } else if (d.type === 'mix') {
        add(out, legend, used, 'rate-a', 'Tasa del producto A', ['take rate'], 'Cada producto conserva su tasa; el cambio viene del peso.');
        add(out, legend, used, 'rate-b', 'Tasa del producto B', ['take rate'], 'No promedies simple: las tasas viven en productos distintos.');
        add(out, legend, used, 'projected-mix', 'Mix proyectado como peso', ['mix proyectado'], 'El blended pedido usa el mix futuro, no el de hoy.');
        add(out, legend, used, 'base', 'GDV / base de volumen', ['gdv'], 'Solo entra si la pregunta pide impacto en revenue.');
      } else if (d.type === 'percliente') {
        add(out, legend, used, 'spend', 'Gasto/base anual', ['gasto con la tarjeta'], 'Convierte la base mensual a anual antes de aplicar tasas.');
        add(out, legend, used, 'interchange', 'Tasa de interchange', ['tasa de interchange'], 'Interchange aplica sobre el gasto anual.');
        add(out, legend, used, 'interest', 'Tasa de interés anual', ['tasa de interés'], 'Interés se aplica solo a la parte revolvente.');
        add(out, legend, used, 'revolver', 'Dato para derivar revolvente', ['clientes que pagan a tiempo'], 'No es la base del interés: la base revolvente es 1 menos este dato.');
      }
      return out.slice(0, 4);
    }

  // Persistent per-drill completion tracking (stored in state for streak + dots)
  function drillDone(type, idx) {
    if (!state.drillCompletions) state.drillCompletions = {};
    if (!state.drillCompletions[type]) state.drillCompletions[type] = {};
    return !!state.drillCompletions[type][idx];
  }
  function markDrillDone(type, idx, isCorrect) {
    if (!state.drillCompletions) state.drillCompletions = {};
    if (!state.drillCompletions[type]) state.drillCompletions[type] = {};
    const generated = DRILL_TYPES[type] && DRILL_TYPES[type].generated;
    // Only mark as "done" if the user got it correct — otherwise they should retry
    if (isCorrect) {
      // Infinite/generated types never write per-index completion keys (no unbounded disk churn).
      // The session counter lives in memory (drillsState.mathDone); only the aggregate count persists.
      if (!generated) state.drillCompletions[type][idx] = true;
      state.drillHistory[type] = (state.drillHistory[type] || 0) + 1;
      registerSession();
    } else {
      saveState();
    }
  }

  // ════════ ENGANCHE math infinito — adaptador motor (MCMATH) → contrato de la base ════════
  // Radar: incrementa un patrón de error (port fiel de bumpPat del donante). Solo P1–P4 (MCMATH.PAT) cuentan.
  function bumpMathPat(p, ok) {
    if (!p || !MCMATH.PAT[p]) return;
    if (!state.mathPats) state.mathPats = {};                       // ultra-defensivo (load ya lo inicializa)
    const s = state.mathPats[p] = state.mathPats[p] || { ok: 0, tot: 0 };
    s.tot++;
    if (ok) s.ok++;
  }
  // Registra el tiempo (segundos) de un drill de math generado. Mismo gate que bumpMathPat:
  // solo P1–P4, rolling de los últimos 30 por patrón. Display-only — no afecta grading.
  function recordMathTime(p, sec) {
    if (!p || !MCMATH.PAT[p]) return;            // mismo gate que bumpMathPat: solo P1–P4
    if (!isFinite(sec) || sec <= 0 || sec > 600) return;
    if (!state.mathTimes) state.mathTimes = {};
    const arr = Array.isArray(state.mathTimes[p]) ? state.mathTimes[p] : (state.mathTimes[p] = []);
    arr.push(Math.round(sec * 10) / 10);
    if (arr.length > 30) state.mathTimes[p] = arr.slice(-30);   // rolling, últimos 30
  }
  // Metas de tiempo por patrón (segundos). TUNABLE, display-only — NO frozen, no entra a grading.
  const MATH_TARGET = { P1: 15, P2D: 20, P2R: 25, P3: 30, P4: 25 };
  // Mediana de una muestra de tiempos (robusta a outliers); null con menos de 3 muestras (F1: n<3 = ruido, no señal).
  function mathMedian(arr){
    if(!Array.isArray(arr) || arr.length < 3) return null;
    const s = arr.slice().sort((a,b)=>a-b), m = Math.floor(s.length/2);
    return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
  }
  // Cruza accuracy (mathPats) × velocidad (mediana de mathTimes vs MATH_TARGET) → etiqueta diagnóstica.
  function mathSpeedTag(p){
    const mp = (state.mathPats||{})[p]; const med = mathMedian((state.mathTimes||{})[p]);
    if(!mp || !mp.tot || med == null) return null;
    const acc = mp.ok / mp.tot, fast = med <= (MATH_TARGET[p] || 30);
    if(acc >= 0.7 && !fast) return { label: 'preciso pero lento',   cls: 'tag-warn' };
    if(acc <  0.7 &&  fast) return { label: 'rápido pero impreciso', cls: 'tag-warn' };
    if(acc <  0.7 && !fast) return { label: 'lento e impreciso',     cls: 'tag-bad'  };
    return { label: 'sólido', cls: 'tag-ok' };
  }
  // Total de intentos registrados en el radar (para detectar el estado "sin datos").
  function mathPatsTotal() {
    let n = 0; const mp = state.mathPats || {};
    for (const p in mp) { if (mp[p] && typeof mp[p].tot === 'number') n += mp[p].tot; }
    return n;
  }
  // Token corto para el placeholder del input según el kind del drill generado.
  function mcUnitToken(kind){
    if (kind === 'pct')    return '%';
    if (kind === 'years')  return 'años';
    if (kind === 'sizing') return '$ (orden de magnitud)';
    if (kind === 'number') return '';
    return '$';
  }
  // Tabla de datos (Dato | Valor | Alcance | Periodo) — defensa estructural anti-P2. Re-skineada a tokens MBB.
  function mcLegendHTML(legend){
    if (!legend || !legend.length) return '';
    return '<div class="mc-legend"><div class="mc-legend-title">◈ Leyenda de datos</div>'
      + '<table><thead><tr><th>Dato</th><th>Valor</th><th>Alcance</th><th>Periodo</th></tr></thead><tbody>'
      + legend.map(function(r){ return '<tr><td>' + escapeHtml(r.l) + '</td><td class="mc-mono">' + escapeHtml(r.v)
          + '</td><td>' + escapeHtml(r.s) + '</td><td>' + escapeHtml(r.p) + '</td></tr>'; }).join('')
      + '</tbody></table></div>';
  }
  // Adapta un drill del donante al contrato que consume renderMathDrill, SIN tocar el motor:
  //  · tolerance derivada de MCMATH.tolFor → grading idéntico a tolOK del donante (invariante #1)
  //  · steps[] (split del ledger) alimenta el Verbalize mode (intacto)
  //  · commonMistakes arrastra el `pat` de cada distractor → el radar bumpea el patrón correcto
  function mcToBase(d){
    const tol = MCMATH.tolFor(d.answer, d.kind);
    return {
      prompt: d.scenario,
      answer: d.answer,
      tolerance: tol,
      unit: mcUnitToken(d.kind),
      steps: String(d.steps).split('\n'),
      commonMistakes: (d.distractors || []).map(function(x){ return {
        value: x.v,
        tolerance: tol,
        diagnosis: x.why,
        pat: (x.p && x.p.id && MCMATH.PAT[x.p.id]) ? x.p.id : null
      }; }),
      __mc: {
        kind: d.kind,
        ask: d.ask,
        pats: d.pats || [],
        eyebrow: d.eyebrow || '',
        unitNote: d.unitNote || '',
        ansFmt: MCMATH.fmtAns(d.answer, d.kind),
        legendHTML: mcLegendHTML(d.legend)
      }
    };
  }
  // Genera un drill nuevo ya adaptado; el nivel sube con cuántos llevas en la sesión.
  // Brick B: si drillsState.mathFocus apunta a un patrón con drills mapeados en MCMATH.PRACT,
  // el tipo sale SOLO de PRACT[foco]; sin foco (o patrón sin mapeo) → null = uniforme (comportamiento original).
  // Único punto de generación → cubre la siembra (ensureMathSession) y el next-drill sin tocar los call sites.
  function mcGenAdapted(){
    const lv = 1 + Math.min(2, Math.floor(DRILL_TYPES.math.drills.length / 4));
    const focusArr = drillsState.mathFocus ? MCMATH.PRACT[drillsState.mathFocus] : null;
    const genType = (focusArr && focusArr.length)
      ? focusArr[Math.floor(Math.random() * focusArr.length)]   // pick() es privado del IIFE — Math.random basta acá
      : null;
    return mcToBase(MCMATH.gen(genType, lv));
  }
  // Siembra/extiende la sesión de math en memoria (array growable). NO escribe nada en disco.
  function ensureMathSession(reset){
    const arr = DRILL_TYPES.math.drills;
    if (reset) arr.length = 0;
    if (arr.length === 0) arr.push(mcGenAdapted());
    return arr;
  }

  function ensureProtocolRep() {
    const src = (DRILL_TYPES.protocolo.drills || [])[drillsState.drillIdx] || PROTOCOL_DRILLS[0];
    const srcType = src && src.p2rType;
    if (!drillsState.protDrill || drillsState.protSourceIdx !== drillsState.drillIdx || drillsState.protSourceType !== srcType) {
      const lv = srcType === 'tasas' ? 1 : 2;   // tasas lv1 fuerza un segmento objetivo, no total
      let d = null, slots = [];
      for (let tries = 0; tries < 4 && slots.length < 2; tries++) {
        d = MCMATH.gen(srcType, lv);
        slots = P2R_LABELS.forDrill(d);
      }
      drillsState.protSourceIdx = drillsState.drillIdx;
      drillsState.protSourceType = srcType;
      drillsState.protDrill = d;
      drillsState.protSlots = slots;
      drillsState.protLabelPicks = {};
      drillsState.protLabelsChecked = false;
      drillsState.protLabelsOK = false;
      drillsState.protLabelsFirstTry = true;
      drillsState.protValue = '';
      drillsState.protResult = null;
      drillsState.protCommitted = false;
    }
    return drillsState.protDrill;
  }

  // ── Brick C: timer de 90s del drill de Ambigüedad ──
  // Countdown visible desde que se abre el drill; a 0 marca "fuera de tiempo" (rojo)
  // pero NO bloquea escribir ni revela solo — en entrevista seguirías hablando.
  // El tick actualiza el DOM por id (sin renderDrills: un re-render se comería el foco
  // de los textareas). El reloj es monotónico: cambiar de tab NO regala tiempo.
  const AMB_LIMIT_SEC = 90;
  let ambTimerInterval = null;
  function fmtAmbClock(sec) {
    const s = Math.max(0, Math.round(sec));
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }
  function startAmbTimer() {
    if (!drillsState.ambStartMs) drillsState.ambStartMs = Date.now();  // parte UNA vez por drill; resetDrillDetailState lo limpia
    if (ambTimerInterval) return;                                       // idempotente: un re-render no reinicia el reloj
    ambTimerInterval = setInterval(tickAmbTimer, 250);
    tickAmbTimer();
  }
  function stopAmbTimer() {
    if (ambTimerInterval) {
      clearInterval(ambTimerInterval);
      ambTimerInterval = null;
    }
  }
  function tickAmbTimer() {
    const el = document.getElementById('amb-timer');
    if (!el) { stopAmbTimer(); return; }   // el nodo se fue (otra vista/tab) → higiene
    const remain = AMB_LIMIT_SEC - (Date.now() - drillsState.ambStartMs) / 1000;
    if (remain <= 0) {
      el.textContent = 'Fuera de tiempo';
      el.classList.add('amb-over');
      stopAmbTimer();                      // estado terminal del countdown; el reloj real sigue en ambStartMs
    } else {
      el.textContent = fmtAmbClock(remain);
    }
  }

  // ── M3: timer de 3:00 del drill "Diseña el experimento" ──
  // Clon disciplinado del patrón Brick C: countdown visible, a 0 marca "fuera de
  // tiempo" pero NO bloquea ni revela solo (en la sala seguirías hablando). Tick por
  // id sin renderDrills; reloj monotónico (expStartMs) — cambiar de tab no regala
  // tiempo. fmtAmbClock se reusa read-only (función pura).
  const EXP_LIMIT_SEC = 180;
  let expTimerInterval = null;
  function startExpTimer() {
    if (!drillsState.expStartMs) drillsState.expStartMs = Date.now();  // parte UNA vez por drill; resetDrillDetailState lo limpia
    if (expTimerInterval) return;                                       // idempotente: un re-render no reinicia el reloj
    expTimerInterval = setInterval(tickExpTimer, 250);
    tickExpTimer();
  }
  function stopExpTimer() {
    if (expTimerInterval) {
      clearInterval(expTimerInterval);
      expTimerInterval = null;
    }
  }
  function tickExpTimer() {
    const el = document.getElementById('exp-timer');
    if (!el) { stopExpTimer(); return; }   // el nodo se fue (otra vista/tab) → higiene
    const remain = EXP_LIMIT_SEC - (Date.now() - drillsState.expStartMs) / 1000;
    if (remain <= 0) {
      el.textContent = 'Fuera de tiempo';
      el.classList.add('amb-over');
      stopExpTimer();                      // estado terminal del countdown; el reloj real sigue en expStartMs
    } else {
      el.textContent = fmtAmbClock(remain);
    }
  }

  function renderDrills() {
    const root = document.getElementById('drills-root');
    if (!root) return;
    switch (drillsState.view) {
      case 'hub':    root.innerHTML = renderDrillsHub();    break;
      case 'list':   root.innerHTML = renderDrillsList();   break;
      case 'detail': root.innerHTML = renderDrillsDetail(); break;
    }
    if (!drillsMounted) {
      root.addEventListener('click', handleDrillsClick);
      root.addEventListener('input', handleDrillsInput);
      root.addEventListener('change', handleDrillsInput);
      root.addEventListener('keydown', handleDrillsKeydown);
      drillsMounted = true;
    }
    // Brick C: el timer de Ambigüedad vive atado al render — corre solo con el detail
    // de ambigüedad visible y sin revelar; cualquier otra vista dentro de drills lo mata.
    // (Salidas 1 y 2: siguiente drill y volver al hub pasan por acá. La 3ª — switchTab
    // fuera de drills — se cubre en switchTab con el mismo patrón del recall timer.)
    if (drillsState.view === 'detail' && drillsState.type === 'ambiguedad' && !drillsState.revealed) startAmbTimer();
    else stopAmbTimer();
    // M3: mismo contrato para el timer del drill de experimento (salidas 1 y 2 acá; la 3ª en switchTab)
    if (drillsState.view === 'detail' && drillsState.type === 'experimento' && !drillsState.revealed) startExpTimer();
    else stopExpTimer();
  }

  function countDone(type) {
    const entries = (state.drillCompletions && state.drillCompletions[type]) || {};
    return Object.keys(entries).filter(k => entries[k]).length;
  }

  function renderDrillsHub() {

        desc: 'Mental math de negocio, infinito y correcto por construcción, con radar de patrones de error.' },
      { key: 'mece',       title: 'Chequeo MECE',          iconSvg: '<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',

      { key: 'experimento', title: 'Diseña el experimento', iconSvg: '<path d="M9 3h6"/><path d="M10 3v6l-4.5 8.5A2 2 0 0 0 7.3 21h9.4a2 2 0 0 0 1.8-3.5L14 9V3"/><line x1="8" y1="15" x2="16" y2="15"/>',
        desc: 'Situación de negocio → produce las 6 piezas del diseño Test & Learn contra 3 minutos.' },
      { key: 'protocolo', title: 'Protocolo P2R', iconSvg: '<path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h10"/><circle cx="18" cy="17" r="2"/>',
        desc: 'Etiqueta las bases y tasas confundibles antes de liberar el cálculo.' }
    ];
    return `
      <div class="cases-header">
        <div class="cases-title">Drills de habilidades aisladas</div>
        <div class="cases-subtitle">Práctica de reconocimiento de patrones + generación en ocho áreas de habilidad. Entrena un tipo cuando tengas 5–10 minutos.</div>
      </div>
      ${types.map(t => {
        const gen = DRILL_TYPES[t.key].generated;
        const total = DRILL_TYPES[t.key].drills.length;
        const done = countDone(t.key);
        const meta = gen ? ('∞ · ' + escapeHtml(t.desc)) : (done + '/' + total + ' completos · ' + escapeHtml(t.desc));
        return `
          <button class="drill-hub-card" data-action="drill-open-type" data-type="${t.key}">
            <div class="drill-hub-icon ${t.key}">
              <svg viewBox="0 0 24 24">${t.iconSvg}</svg>
            </div>
            <div class="drill-hub-body">
              <div class="drill-hub-title">${t.title}</div>
              <div class="drill-hub-meta">${meta}</div>
            </div>
            <svg class="drill-hub-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        `;
      }).join('')}
    `;
  }

  function renderDrillsList() {
    const type = DRILL_TYPES[drillsState.type];
    const total = type.drills.length;
    const done = countDone(drillsState.type);
    return `
      <button class="back-btn" data-action="drill-back-to-hub">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Volver a drills
      </button>
      <div class="cases-header">
        <div class="cases-title">${type.label}</div>
        <div class="cases-subtitle">${done} de ${total} completos. Cada drill toma 30–60 segundos. Las respuestas incorrectas no se bloquean — puedes reintentar.</div>
      </div>
      ${type.drills.map((d, i) => `
        <div class="drill-list-item" data-action="drill-open" data-index="${i}">
          <div class="drill-list-num">${String(i+1).padStart(2,'0')}</div>
          <div class="drill-list-prompt">${escapeHtml(d.prompt)}</div>
          <div class="drill-list-status ${drillDone(drillsState.type, i) ? 'done' : 'new'}"></div>
        </div>
      `).join('')}
    `;
  }

  function renderDrillsDetail() {
    const type = DRILL_TYPES[drillsState.type];
    const gen = type.generated;
    if (gen) ensureMathSession(false);           // ensure the session has at least one drill before indexing
    const total = type.drills.length;
    const idx = drillsState.drillIdx;
    const drill = type.drills[idx];

    let body = '';
    switch (drillsState.type) {
      case 'hypothesis': body = renderHypothesisDrill(drill); break;
      case 'math':       body = renderMathDrill(drill);       break;
      case 'mece':       body = renderMECEDrill(drill);       break;
      case 'synthesis':  body = renderSynthesisDrill(drill);  break;
      case 'builder':    body = renderBuilderDrill(drill);    break;
      case 'sizing':     body = renderSizingDrill(drill);     break;
      case 'ambiguedad': body = renderAmbiguityDrill(drill);  break;
      case 'experimento': body = renderExperimentDrill(drill); break;   // M3
      case 'protocolo':  body = renderProtocolDrill(drill);    break;   // M10
    }

    const backAction = gen ? 'drill-back-to-hub' : 'drill-back-to-list';
    const backLabel  = gen ? 'Volver a drills' : ('Todos los drills de ' + type.label.toLowerCase());
    const progress   = gen
      ? (type.label + ' · Drill #' + (idx + 1) + ' · ' + (drillsState.mathDone || 0) + ' correctos esta sesión')
      : (type.label + ' · Drill ' + (idx + 1) + ' de ' + total);
    const prevLabel  = gen ? '← Anterior' : '← Anterior';
    const nextLabel  = gen ? 'Siguiente →' : 'Siguiente →';
    const nextDisabled = gen ? false : (idx === total - 1);   // generated: "Siguiente" appends a new drill, never disabled

    return `
      <button class="back-btn" data-action="${backAction}">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        ${backLabel}

      ${body}
      <div class="drill-nav-row">
        <button class="reveal-btn" style="background:var(--bg-elevated);border-style:solid;border-color:var(--border-mid);color:var(--text-1)"
                data-action="drill-prev" ${idx === 0 ? 'disabled' : ''}>${prevLabel}</button>
        <button class="reveal-btn"
                data-action="drill-next" ${nextDisabled ? 'disabled' : ''}>${nextLabel}</button>
      </div>
