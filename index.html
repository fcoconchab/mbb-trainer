  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
}
.fit-section.strong   { border-color: rgba(34,197,94,0.28);  background: var(--emerald-bg); }
.fit-section.opener   { border-left: 2px solid var(--gold);  background: var(--gold-bg); }
.fit-section.trap     { border-color: rgba(239,68,68,0.28);  background: var(--red-bg); }
.fit-section.angle    { border-left: 2px solid var(--blue);  background: var(--blue-bg); }
.fit-section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: var(--sp-2);
}
.fit-section.strong .fit-section-label { color: var(--emerald); }
.fit-section.opener .fit-section-label { color: var(--gold); }
.fit-section.trap   .fit-section-label { color: var(--red); }
.fit-section.angle  .fit-section-label { color: var(--blue); }
.fit-section-body {
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.6;
}
.fit-section-body strong { font-weight: 600; }
.fit-section.opener .fit-section-body {
  font-family: var(--font-display);
  font-size: 15px;
  font-style: italic;
  line-height: 1.5;
}
.fit-section-subhead {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.10em;
  color: var(--text-3);
  margin-top: var(--sp-3);
  margin-bottom: 4px;
  text-transform: uppercase;
}

/* ============================================================
   PROGRESS TAB — analytics
   ============================================================ */
.progress-header {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-2);
  margin-bottom: var(--sp-5);
}
.progress-tile {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--sp-4) var(--sp-3);
  text-align: center;
}
.progress-tile-value {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}
.progress-tile-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.10em;
  color: var(--text-2);
  text-transform: uppercase;
}

.progress-section-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-1);
  margin-top: var(--sp-5);
  margin-bottom: var(--sp-3);
}
.progress-fw-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-3);
}
.progress-fw-head {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: var(--sp-3);
}
.progress-fw-name {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-1);
  flex: 1;
}
.progress-fw-pct {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-1);
}
.progress-fw-bar {
  height: 4px;
  background: var(--bg-input);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: var(--sp-3);
}
.progress-fw-bar-fill {
  height: 100%;
  transition: width 0.6s ease;
}
.progress-branches {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-2);
}
.progress-branch {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: var(--bg-elevated);
  border-radius: var(--r-sm);
  font-size: 11.5px;
}
.progress-branch-name {
  flex: 1;
  color: var(--text-2);
}
.progress-branch-score {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-1);
}
.progress-branch-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.weakest-callout {
  background: var(--amber-bg);
  border: 1px solid rgba(245,158,11,0.25);
  border-left: 2px solid var(--amber);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-4);
}
.weakest-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 6px;
}
.weakest-branch {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: 4px;
}
.weakest-body {
  font-size: 12.5px;
  color: var(--text-1);
  line-height: 1.5;
}

.progress-drill-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: var(--sp-2);
  align-items: center;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-2);
}
.progress-drill-name {
  font-size: 13px;
  color: var(--text-1);
}
.progress-drill-bar {
  width: 80px;
  height: 3px;
  background: var(--bg-input);
  border-radius: 2px;
  overflow: hidden;
}
.progress-drill-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.6s ease;
}
.progress-drill-count {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-2);
  min-width: 40px;
  text-align: right;
}

.reset-zone {
  margin-top: var(--sp-6);
  padding: var(--sp-4);
  border: 1px dashed var(--red);
  border-radius: var(--r-md);
  background: var(--red-bg);
}
.reset-zone-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--red);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.reset-zone-body {
  font-size: 12.5px;
  color: var(--text-1);
  line-height: 1.55;
  margin-bottom: var(--sp-3);
}
.reset-btn {
  width: 100%;
  padding: 12px;
  background: var(--red-bg);
  border: 1px solid rgba(239,68,68,0.35);
  border-radius: var(--r-md);
  color: var(--red);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--t-fast);
}
.reset-btn:active { background: rgba(239,68,68,0.10); transform: scale(0.99); }
.reset-confirm {
  padding: var(--sp-3);
  background: var(--bg-elevated);
  border: 1px solid var(--red);
  border-radius: var(--r-md);
  margin-top: var(--sp-3);
  font-size: 12.5px;
  color: var(--text-1);
  line-height: 1.5;
}
.reset-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
}
.reset-actions button {
  padding: 10px;
  border-radius: var(--r-sm);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid transparent;
}
.reset-cancel  { background: var(--bg-card);    color: var(--text-1); border-color: var(--border-mid); }
.reset-confirm-btn { background: var(--red);       color: #07080f; }
.reset-cancel:active, .reset-confirm-btn:active { transform: scale(0.96); }

/* ============================================================
   ONBOARDING — first-time user welcome on Dashboard
   ============================================================ */
.onboard-hero {
  background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.03));
  border: 1px solid var(--gold-border);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  margin-bottom: var(--sp-5);
  position: relative;
  overflow: hidden;
}
.onboard-hero::before {
  content: '';
  position: absolute;
  top: -30%;
  right: -10%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(201,168,76,0.18), transparent 70%);
  pointer-events: none;
}
.onboard-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: var(--sp-2);
  position: relative;
}
.onboard-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.2;
  margin-bottom: var(--sp-2);
  position: relative;
}
.onboard-body {
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.6;
  margin-bottom: var(--sp-4);
  position: relative;
}
.onboard-steps { position: relative; }
.onboard-step {
  display: flex;
  gap: var(--sp-3);
  align-items: flex-start;
  padding: 12px 0;
  border-top: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  transition: transform var(--t-fast);
}
.onboard-step:active { transform: scale(0.99); }
.onboard-step-num {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--gold);
  color: #07080f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
}
.onboard-step-text {
  flex: 1;
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.5;
}
.onboard-step-text strong { color: var(--gold); font-weight: 600; }
.onboard-step-chev {
  color: var(--text-3);
  flex-shrink: 0;
  width: 14px;
  height: 14px;
  margin-top: 6px;
}

/* Pattern insight card on Dashboard (for returning users with data) */
.insight-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-mid);
  border-left: 3px solid var(--blue);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-4);
  cursor: pointer;
  transition: all var(--t-fast);
}
.insight-card:active { transform: scale(0.995); background: var(--bg-card); }
.insight-card:hover { border-color: var(--blue); }
.insight-card.warning    { border-left-color: var(--amber); }
.insight-card.celebration{ border-left-color: var(--emerald); }
.insight-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 6px;
}
.insight-card.warning     .insight-label { color: var(--amber); }
.insight-card.celebration .insight-label { color: var(--emerald); }
.insight-headline {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.3;
  margin-bottom: 4px;
}
.insight-detail {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.5;
}
.insight-detail strong { color: var(--text-1); font-weight: 600; }

/* Learn → Recall transition CTA at end of framework */
.learn-drill-cta {
  background: var(--gold-bg);
  border: 1px solid var(--gold-border);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  margin-top: var(--sp-5);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.learn-drill-cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(201,168,76,0.12), transparent 60%);
  pointer-events: none;
}
.learn-drill-cta-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 8px;
  position: relative;
}
.learn-drill-cta-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.3;
  margin-bottom: 6px;
  position: relative;
}
.learn-drill-cta-body {
  font-size: 12.5px;
  color: var(--text-2);
  margin-bottom: var(--sp-4);
  line-height: 1.5;
  position: relative;
}
.learn-drill-cta-btn {
  display: inline-block;
  padding: 12px 20px;
  background: var(--gold);
  color: #07080f;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  border: none;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: transform var(--t-fast);
  position: relative;
}
.learn-drill-cta-btn:active { transform: scale(0.96); }

/* Math drill: verbalize-first mode */
.verbalize-toggle {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: 10px var(--sp-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-3);
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  color: var(--text-2);
  transition: all var(--t-fast);
}
.verbalize-toggle:active { transform: scale(0.99); }
.verbalize-toggle.active {
  border-color: var(--gold-border);
  background: var(--gold-bg);
  color: var(--text-1);
}
.verbalize-checkbox {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--t-fast);
}
.verbalize-toggle.active .verbalize-checkbox {
  background: var(--gold);
  border-color: var(--gold);
}
.verbalize-toggle.active .verbalize-checkbox::after {
  content: '';
  display: block;
  width: 5px;
  height: 8px;
  border: 2px solid #07080f;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translateY(-1px);
}
.verbalize-label strong { color: var(--text-1); }
.verbalize-hint {
  display: block;
  font-size: 10.5px;
  color: var(--text-3);
  margin-top: 2px;
  font-family: var(--font-mono);
}
.verbalize-step-block {
  padding: var(--sp-4);
  background: var(--bg-elevated);
  border: 1px dashed var(--gold-border);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-3);
  animation: tabFadeIn var(--t-mid) forwards;
}
.verbalize-step-block-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: var(--sp-2);
}
.verbalize-step-block-body {
  font-size: 12.5px;
  color: var(--text-1);
  line-height: 1.55;
}
.verbalize-step-block-body strong { color: var(--gold); }

/* ============================================================
   ISSUE TREE — visual, interactive, MBB-style
   ============================================================ */
.tree-container {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-4);
  margin-bottom: var(--sp-4);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tree-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-3);
  gap: var(--sp-3);
}
.tree-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-1);
}
.tree-collapse-all {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-3);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 5px 9px;
  cursor: pointer;
  transition: all var(--t-fast);
}
.tree-collapse-all:active { transform: scale(0.96); color: var(--gold); }

/* Hypothesis pinned at the root */
.tree-root {
  background: var(--gold-bg);
  border: 1px solid var(--gold-border);
  border-left: 3px solid var(--gold);
  border-radius: var(--r-md);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-3);
}
.tree-root-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}
.tree-root-text {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  font-style: italic;
  color: var(--text-1);
  line-height: 1.4;
}

/* Tree branches (level 1) */
.tree-branches { padding-left: 0; }
.tree-branch {
  position: relative;
  margin-bottom: var(--sp-2);
}
.tree-branch:last-child { margin-bottom: 0; }
.tree-branch-head {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: var(--r-md);
  padding: 11px 14px;
  cursor: pointer;
  user-select: none;
  transition: all var(--t-fast);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-1);
}
.tree-branch-head:active { transform: scale(0.99); background: var(--bg-elevated); }
.tree-branch-head:hover { border-color: var(--border-mid); }
.tree-branch-toggle {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--text-3);
  transition: transform var(--t-fast);
}
.tree-branch.expanded .tree-branch-toggle { transform: rotate(90deg); }
.tree-branch-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.08em;
  flex-shrink: 0;
}
.tree-branch-name { flex: 1; }
.tree-branch-count {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  background: var(--bg-input);
  padding: 2px 7px;
  border-radius: var(--r-sm);
}

/* Expanded sub-items below a branch */
.tree-subs {
  display: none;
  padding: var(--sp-3) var(--sp-3) var(--sp-3) var(--sp-5);
  margin-top: 4px;
  margin-bottom: var(--sp-3);
  border-left: 2px solid var(--border);
  margin-left: 14px;
  position: relative;
}
.tree-branch.expanded .tree-subs { display: block; animation: tabFadeIn var(--t-mid) forwards; }
.tree-sub {
  padding: 7px 0;
  font-size: 12.5px;
  color: var(--text-1);
  line-height: 1.5;
  position: relative;
  padding-left: 16px;
}
.tree-sub::before {
  content: '';
  position: absolute;
  left: 0;
  top: 14px;
  width: 8px;
  height: 1px;
  background: var(--border-mid);
}
.tree-sub-lead {
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: 3px;
  display: block;
}
.tree-sub-detail {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.5;
  margin-left: 0;
  display: block;
}

/* Branch color variants — match framework dots */
.tree-branch.color-gold    .tree-branch-head { border-left-color: var(--gold); }
.tree-branch.color-emerald .tree-branch-head { border-left-color: var(--emerald); }
.tree-branch.color-blue    .tree-branch-head { border-left-color: var(--blue); }
.tree-branch.color-amber   .tree-branch-head { border-left-color: var(--amber); }
.tree-branch.color-pink    .tree-branch-head { border-left-color: #ec4899; }
.tree-branch.color-purple  .tree-branch-head { border-left-color: var(--purple); }

/* ============================================================
   BUILD YOUR TREE — drill type
   ============================================================ */
.builder-pool {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--sp-3);
  margin-bottom: var(--sp-4);
}
.builder-pool-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: var(--sp-2);
}
.builder-pool-tiles {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.builder-tile {
  padding: 8px 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 12px;
  color: var(--text-1);
  cursor: pointer;
  transition: all var(--t-fast);
  user-select: none;
}
.builder-tile:active { transform: scale(0.96); }
.builder-tile:hover { border-color: var(--border-mid); }
.builder-tile.placed { opacity: 0.35; pointer-events: none; }
.builder-slots {
  margin-bottom: var(--sp-3);
}
.builder-slot {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-3);
  background: var(--bg-card);
  border: 1px dashed var(--border-mid);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-2);
  min-height: 50px;
  font-size: 13px;
  color: var(--text-3);
  font-style: italic;
  transition: all var(--t-fast);
}
.builder-slot.filled {
  border-style: solid;
  border-color: var(--gold-border);
  background: var(--gold-bg);
  color: var(--text-1);
  font-style: normal;
  cursor: pointer;
}
.builder-slot-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.08em;
  flex-shrink: 0;
}
.builder-slot-content {
  flex: 1;
}
.builder-slot-clear {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--red);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0 4px;
}
.builder-judge {
  background: var(--bg-elevated);
  border: 1px solid var(--border-mid);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-top: var(--sp-3);
  margin-bottom: var(--sp-3);
}
.builder-judge-row {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: 8px 0;
  border-top: 1px solid var(--border);
  font-size: 12.5px;
}
.builder-judge-row:first-child { border-top: none; }
.builder-judge-row-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  flex: 1;
  color: var(--text-2);
}
.builder-judge-icon {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  width: 22px;
  text-align: center;
}
.builder-judge-icon.pass { color: var(--emerald); }
.builder-judge-icon.fail { color: var(--red); }
.builder-judge-detail {
  flex: 2;
  font-size: 12px;
  color: var(--text-1);
  line-height: 1.4;
}

/* Sizing drill specifics */
.sizing-step-block {
  padding: var(--sp-3);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-2);
}
.sizing-step-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.10em;
  color: var(--blue);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.sizing-step-text {
  font-size: 12.5px;
  color: var(--text-1);
  line-height: 1.5;
}
.sizing-step-text strong { color: var(--blue); }

@media (max-width: 380px) {
  :root { font-size: 14px; }
  .nav-label { font-size: 7.5px; }
  .streak-number { font-size: 72px; }
}
@media (min-width: 481px) {
  #bottom-nav { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}

/* ============================================================
   SYNTHESIS RECORDER (Brick 4) — overlay + CTA
   ============================================================ */
.synth-cta {
  width: 100%;
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  margin-top: var(--sp-3);
  padding: var(--sp-4) var(--sp-5);
  background: var(--gold-bg);
  border: 1px solid var(--gold-border);
  border-radius: var(--r-lg);
  color: var(--gold-light);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.01em;
  transition: background var(--t-fast), transform var(--t-fast);
}
.synth-cta:active { transform: scale(0.985); }
.synth-cta:hover { background: rgba(201,168,76,0.13); }
.synth-cta-rec {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 0 3px rgba(239,68,68,0.18);
  flex-shrink: 0;
}
.synth-cta-text { flex: 1; text-align: left; }
.synth-cta-count {
  min-width: 22px; height: 22px; padding: 0 6px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--gold); color: #07080f;
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  border-radius: var(--r-pill);
}

#synth-overlay { display: none; }
#synth-overlay.open {
  display: flex;
  position: fixed; inset: 0;
  z-index: 10000;
  align-items: center; justify-content: center;
  padding: var(--sp-4);
}
.synth-backdrop {
  position: absolute; inset: 0;
  background: rgba(3,4,9,0.78);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.synth-panel {
  position: relative;
  width: 100%; max-width: 440px;
  max-height: calc(100vh - 2 * var(--sp-4) - env(safe-area-inset-bottom, 0px));
  overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
  background: var(--bg-card);
  border: 1px solid var(--gold-border);
  border-radius: var(--r-xl);
  box-shadow: var(--gold-glow), 0 24px 64px rgba(0,0,0,0.6);
  padding: var(--sp-6) var(--sp-5) var(--sp-5);
  animation: synthIn var(--t-mid) cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes synthIn { from { opacity: 0; transform: translateY(14px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.synth-x {
  position: absolute; top: 10px; right: 10px;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  border-radius: var(--r-md);
  z-index: 2;
}
.synth-x:hover { color: var(--text-1); background: var(--bg-hover); }
.synth-x svg { stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; }

.synth-head { margin-bottom: var(--sp-4); padding-right: 28px; }
.synth-kicker {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--gold); margin-bottom: var(--sp-2);
}
.synth-kicker.rec { color: var(--red); animation: synthPulse 1.3s ease-in-out infinite; }
.synth-kicker.ok { color: var(--emerald); }
.synth-case-title {
  font-family: var(--font-display); font-size: 23px; line-height: 1.15;
  color: var(--text-1); font-weight: 600; margin-bottom: var(--sp-1);
}
.synth-case-prompt { font-size: 13.5px; line-height: 1.5; color: var(--text-2); }
.synth-recording-cue {
  font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.04em;
  color: var(--gold-light); margin-top: var(--sp-2);
}

.synth-prompt-fixed {
  background: var(--bg-elevated);
  border: 1px solid var(--border-mid);
  border-left: 3px solid var(--gold);
  border-radius: var(--r-md);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-4);
}
.synth-prompt-fixed-label {
  font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--gold); margin-bottom: 4px;
}
.synth-prompt-fixed-body { font-size: 13.5px; line-height: 1.5; color: var(--text-1); }
.synth-prompt-fixed-body strong { color: var(--gold-light); }

.synth-nomic, .synth-noaudio {
  background: var(--amber-bg);
  border: 1px solid rgba(245,158,11,0.22);
  border-radius: var(--r-md);
  padding: var(--sp-3) var(--sp-4);
  margin-bottom: var(--sp-4);
  font-size: 12.5px; line-height: 1.5; color: #d9b87a;
}

.synth-record-btn {
  width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: var(--sp-5);
  background: linear-gradient(180deg, rgba(239,68,68,0.12), rgba(239,68,68,0.05));
  border: 1px solid rgba(239,68,68,0.32);
  border-radius: var(--r-lg);
  color: var(--text-1);
  font-family: var(--font-body); font-size: 16px; font-weight: 600;
  transition: transform var(--t-fast), border-color var(--t-fast);
}
.synth-record-btn:active { transform: scale(0.98); }
.synth-record-btn:hover { border-color: rgba(239,68,68,0.5); }
.synth-record-dot {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 0 5px rgba(239,68,68,0.16);
  animation: synthPulse 1.6s ease-in-out infinite;
}
.synth-record-sub {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; color: var(--text-2); text-transform: uppercase;
}

.synth-timer { margin: var(--sp-5) 0 var(--sp-4); }
.synth-timer-sec {
  font-family: var(--font-mono); font-size: 56px; font-weight: 700;
  text-align: center; color: var(--gold-light); line-height: 1;
  margin-bottom: var(--sp-3);
  font-variant-numeric: tabular-nums;
}
.synth-timer-sec.urgent { color: var(--red); }
.synth-timer-track {
  height: 8px; border-radius: var(--r-pill);
  background: var(--bg-input); overflow: hidden;
}
.synth-timer-fill {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: var(--r-pill);
  transition: width 0.1s linear;
}
.synth-timer-fill.urgent { background: linear-gradient(90deg, var(--red-dim), var(--red)); }

.synth-stop-btn {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: var(--sp-2);
  padding: var(--sp-4);
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-lg);
  color: var(--text-1); font-size: 15px; font-weight: 600;
  transition: transform var(--t-fast), background var(--t-fast);
}
.synth-stop-btn:active { transform: scale(0.98); }
.synth-stop-btn:hover { background: var(--bg-hover); }
.synth-stop-square { width: 14px; height: 14px; border-radius: 3px; background: var(--red); }
.synth-recording-hint { margin-top: var(--sp-3); font-size: 12px; line-height: 1.5; color: var(--text-2); text-align: center; }

.synth-audio { width: 100%; margin-bottom: var(--sp-4); border-radius: var(--r-md); }

.synth-model {
  background: var(--bg-elevated);
  border: 1px solid var(--border-mid);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-bottom: var(--sp-4);
}
.synth-model-title {
  font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--gold); margin-bottom: var(--sp-3);
}
.synth-model-row {
  display: flex; gap: var(--sp-2); align-items: flex-start;
  font-size: 12.5px; line-height: 1.5; color: var(--text-1);
  padding: var(--sp-2) 0;
  border-top: 1px solid var(--border);
}
.synth-model-row:first-of-type { border-top: none; }
.synth-model-tag {
  flex-shrink: 0; min-width: 56px;
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  padding: 3px 6px; border-radius: var(--r-sm); text-align: center;
  margin-top: 1px;
}
.synth-model-tag.answer  { background: var(--gold-bg);    color: var(--gold-light);  border: 1px solid var(--gold-border); }
.synth-model-tag.support { background: var(--emerald-bg); color: #4ade80;            border: 1px solid rgba(34,197,94,0.22); }
.synth-model-tag.risk    { background: var(--red-bg);     color: #f87171;            border: 1px solid rgba(239,68,68,0.22); }
.synth-model-tag.next    { background: var(--blue-bg);    color: #60a5fa;            border: 1px solid rgba(59,130,246,0.22); }

.synth-rubric { margin-bottom: var(--sp-4); }
.synth-rubric-title {
  font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-2); margin-bottom: var(--sp-3);
}
.synth-axis {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-3) 0;
  border-top: 1px solid var(--border);
}
.synth-axis:first-of-type { border-top: none; }
.synth-axis-head { flex: 1; min-width: 0; }
.synth-axis-label { font-size: 13.5px; font-weight: 600; color: var(--text-1); }
.synth-axis-hint { font-size: 11.5px; line-height: 1.4; color: var(--text-2); margin-top: 2px; }
.synth-axis-btns { display: flex; gap: 6px; flex-shrink: 0; }
.synth-axis-btn {
  width: 38px; height: 38px; border-radius: var(--r-md);
  background: var(--bg-input);
  border: 1px solid var(--border-mid);
  color: var(--text-2);
  font-family: var(--font-mono); font-size: 15px; font-weight: 700;
  transition: all var(--t-fast);
}
.synth-axis-btn:hover { border-color: var(--gold-border); color: var(--text-1); }
.synth-axis-btn.sel {
  background: var(--gold); color: #07080f; border-color: var(--gold);
  box-shadow: 0 0 12px rgba(201,168,76,0.3);
}

.synth-save-btn {
  width: 100%;
  padding: var(--sp-4);
  background: var(--gold); color: #07080f;
  border-radius: var(--r-lg);
  font-size: 15px; font-weight: 700; letter-spacing: 0.01em;
  transition: transform var(--t-fast), opacity var(--t-fast);
}
.synth-save-btn:active { transform: scale(0.98); }
.synth-save-btn.disabled {
  background: var(--bg-input); color: var(--text-3);
  pointer-events: none; cursor: default;
}

.synth-saved-score {
  text-align: center; padding: var(--sp-5) 0 var(--sp-4);
}
.synth-saved-num {
  font-family: var(--font-mono); font-size: 52px; font-weight: 700;
  color: var(--emerald); line-height: 1;
}
.synth-saved-num span { font-size: 24px; opacity: 0.5; }
.synth-saved-label {
  font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-2); margin-top: var(--sp-2);
}
.synth-review-actions { display: flex; gap: var(--sp-3); margin-top: var(--sp-4); }
.synth-redo-btn, .synth-done-btn {
  flex: 1; padding: var(--sp-4);
  border-radius: var(--r-lg); font-size: 14px; font-weight: 600;
  transition: transform var(--t-fast);
}
.synth-redo-btn { background: var(--bg-elevated); border: 1px solid var(--border-mid); color: var(--text-1); }
.synth-done-btn { background: var(--gold); color: #07080f; }
.synth-redo-btn:active, .synth-done-btn:active { transform: scale(0.98); }

.synth-history { margin-top: var(--sp-4); }
.synth-history-title {
  font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-2); margin-bottom: var(--sp-2);
}
.synth-hist-row {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  margin-bottom: 6px;
}
.synth-hist-score {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  padding: 2px 8px; border-radius: var(--r-sm);
}
.synth-hist-score.hi  { background: var(--emerald-bg); color: #4ade80; }
.synth-hist-score.mid { background: var(--gold-bg);    color: var(--gold-light); }
.synth-hist-score.lo  { background: var(--red-bg);     color: #f87171; }
.synth-hist-date { flex: 1; font-size: 12.5px; color: var(--text-2); }
.synth-hist-dur { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }

@keyframes synthPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

/* ════ Brick D — modo estructurado del recorder (prefijo syn-struct-) ════ */
.syn-struct-toggle {
  display: flex; align-items: flex-start; gap: 10px; width: 100%;
  margin-bottom: var(--sp-3); padding: 12px 14px; text-align: left;
  background: var(--surface-2, rgba(255,255,255,0.03)); color: var(--text-1);
  border: 1px solid var(--border, rgba(255,255,255,0.10)); border-radius: var(--r-md);
  cursor: pointer; font: inherit;
}
.syn-struct-toggle.on { border-color: var(--gold, #c9a84c); background: var(--gold-bg, rgba(201,168,76,0.10)); }
.syn-struct-toggle-box {
  flex: 0 0 auto; width: 20px; height: 20px; margin-top: 1px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--border, rgba(255,255,255,0.25)); border-radius: 5px;
  font-size: 13px; color: var(--gold, #c9a84c);
}
.syn-struct-toggle.on .syn-struct-toggle-box { border-color: var(--gold, #c9a84c); }
.syn-struct-toggle-text { font-size: 13px; line-height: 1.45; color: var(--text-2); }
.syn-struct-toggle-text strong { color: var(--text-1); }
.syn-struct-toggle-sub { display: block; margin-top: 2px; font-size: 11.5px; color: var(--text-3); }
.syn-struct-count {
  margin: var(--sp-2) auto 0; width: fit-content; padding: 4px 12px;
  font-family: var(--font-mono); font-size: 13px; color: var(--gold-light, #d8bc6a);
  background: var(--gold-bg, rgba(201,168,76,0.10)); border-radius: var(--r-sm);
}
.syn-struct-count.over { color: #f87171; background: var(--red-bg, rgba(248,113,113,0.12)); font-weight: 600; }
.syn-struct-overtime {
  margin-bottom: var(--sp-3); padding: 8px 12px; font-size: 12.5px;
  color: #f87171; background: var(--red-bg, rgba(248,113,113,0.12)); border-radius: var(--r-sm);
}
.syn-struct-fields { display: flex; flex-direction: column; gap: var(--sp-3); margin-bottom: var(--sp-3); }
.syn-struct-field { display: flex; flex-direction: column; gap: 6px; }
.syn-struct-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }
.syn-struct-input {
  width: 100%; padding: 10px 12px; font: inherit; font-size: 14px;
  color: var(--text-1); background: var(--surface-2, rgba(255,255,255,0.03));
  border: 1px solid var(--border, rgba(255,255,255,0.12)); border-radius: var(--r-sm);
}
.syn-struct-input:focus { outline: none; border-color: var(--gold, #c9a84c); }
.syn-struct-grade-btn {
  display: block; width: 100%; padding: 13px; font: inherit; font-size: 15px; font-weight: 600;
  color: #0c0d14; background: var(--gold, #c9a84c); border: none; border-radius: var(--r-md); cursor: pointer;
}
.syn-struct-grade-btn:active { transform: scale(0.98); }
.syn-struct-grade-hint { margin-top: var(--sp-2); font-size: 11.5px; color: var(--text-3); text-align: center; }
.syn-struct-verdict {
  margin-bottom: var(--sp-3); padding: 12px 14px; border-radius: var(--r-md); border: 1px solid;
}
.syn-struct-verdict.pass { border-color: rgba(74,222,128,0.4); background: var(--emerald-bg, rgba(74,222,128,0.08)); }
.syn-struct-verdict.fail { border-color: rgba(248,113,113,0.4); background: var(--red-bg, rgba(248,113,113,0.08)); }
.syn-struct-verdict-head { font-size: 14px; font-weight: 700; }
.syn-struct-verdict.pass .syn-struct-verdict-head { color: #4ade80; }
.syn-struct-verdict.fail .syn-struct-verdict-head { color: #f87171; }
.syn-struct-missing { margin: 8px 0 0; padding-left: 18px; font-size: 12.5px; line-height: 1.6; color: var(--text-2); }
.syn-struct-verdict-time { margin-top: 6px; font-size: 12px; color: #f87171; }
.syn-struct-frozen {
  margin-bottom: var(--sp-3); padding: 12px 14px;
  background: var(--surface-2, rgba(255,255,255,0.03));
  border: 1px solid var(--border, rgba(255,255,255,0.08)); border-radius: var(--r-md);
}
.syn-struct-frozen-title { margin-bottom: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }
.syn-struct-frozen-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; line-height: 1.5; color: var(--text-2); }
.syn-struct-frozen-row em { color: var(--text-3); }
.syn-struct-saved-line { margin: var(--sp-2) 0 var(--sp-3); font-size: 13px; text-align: center; }
.syn-struct-saved-line.pass { color: #4ade80; }
.syn-struct-saved-line.fail { color: #f87171; }
.syn-struct-hist-badge {
  font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
  padding: 1px 6px; border-radius: var(--r-sm);
}
.syn-struct-hist-badge.pass { background: var(--emerald-bg, rgba(74,222,128,0.12)); color: #4ade80; }
.syn-struct-hist-badge.fail { background: var(--red-bg, rgba(248,113,113,0.12)); color: #f87171; }

/* ════ M9 — Gimnasio FIT (prefijo fitgym-) ════ */
.fitgym-launcher {
  padding: var(--sp-3); margin-bottom: var(--sp-3); cursor: pointer;
  border: 1px solid var(--gold, #c9a84c); border-radius: 12px;
  background: var(--gold-bg, rgba(201,168,76,0.08));
}
.fitgym-launcher:active { transform: scale(0.99); }
.fitgym-launcher-title { font-size: 15px; font-weight: 700; color: var(--text-1); }
.fitgym-launcher-sub { margin-top: 4px; font-size: 12.5px; line-height: 1.5; color: var(--text-2); }
.fitgym-group-title {
  margin: var(--sp-4) 0 var(--sp-2); font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3);
}
.fitgym-rep { display: flex; flex-direction: column; gap: var(--sp-3); }
.fitgym-rep-head { display: flex; align-items: center; justify-content: space-between; }
.fitgym-rep-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); }
.fitgym-timer { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-1); }
.fitgym-timer.amb-over { color: #f87171; }
.fitgym-rep-q, .fitgym-reveal-q {
  padding: var(--sp-3); font-size: 16px; font-weight: 600; line-height: 1.5; color: var(--text-1);
  border: 1px solid var(--border-1, rgba(255,255,255,0.08)); border-radius: 12px;
}
.fitgym-reveal-q { margin-bottom: var(--sp-3); font-size: 14px; }
.fitgym-rec-badge { min-height: 18px; font-size: 12px; }
.fitgym-rec-badge.rec { color: #f87171; font-weight: 600; }
.fitgym-rec-badge.nomic { color: var(--text-3); }
.fitgym-rep-hint { font-size: 12px; line-height: 1.5; color: var(--text-3); }
.fitgym-btn {
  width: 100%; padding: 12px; margin-top: var(--sp-2); font-size: 14px; font-weight: 600;
  border-radius: 10px; cursor: pointer;
}
.fitgym-btn.primary { border: 1px solid var(--gold, #c9a84c); background: var(--gold-bg, rgba(201,168,76,0.12)); color: var(--text-1); }
.fitgym-btn.ghost { border: 1px solid var(--border-1, rgba(255,255,255,0.10)); background: transparent; color: var(--text-2); }
.fitgym-btn:active { transform: scale(0.98); }
.fitgym-audio { margin-bottom: var(--sp-3); }
.fitgym-audio audio { width: 100%; }
.fitgym-audio-note { margin-top: 4px; font-size: 11.5px; color: var(--text-3); }
.fitgym-angle-matias { color: #60a5fa; }
.fitgym-angle-rebeca { color: #c084fc; }
.fitgym-key { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.7; color: var(--text-2); }
.fitgym-grade { margin-top: var(--sp-3); padding: var(--sp-3); border: 1px solid var(--border-1, rgba(255,255,255,0.08)); border-radius: 12px; }
.fitgym-grade-title { margin-bottom: var(--sp-2); font-size: 12px; font-weight: 700; color: var(--text-2); }
.fitgym-check {
  display: flex; align-items: center; gap: 10px; padding: 10px 6px; cursor: pointer;
  font-size: 13px; line-height: 1.4; color: var(--text-2);
  border-bottom: 1px solid var(--border-1, rgba(255,255,255,0.05));
}
.fitgym-check.on { color: var(--text-1); }
.fitgym-check-box {
  flex: 0 0 auto; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--gold, #c9a84c);
  border: 1.5px solid var(--border-2, rgba(255,255,255,0.20)); border-radius: 6px;
}
.fitgym-check.on .fitgym-check-box { border-color: var(--gold, #c9a84c); background: var(--gold-bg, rgba(201,168,76,0.10)); }
.fitgym-grade-hint { margin-top: var(--sp-2); font-size: 11.5px; color: var(--text-3); text-align: center; }
.fitgym-verdict { margin-top: var(--sp-3); padding: var(--sp-3); border-radius: 12px; border: 1px solid; }
.fitgym-verdict.pass { border-color: rgba(74,222,128,0.4); background: var(--emerald-bg, rgba(74,222,128,0.08)); }
.fitgym-verdict.fail { border-color: rgba(248,113,113,0.4); background: var(--red-bg, rgba(248,113,113,0.08)); }
.fitgym-verdict-head { font-size: 14px; font-weight: 700; }
.fitgym-verdict.pass .fitgym-verdict-head { color: #4ade80; }
.fitgym-verdict.fail .fitgym-verdict-head { color: #f87171; }
.fitgym-verdict-sub { margin-top: 6px; font-size: 12.5px; line-height: 1.5; color: var(--text-2); }

/* ════════ LIVE CASE (Brick 5a) — caso end-to-end bajo reloj ════════ */
#live-overlay { display: none; }
#live-overlay.open {
  display: flex; position: fixed; inset: 0; z-index: 10000;
  align-items: center; justify-content: center; padding: var(--sp-4);
}
.live-backdrop {
  position: absolute; inset: 0;
  background: rgba(3,4,9,0.80);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.live-panel {
  position: relative; width: 100%; max-width: 460px;
  max-height: calc(100vh - 2 * var(--sp-4) - env(safe-area-inset-bottom, 0px));
  overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
  background: var(--bg-card); border: 1px solid var(--gold-border);
  border-radius: var(--r-xl);
  box-shadow: var(--gold-glow), 0 24px 64px rgba(0,0,0,0.6);
  padding: 0 var(--sp-5) var(--sp-5);
  animation: synthIn var(--t-mid) cubic-bezier(0.16,1,0.3,1) forwards;
}
.live-x {
  position: absolute; top: 10px; right: 10px;
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  color: var(--text-2); border-radius: var(--r-md); z-index: 3;
}
.live-x:hover { color: var(--text-1); background: var(--bg-hover); }
.live-x svg { stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; }

.live-clock {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center; gap: var(--sp-2);
  margin: 0 calc(-1 * var(--sp-5)) var(--sp-4);
  padding: var(--sp-3) 50px var(--sp-3) var(--sp-5);
  background: linear-gradient(180deg, var(--bg-card) 72%, rgba(13,15,26,0));
  border-bottom: 1px solid var(--border-mid);
}
.live-clock-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--emerald); box-shadow: 0 0 8px var(--emerald); animation: synthPulse 1.6s ease-in-out infinite; }
.live-clock-time { font-family: var(--font-mono); font-size: 15px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-1); }
.live-clock-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-3); }
.live-progress { display: flex; gap: 5px; margin-left: auto; }
.live-pdot { width: 18px; height: 4px; border-radius: 2px; background: var(--bg-input); }
.live-pdot.done { background: var(--gold-dim); }
.live-pdot.active { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.5); }

.live-head { padding-right: 28px; margin-bottom: var(--sp-4); }
.live-kicker { font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); margin-bottom: var(--sp-1); }
.live-phase-title { font-family: var(--font-display); font-size: 25px; font-weight: 600; color: var(--text-1); line-height: 1.15; }
.live-prompt { margin-top: var(--sp-3); padding: var(--sp-3) var(--sp-4); background: var(--bg-elevated); border-left: 2px solid var(--gold-dim); border-radius: var(--r-sm); font-size: 14px; line-height: 1.5; color: var(--text-1); }

.live-instruction { font-size: 13px; line-height: 1.45; color: var(--text-2); margin: var(--sp-4) 0 var(--sp-2); }
.live-instruction strong { color: var(--text-1); }
.live-textarea {
  width: 100%; min-height: 92px; resize: vertical;
  background: var(--bg-input); border: 1px solid var(--border-mid); border-radius: var(--r-md);
  padding: var(--sp-3); color: var(--text-1);
  font-family: var(--font-body); font-size: 14px; line-height: 1.5;
}
.live-textarea:focus { outline: none; border-color: var(--gold-border); box-shadow: var(--gold-glow); }
.live-textarea::placeholder { color: var(--text-3); }

.live-btn {
  width: 100%; margin-top: var(--sp-3); padding: var(--sp-3) var(--sp-4);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: var(--gold); color: #07080f; border-radius: var(--r-md);
  font-weight: 700; font-size: 14px; letter-spacing: 0.01em;
}
.live-btn:active { transform: scale(0.98); }
.live-btn.ghost { background: var(--bg-elevated); border: 1px solid var(--border-mid); color: var(--text-1); }
.live-btn.disabled { opacity: 0.4; pointer-events: none; }
.live-btn-sub { font-family: var(--font-mono); font-size: 10px; font-weight: 500; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.1em; }

.live-echo { margin-top: var(--sp-3); padding: var(--sp-3); background: var(--bg-elevated); border: 1px dashed var(--border-mid); border-radius: var(--r-sm); }
.live-echo-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); margin-bottom: 4px; }
.live-echo-body { font-size: 13.5px; line-height: 1.5; color: var(--text-1); white-space: pre-wrap; }
.live-echo-body.empty { color: var(--text-3); font-style: italic; }

.live-model { margin-top: var(--sp-4); padding: var(--sp-4); background: var(--gold-bg); border: 1px solid var(--gold-border); border-radius: var(--r-md); }
.live-model-title { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold-light); margin-bottom: var(--sp-2); }
.live-bucket { margin-bottom: var(--sp-2); }
.live-bucket:last-child { margin-bottom: 0; }
.live-bucket-name { font-weight: 700; font-size: 13.5px; color: var(--text-1); margin-bottom: 2px; }
.live-bucket-items { font-size: 12.5px; line-height: 1.5; color: var(--text-2); }
.live-model-line { font-size: 13.5px; line-height: 1.55; color: var(--text-1); }

.live-axis { margin-top: var(--sp-3); }
.live-axis-head { margin-bottom: 6px; }
.live-axis-label { font-size: 13px; font-weight: 600; color: var(--text-1); }
.live-axis-hint { font-size: 11.5px; color: var(--text-2); margin-top: 1px; }
.live-axis-btns { display: flex; gap: var(--sp-2); }
.live-axis-btn {
  flex: 1; padding: var(--sp-2) 0; text-align: center;
  background: var(--bg-input); border: 1px solid var(--border-mid); border-radius: var(--r-sm);
  font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--text-2);
}
.live-axis-btn.sel { background: var(--gold); border-color: var(--gold); color: #07080f; }

.live-math { margin-top: var(--sp-3); }
.live-math-row { display: flex; gap: var(--sp-2); align-items: stretch; }
.live-math-input {
  flex: 1; background: var(--bg-input); border: 1px solid var(--border-mid); border-radius: var(--r-md);
  padding: var(--sp-3); color: var(--text-1);
  font-family: var(--font-mono); font-size: 16px; font-weight: 600;
}
.live-math-input:focus { outline: none; border-color: var(--gold-border); box-shadow: var(--gold-glow); }
.live-math-unit { display: flex; align-items: center; padding: 0 var(--sp-3); font-family: var(--font-mono); font-size: 13px; color: var(--text-2); background: var(--bg-elevated); border: 1px solid var(--border-mid); border-radius: var(--r-md); }
.live-math-check { padding: 0 var(--sp-4); background: var(--gold); color: #07080f; border-radius: var(--r-md); font-weight: 700; font-size: 13px; }
.live-math-check:active { transform: scale(0.98); }
.live-math-result { margin-top: var(--sp-3); padding: var(--sp-3) var(--sp-4); border-radius: var(--r-md); font-size: 13.5px; line-height: 1.5; }
.live-math-result.ok { background: var(--emerald-bg); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
.live-math-result.off { background: var(--red-bg); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
.live-math-result strong { color: var(--text-1); }
.live-math-hint { display: block; margin-top: 4px; font-family: var(--font-mono); font-size: 11.5px; color: var(--text-2); }

.live-foot { margin-top: var(--sp-5); padding-top: var(--sp-4); border-top: 1px solid var(--border-mid); }
.live-foot-note { font-size: 12px; color: var(--text-3); text-align: center; margin-top: var(--sp-2); font-family: var(--font-mono); letter-spacing: 0.04em; }
/* Brick J — countdown visual del giro (patrón Brick D: a 0 avisa, no corta) */
.live-twist-count { font-family: var(--font-mono); font-size: 13px; color: var(--text-2); text-align: center; margin: var(--sp-3) 0; padding: 6px 10px; border: 1px dashed var(--border-mid); border-radius: var(--r-md); letter-spacing: 0.04em; }
.live-twist-count.over { color: #fca5a5; border-color: rgba(239,68,68,0.5); }
.live-scores { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-top: var(--sp-3); }
.live-score-chip { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: var(--r-pill); background: var(--bg-elevated); border: 1px solid var(--border-mid); color: var(--text-2); }
.live-score-chip strong { color: var(--gold-light); }
/* ── Overlay Test & Learn (Brick A) — cierre obligatorio de caso ── */
.tl-overlay{margin-top:20px;padding:16px 16px 18px;border:1px solid var(--line,#2A3149);border-radius:12px;background:rgba(247,158,27,.06)}
.tl-kicker{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold,#c9a84c);font-weight:700;margin-bottom:6px}
.tl-lead{font-size:14px;color:var(--muted,#8A92AB);margin-bottom:14px;line-height:1.5}
.tl-step-label{font-weight:600;margin:8px 0 10px}
.tl-confound{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.tl-fb{font-size:13px;padding:8px 10px;border-radius:8px;margin-top:-2px;line-height:1.45}
.tl-fb.correct{background:rgba(34,197,94,.12);color:#22c55e}
.tl-fb.partial{background:rgba(245,158,11,.13);color:#f59e0b}
.tl-fb.incorrect{background:rgba(255,107,107,.12);color:#ff6b6b}
.tl-model{display:flex;flex-direction:column;gap:0;margin:12px 0 4px}
.tl-model-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line,#2A3149)}
.tl-model-row:last-child{border-bottom:none}
.tl-model-k{flex:0 0 128px;font-weight:600;font-size:12.5px;color:var(--gold,#c9a84c)}
.tl-model-v{flex:1;font-size:13px;line-height:1.5;color:var(--ink,#EDEFF7)}
@media (min-width:900px){.tl-model-k{flex-basis:150px}}
/* ── Scorecard del Caso en Vivo (Brick 5b) ── */
.live-sc-top { display: flex; gap: var(--sp-3); margin-bottom: var(--sp-4); }
.live-sc-total { flex: 1; padding: var(--sp-4); border-radius: var(--r-md); border: 1px solid var(--border-mid); background: var(--bg-elevated); text-align: center; }
.live-sc-total.live-sc-strong { background: var(--emerald-bg); border-color: rgba(34,197,94,0.32); }
.live-sc-total.live-sc-good   { background: var(--gold-bg);    border-color: var(--gold-border); }
.live-sc-total.live-sc-weak   { background: var(--red-bg);     border-color: rgba(239,68,68,0.3); }
.live-sc-total-num { font-family: var(--font-display); font-size: 38px; font-weight: 700; line-height: 1; color: var(--text-1); }
.live-sc-total-num span { font-size: 16px; font-weight: 600; color: var(--text-3); }
.live-sc-total-label { margin-top: 6px; font-size: 12.5px; font-weight: 600; color: var(--text-2); }
.live-sc-strong .live-sc-total-label { color: var(--emerald); }
.live-sc-good   .live-sc-total-label { color: var(--gold-light); }
.live-sc-weak   .live-sc-total-label { color: #fca5a5; }

/* ── EXHIBITS (Brick 6) — lectura de gráficos/tablas. Namespace .exh-, tokens existentes. ── */

.exh-table-wrap { overflow-x: auto; margin-bottom: var(--sp-4); border: 1px solid var(--border-mid); border-radius: var(--r-md); }
.exh-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.exh-table thead th {
  text-align: left; font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold); white-space: nowrap;
  border-bottom: 1px solid var(--border-mid); padding: 9px 12px; background: var(--bg-elevated);
}
.exh-table tbody td { padding: 9px 12px; color: var(--text-2); border-bottom: 1px solid var(--border); }
.exh-table tbody tr:last-child td { border-bottom: none; }
.exh-table tbody td:first-child { color: var(--text-1); font-weight: 600; }
.exh-table tbody td:not(:first-child) { font-family: var(--font-mono); color: var(--text-1); white-space: nowrap; }
/* barras horizontales — puente +/− */
.exh-bars { margin-bottom: var(--sp-4); border: 1px solid var(--border-mid); border-radius: var(--r-md); padding: var(--sp-4); }
.exh-bars-unit { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: var(--sp-3); }
.exh-bar-row { display: grid; grid-template-columns: 92px 1fr; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-2); }
.exh-bar-row:last-child { margin-bottom: 0; }
.exh-bar-label { font-size: 12px; color: var(--text-2); text-align: right; line-height: 1.2; }

.exh-bar-fill { position: absolute; top: 0; bottom: 0; display: flex; align-items: center; min-width: 2px; }

.exh-bar-fill.neg { right: 50%; background: var(--red-bg); border-right: 2px solid var(--red); justify-content: flex-end; }

.exh-bar-axis { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--border-strong); z-index: 1; }
/* prompt (la pregunta) */
.exh-prompt {

}

/* reveal block */
.exh-reveal-sec { margin-top: var(--sp-2); }

  font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
}

.exh-quant-result.incorrect { background: var(--red-bg); border: 1px solid rgba(239,68,68,0.25); color: var(--text-1); }

/* ============================================================
   BRICK 8 — DESKTOP / RESPONSIVE LAYER
   100% aditivo · solo overrides dentro de @media min-width.
   Mobile-first base intacto · no toca JS, graders, tab ids ni state.
   Degradación elegante: si :has() no existe, las listas caen a 1 col.
   ============================================================ */
@media (min-width: 900px) {

  /* — Cap de ancho: el frame de la app crece y se centra — */
  :root { --content-max: 1180px; }

  #app {
    max-width: var(--content-max);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* — Nav: alineada al frame, items en cluster centrado con más aire — */
  #bottom-nav {
    max-width: var(--content-max);
    justify-content: center;
    gap: var(--sp-3);
  }
  .nav-item {
    flex: 0 0 auto;
    min-width: 112px;
    padding: 10px 8px 0;
    gap: 5px;
  }
  .nav-item .nav-icon { width: 22px; height: 22px; }
  .nav-item .nav-label { font-size: 9px; letter-spacing: 0.06em; }
  .nav-item.active::before { width: 36px; }

  /* — Multi-columna (scopeada a modo lista vía :has; el detalle queda intacto) — */

  /* Casos: 2 columnas · el header spanea todo el ancho */
  #cases-root:has(> .case-card) {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--sp-4);
    align-items: start;
  }
  #cases-root:has(> .case-card) > .cases-header { grid-column: 1 / -1; }

  /* Exhibits: 3 columnas (cards chicas) · el header spanea */
  #exhibits-root:has(> .exh-card) {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: var(--sp-3);
    align-items: start;
  }
  #exhibits-root:has(> .exh-card) > .exh-header { grid-column: 1 / -1; }

  /* Framework cards (recall · modo pick): 2 columnas · header + CTA + label spanean */
  #recall-root:has(> .recall-fw-btn) {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--sp-3);
    align-items: start;
  }
  #recall-root:has(> .recall-fw-btn) > .cases-header,
  #recall-root:has(> .recall-fw-btn) > .recall-smart-card,
  #recall-root:has(> .recall-fw-btn) > .recall-section-label { grid-column: 1 / -1; }

  /* — Brick E: cap de prosa ~70ch en vistas de DETALLE (frame 1180px es incómodo para leer).
       Solo contenedores de prosa: case detail (prompt/contexto/feedback/síntesis) + exhibit
       detail (contexto/pregunta/lectura). Grids de lista (:has), drills, live overlay y el
       recorder de síntesis quedan intactos — los overlays montan en body, fuera del scope. — */
  #cases-root .case-prompt-card,
  #cases-root .feedback-block,
  #cases-root .synthesis-block,
  #exhibits-root .exh-context,
  #exhibits-root .exh-prompt,
  #exhibits-root .exh-reveal-sec {
    max-width: 70ch;
    margin-left: auto;
    margin-right: auto;
  }
}

</style>

<script>
(function () {
  'use strict';

  // ============================================================
  // STATE — localStorage-backed
  // ============================================================
  const STORAGE_KEY = 'mbb_trainer_state_v1';
  // SRS (SM-2 lite): un día en ms. Definido acá arriba porque loadState() lo usa al migrar.
  const SRS_DAY_MS = 24 * 60 * 60 * 1000;

  const FRAMEWORKS = [
    { id: 'profitability', name: 'Profitability',       type: 'Cuantitativo', color: '#22c55e', abbr: 'E ( P = R − C ) M', branches: ['external','revenue','cost','market'] },
    { id: 'business',      name: 'Business Situation',  type: 'Cualitativo',  color: '#a855f7', abbr: 'Customer · Product · Company · Competition', branches: ['customer','product','company','competition'] },
    { id: 'entry',         name: 'Market Entry',        type: 'Estratégico',  color: '#3b82f6', abbr: 'Client → Market → Competition → Entry', branches: ['client','market','competition','entry'] },
    { id: 'ma',            name: 'M&A',                 type: 'Estratégico',  color: '#f59e0b', abbr: 'Acquirer → Target → Synergies → Return', branches: ['acquirer','target','synergies','return'] },
    { id: 'pricing',       name: 'Pricing & Growth',    type: 'Híbrido',      color: '#ec4899', abbr: 'Objective → Cost Floor → Value Ceiling → Market Anchor', branches: ['objective','cost','value','anchor','growth'] },
    { id: 'sizing',        name: 'Market Sizing',       type: 'Cuantitativo', color: '#06b6d4', abbr: 'Population × Penetration × Frequency × Price', branches: ['population','segment','behavior','price'] },
    // Brick H · tlDeck — mazo SRS Test & Learn (M7). Contenido derivado de las fuentes MC
    // (kit_de_combate Parte 1-2, ecosistema_arboles §0-§6, Referencia Maestra de Fórmulas, Guía Definitiva §2).
    { id: 'tl-ecosistema',  name: 'Ecosistema de Pagos',      type: 'Test & Learn', color: '#ef4444', abbr: 'Cardholder → Merchant → Acquirer → Network → Issuer', branches: ['flujo','tarifas','actores','glosario'] },
    { id: 'tl-metodologia', name: 'Metodología Test & Learn', type: 'Test & Learn', color: '#c9a84c', abbr: 'Hipótesis → Diseño → Medición → Focalización → Repetir', branches: ['metodologias','pasos','sintetico','spendingpulse','focalizacion'] },
    { id: 'tl-arboles',     name: 'Árboles Esqueleto T&L',    type: 'Test & Learn', color: '#14b8a6', abbr: 'Incrementalidad · Per-cliente · Rollout · Diseño · Free-rider', branches: ['incrementalidad','percliente','rollout','diseno','freerider'] },
    { id: 'tl-formulas',    name: 'Fórmulas de Medición T&L', type: 'Test & Learn', color: '#f97316', abbr: 'DiD · Lift · ROI · KPIs · Guardrails', branches: ['medicion','rentabilidad','kpis','guardrails'] }
  ];

  const TIPS = [
    "Hypothesis primero, framework después — siempre. La única razón para usar cualquier framework es testear una hypothesis que ya planteaste.",
    "En casos de profitability, pregunta \"¿los competidores también perdieron margin?\" antes de entrar al P&L. Esa sola pregunta separa los problemas de empresa de los problemas de industria.",
    "El root cause nunca es visible a nivel agregado. Segmenta y aísla — por geo, producto, canal y cliente — hasta encontrar dónde vive realmente el problema.",
    "El Business Situation framework cubre ~50% de los casos como estructura primaria o secundaria. Pero nunca uses las 4 branches. Tu hypothesis decide cuáles 2 son relevantes.",
    "Un framework con 3 buckets y 3 niveles de profundidad le gana a 7 buckets con 1 nivel de profundidad, siempre. La profundidad es lo que separa lo bueno de lo grande.",
    "En casos de Market Entry, analiza el CLIENT antes que el market. La mayoría lo hace al revés — y no ve cómo los capability gaps vuelven inaccesible un \"market atractivo\".",
    "La pregunta de M&A que siempre debes hacer: \"¿Por qué está en venta la empresa?\" Si la respuesta no es clara, ESE es el red flag.",
    "Jerarquía de confiabilidad de synergies: cost synergies (las más ciertas) → revenue cross-sell → new market synergies (las menos ciertas). Desconfía de apoyarte demasiado en el tercer tipo.",
    "Casos digital / tech: la lógica de negocio siempre antes del overlay tecnológico. Establece primero el problema económico, después muestra dónde el tech acelera la solución.",
    "80/20 en el drill-down: una vez que encuentras qué branch tiene el problema, profundiza ahí. No gastes el mismo tiempo probando que las otras branches están bien.",
    "El CEO Recommendation Check: si tu sub-bullet dice \"mirar costos de transporte\", recházalo. Debería decir \"benchmarkear el cost por unidad de materia prima contra los top 3 competidores para encontrar dónde está el gap específico\".",
    "Cuando el entrevistador cambia la dirección del caso a mitad de camino, está testeando si tienes una hypothesis o solo un template. Di tu hypothesis revisada en voz alta antes de reestructurar.",
    "En casos de PE, la exit thesis es tan importante como el entry analysis. ¿Quién te lo compra en 5 años, y a qué multiple? Arma esto antes de cerrar el entry analysis.",
    "Estructura de la synthesis: Answer → 2–3 supporting points → 1 risk → 1 next step. Nunca partas con \"entonces, en conclusión\" — parte con la recomendación misma.",

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return deepClone(DEFAULT_STATE);
      const parsed = JSON.parse(raw);
      // Merge defensively
      const merged = Object.assign({}, deepClone(DEFAULT_STATE), parsed, {
        mastery: parsed.mastery || {},
        drillHistory: Object.assign({}, DEFAULT_STATE.drillHistory, parsed.drillHistory || {}),
        stepStats: Object.assign({}, DEFAULT_STATE.stepStats, parsed.stepStats || {}),
        mathPats: Object.assign({}, deepClone(DEFAULT_STATE.mathPats), parsed.mathPats || {}),
        mathTimes: Object.assign({}, deepClone(DEFAULT_STATE.mathTimes), parsed.mathTimes || {}),
        synthLog: parsed.synthLog || [],
        liveCaseLog: parsed.liveCaseLog || [],
        completedCases: Array.isArray(parsed.completedCases) ? parsed.completedCases : [],
        exhibitsCompleted: Array.isArray(parsed.exhibitsCompleted) ? parsed.exhibitsCompleted : [],
        srs: (parsed.srs && typeof parsed.srs === 'object') ? deepClone(parsed.srs) : {}
      });
      // Also ensure every stepStats key is an array (in case older saves missed a key)
      for (const k of Object.keys(DEFAULT_STATE.stepStats)) {
        if (!Array.isArray(merged.stepStats[k])) merged.stepStats[k] = [];
      }
      // Ensure every radar pattern is a valid {ok,tot} pair (old state had no mathPats; guard corrupt entries)
      for (const p of Object.keys(DEFAULT_STATE.mathPats)) {
        const s = merged.mathPats[p];
        if (!s || typeof s.ok !== 'number' || typeof s.tot !== 'number') merged.mathPats[p] = { ok: 0, tot: 0 };
      }
      // Ensure every mathTimes key is an array (old state had no mathTimes; mismo guard que mathPats)
      for (const p of Object.keys(DEFAULT_STATE.mathTimes)) {
        if (!Array.isArray(merged.mathTimes[p])) merged.mathTimes[p] = [];
      }
      // synthLog must be an array (guard against corrupt/legacy non-array saves)
      if (!Array.isArray(merged.synthLog)) merged.synthLog = [];
      // liveCaseLog must be an array (mismo patrón defensivo que synthLog)
      if (!Array.isArray(merged.liveCaseLog)) merged.liveCaseLog = [];
      // SRS: migra timestamps del cooldown plano viejo (lastRecall) a entradas SM-2,
      // y endurece cada entrada a un triple {interval, ease, due} válido.
      if (!merged.srs || typeof merged.srs !== 'object' || Array.isArray(merged.srs)) merged.srs = {};
      if (parsed.lastRecall && typeof parsed.lastRecall === 'object') {
        for (const fwId of Object.keys(parsed.lastRecall)) {
          if (merged.srs[fwId]) continue; // una entrada SRS existente le gana al timestamp legacy
          const ts = Number(parsed.lastRecall[fwId]) || 0;
          if (ts > 0) merged.srs[fwId] = { interval: 1, ease: 2.5, due: ts + SRS_DAY_MS };
        }
      }
      for (const fwId of Object.keys(merged.srs)) {
        const e = merged.srs[fwId];
        if (!e || typeof e.interval !== 'number' || typeof e.ease !== 'number' || typeof e.due !== 'number') {
          delete merged.srs[fwId]; // corrupta → se descarta; el framework simplemente lee como "due ahora"
        }
      }
      return merged;
    } catch (e) {
      console.warn('State load failed, resetting', e);
      return deepClone(DEFAULT_STATE);
    }
  }

  function saveState() {

  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }
  function pad(n) { return String(n).padStart(2,'0'); }
  function daysBetween(iso1, iso2) {
    const d1 = new Date(iso1); const d2 = new Date(iso2);
    return Math.round((d2 - d1) / (1000*60*60*24));
  }

  // Called when the user performs any meaningful training action.
  function registerSession() {
    const today = todayISO();
    if (state.lastSessionDate === today) return; // already counted
    if (state.lastSessionDate) {
      const gap = daysBetween(state.lastSessionDate, today);
      if (gap === 1) state.streak += 1;
      else if (gap > 1) state.streak = 1;
      else state.streak = Math.max(1, state.streak);
    } else {
      state.streak = 1;
    }
    state.lastSessionDate = today;
    state.sessionCount += 1;
    state.tipIndex = (state.tipIndex + 1) % TIPS.length;
    saveState();
    renderDashboard();
  }

  function streakMessageFor(n) {
    const thresholds = Object.keys(STREAK_MESSAGES).map(Number).sort((a,b)=>a-b);
    let msg = STREAK_MESSAGES[0];
    for (const t of thresholds) {
      if (n >= t) msg = STREAK_MESSAGES[t];
    }
    return msg;
  }

  function branchMastery(fwId, branchId) {
    const fw = state.mastery[fwId];
    if (!fw) return { score: 0, attempts: 0 };
    return fw[branchId] || { score: 0, attempts: 0 };
  }
  function frameworkMastery(fwId) {
    const fw = FRAMEWORKS.find(f => f.id === fwId);
    if (!fw) return 0;
    const scores = fw.branches.map(b => branchMastery(fwId, b).score);
    const sum = scores.reduce((a,b)=>a+b, 0);
    return Math.round(sum / fw.branches.length);
  }
  function masteryTier(score) {
    if (score >= 80) return { tier: 'strong', label: 'Fuerte', cls: 'badge-strong', bar: 'green' };
    if (score >= 50) return { tier: 'good',   label: 'Bueno',  cls: 'badge-good',   bar: 'amber' };
    return               { tier: 'weak',   label: 'Débil',  cls: 'badge-weak',   bar: 'red' };
  }
  function gradeBranch(fwId, branchId, grade) {
    // grade: 'got' | 'partial' | 'missed'
    if (!state.mastery[fwId]) state.mastery[fwId] = {};
    if (!state.mastery[fwId][branchId]) state.mastery[fwId][branchId] = { score: 0, attempts: 0 };
    const b = state.mastery[fwId][branchId];
    const delta = grade === 'got' ? 16 : grade === 'partial' ? 2 : -10;
    b.score = Math.max(0, Math.min(100, b.score + delta));
    b.attempts += 1;
    saveState();
  }
  function weakestFramework() {
    let weakest = FRAMEWORKS[0]; let minScore = 101;
    for (const f of FRAMEWORKS) {
      const m = frameworkMastery(f.id);
      if (m < minScore) { minScore = m; weakest = f; }
    }
    return weakest;
  }

  // Record a step-level outcome for pattern analysis
  function recordStepStat(stepType, correct) {
    if (!state.stepStats) state.stepStats = { diagnose:[], hypothesis:[], math:[], mece:[], synthesis:[], clarifying:[] };
    if (!Array.isArray(state.stepStats[stepType])) state.stepStats[stepType] = [];
    state.stepStats[stepType].push({ correct: !!correct, ts: Date.now() });
    // Keep only last 20 per step — more than that isn't signal, it's noise
    if (state.stepStats[stepType].length > 20) {
      state.stepStats[stepType] = state.stepStats[stepType].slice(-20);
    }
    saveState();
  }

  // Generate the top pattern insight for Dashboard
  // Returns null if there's not enough data yet, or the insight object
  function computeInsight() {
    const stats = state.stepStats || {};
    const minForSignal = 4;  // need at least 4 attempts to claim a pattern

    // Check each step type; find one with enough data AND a notable pattern
    const candidates = [
      { key: 'diagnose',   label: 'Diagnóstico',      tabHint: 'Casos', targetTab: 'cases' },
      { key: 'hypothesis', label: 'Hipótesis',        tabHint: 'Drills', targetTab: 'drills' },
      { key: 'math',       label: 'Case math',        tabHint: 'Drills', targetTab: 'drills' },
      { key: 'mece',       label: 'Pensamiento MECE', tabHint: 'Drills', targetTab: 'drills' },
      { key: 'synthesis',  label: 'Síntesis',         tabHint: 'Drills', targetTab: 'drills' },
      { key: 'clarifying', label: 'Preguntas de clarificación', tabHint: 'Casos', targetTab: 'cases' }
    ];

    let weakest = null;
    let strongest = null;
    for (const c of candidates) {
      const attempts = stats[c.key] || [];
      if (attempts.length < minForSignal) continue;
      const recent = attempts.slice(-10);
      const correct = recent.filter(a => a.correct).length;
      const pct = (correct / recent.length) * 100;
      const entry = { ...c, pct, correct, total: recent.length };
      if (!weakest || pct < weakest.pct) weakest = entry;
      if (!strongest || pct > strongest.pct) strongest = entry;
    }

    // Celebration insight — strong streak in a specific skill
    if (strongest && strongest.pct >= 85 && strongest.total >= 5) {
      return {
        kind: 'celebration',
        headline: `${strongest.label}: lo tienes afilado`,
        detail: `${strongest.correct} de las últimas ${strongest.total} correctas. No sobre-drillees lo que ya está fuerte — rota a un área más débil.`,
        targetTab: null
      };
    }

    // Warning insight — weakness that warrants attention
    if (weakest && weakest.pct < 50) {
      return {
        kind: 'warning',
        headline: `${weakest.label} se te está escapando`,
        detail: `${weakest.correct} de las últimas ${weakest.total} correctas. Este es el patrón que drillear ahora. Tócalo para saltar a ${weakest.tabHint}.`,
        targetTab: weakest.targetTab
      };
    }

    // Neutral insight — generic nudge with directional info
    if (weakest && weakest.pct < 70) {
      return {
        kind: 'neutral',
        headline: `${weakest.label} es tu punto de crecimiento`,
        detail: `${weakest.correct} de las últimas ${weakest.total} correctas. Drillea unas cuantas reps más aquí para pasar el plateau.`,
        targetTab: weakest.targetTab
      };
    }

    return null;
  }

    if (!newSection || !newNav) return;
    if (curSection) curSection.classList.remove('active');
    if (curNav) curNav.classList.remove('active');
    newSection.classList.add('active');
    newNav.classList.add('active');

    if (host) host.scrollTop = 0;
    const meta = document.getElementById('top-bar-meta');
    if (meta) meta.textContent = TAB_LABELS[tabId];

    if (tabId === 'home') renderDashboard();
    if (tabId === 'learn') renderLearn();
    if (tabId === 'cases') renderCases();
    if (tabId === 'recall') renderRecall();
    if (tabId === 'drills') renderDrills();
    if (tabId === 'exhibits') renderExhibits();
    if (tabId === 'fit') renderFit();
