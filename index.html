  function handleCasesClick(e) {
    const target = e.target.closest('[data-action], [data-case-id]');
    if (!target) return;
    const action = target.dataset.action;
    const caseId = target.dataset.caseId;

    if (caseId) {
      currentCaseId = caseId;
      resetCaseSession();
      renderCases();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    if (action === 'open-live') {
      openLiveCase(target.dataset.liveId);
      return;
    }
    if (action === 'back-to-list') {
      currentCaseId = null;
      renderCases();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    const c = CASES.find(x => x.id === currentCaseId);
    if (!c) return;
    const s = caseSessionState;

    if (action === 'select-diagnose') {
      s.selectedDiagnose = parseInt(target.dataset.index, 10);
      renderCases();
      return;
    }
    if (action === 'select-hypothesis') {
      s.selectedHypothesis = parseInt(target.dataset.index, 10);
      renderCases();
      return;
    }
    if (action === 'advance-after-feedback') {
      if (s.selectedDiagnose !== null && !s.diagnoseRevealed) {
        s.diagnoseRevealed = true;
        // Track: was the diagnose pick strong?
        const diagnoseStrength = c.diagnose[s.selectedDiagnose].strength;
        recordStepStat('diagnose', diagnoseStrength === 'strong');
      } else if (s.selectedHypothesis !== null && !s.hypothesisRevealed) {
        s.hypothesisRevealed = true;
        // Track: was the hypothesis strong? (accepts top or alternative strong)
        const hypStrength = c.hypotheses[s.selectedHypothesis].strength;
        recordStepStat('hypothesis', hypStrength === 'strong');
      }
      renderCases();
      return;
    }
    if (action === 'toggle-clarifying') {
      const idx = parseInt(target.dataset.index, 10);
      const pos = s.selectedClarifying.indexOf(idx);
      if (pos >= 0) s.selectedClarifying.splice(pos, 1);
      else s.selectedClarifying.push(idx);
      renderCases();
      return;
    }
    if (action === 'reveal-clarifying') {
      s.clarifyingRevealed = true;
      // Track: did they pick at least one 'best' priority question AND no 'low' ones?
      const priorities = CLARIFYING_PRIORITY[c.id] || [];
      const hasBest = s.selectedClarifying.some(i => priorities[i] === 'best');
      const hasLow  = s.selectedClarifying.some(i => priorities[i] === 'low');
      recordStepStat('clarifying', hasBest && !hasLow);
      renderCases();
      return;
    }
    if (action === 'reveal-framework')  { s.revealedFramework = true; renderCases(); return; }
    if (action === 'reveal-data') {
      s.revealedDataCount = Math.min(s.revealedDataCount + 1, c.dataReveals.length);
      renderCases();
      return;
    }
    if (action === 'reveal-pushback') {
      s.revealedPushback = true;
      s.revealedSynthesis = true;
      renderCases();
      return;
    }
    if (action === 'grade-subq') {
      const field = target.dataset.field;
      const value = target.dataset.value;
      if (field && value && (field === 'gradeAnswer' || field === 'gradeSupport' || field === 'gradeRiskNext')) {
        s[field] = value;
      }
      // Complete case only when ALL three grade questions are answered
      if (s.gradeAnswer && s.gradeSupport && s.gradeRiskNext && s.tlDone) {
        if (!state.completedCases) state.completedCases = [];
        if (!state.completedCases.includes(currentCaseId)) {
          state.completedCases.push(currentCaseId);
          state.casesCompleted = state.completedCases.length;
          registerSession();  // streak + save, fires once per case completion
        } else {
          saveState();  // still persist the grade changes
        }
      }
      renderCases();
      return;
    }
    if (action === 'tl-confound') {
      const idx = parseInt(target.dataset.index, 10);
      if (!isNaN(idx)) s.tlConfoundPick = idx;
      renderCases();
      return;
    }
    if (action === 'tl-reveal') { s.tlRevealed = true; renderCases(); return; }
    if (action === 'tl-selfgrade') {
      const value = target.dataset.value;
      if (value === 'yes' || value === 'partial' || value === 'no') {
        s.tlGrade = value;
        s.tlDone = true;
        // Gate cumplido: recien ahora el caso puede marcarse completo. Extiende (no reescribe)
        // el cierre de grade-subq — mismo push, ahora tras pasar el overlay.
        if (s.gradeAnswer && s.gradeSupport && s.gradeRiskNext && s.tlDone) {
          if (!state.completedCases) state.completedCases = [];
          if (!state.completedCases.includes(currentCaseId)) {
            state.completedCases.push(currentCaseId);
            state.casesCompleted = state.completedCases.length;
            registerSession();
          } else {
            saveState();
          }
        }
      }
      renderCases();
      return;
    }
    if (action === 'open-synth') {
      openSynth(currentCaseId);
      return;
    }
  }

  // ============================================================
  // SYNTHESIS RECORDER (Brick 4) — self-contained overlay module.
  // Produce a top-down recommendation out loud (≤90s), play it back,
  // grade it against the model on 4 axes, log the score. Audio is
  // EPHEMERAL: recorded → played → graded → discarded. Only the note
  // (rubric + score) is persisted to state.synthLog. Degrades cleanly
  // when getUserMedia / MediaRecorder are unavailable or mic is denied.
  // Zero coupling to existing case grading / routing / classNames.
  // ============================================================
  const SYNTH_MAX_MS = 90000;
  let synthMounted = false;
  let synthTimerInterval = null;
  let synthRecorder = null;
  let synthStream = null;
  let synthChunks = [];
  let synthAudioUrl = null;
  // Brick D — modo estructurado: preferencia de sesión (patrón verbalizeMode:
  // variable de módulo, NO localStorage; sobrevive open/close del recorder).
  let synthStructPref = false;
  let synStructTimerInterval = null;   // reloj VISUAL de 75s; independiente del timer de 90s del Brick 4
  const SYN_STRUCT_MS = 75000;
  function freshSynStruct() {
    return { answer: '', supports: ['', '', ''], risk: '', next: '', graded: false, structPass: false, missing: [], overTime: false };
  }
  let synthState = {
    open: false,
    caseId: null,
    phase: 'intro',      // 'intro' | 'recording' | 'review'
    fallback: false,     // true → "speak without recording" mode
    startMs: null,
    durationSec: 0,
    hasAudio: false,
    rubric: { answer: 0, support: 0, risk: 0, next: 0 },  // 0 = unset, else 1–3
    saved: false,
    structured: false,   // Brick D: modo estructurado ON/OFF (espejo de synthStructPref al abrir)
    struct: null         // Brick D: transcripción forzada + grader (freshSynStruct() cuando structured)
  };

  // Feature detection: both APIs must exist for true recording.
  function synthCanRecord() {
    return !!(navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function'
              && typeof window.MediaRecorder === 'function');
  }

  function ensureSynthMounted() {
    if (synthMounted) return;
    const host = document.createElement('div');
    host.id = 'synth-overlay';
    host.setAttribute('aria-hidden', 'true');
    document.body.appendChild(host);
    host.addEventListener('click', handleSynthClick);
    host.addEventListener('input', handleSynthInput);
    document.addEventListener('keydown', handleSynthKey);
    synthMounted = true;
  }

  function openSynth(caseId, onLiveSave) {
    const c = CASES.find(x => x.id === caseId);
    if (!c) return;
    ensureSynthMounted();
    teardownSynthMedia();  // clear any prior session's media before starting fresh
    synthState = {
      open: true,
      caseId: caseId,
      phase: 'intro',
      fallback: !synthCanRecord(),
      startMs: null,
      durationSec: 0,
      hasAudio: false,
      rubric: { answer: 0, support: 0, risk: 0, next: 0 },
      saved: false,
      structured: synthStructPref,
      struct: freshSynStruct(),
      liveHook: (typeof onLiveSave === 'function') ? onLiveSave : null
    };
    // En modo Caso en Vivo el recorder se monta SOBRE el overlay en vivo
    // (ambos a z-index 10000); lo elevamos para garantizar que quede encima.
    const host = document.getElementById('synth-overlay');
    if (host) host.style.zIndex = synthState.liveHook ? '10001' : '';
    renderSynth();
  }

  // Full teardown: stop timer, stop mic tracks (turns off the browser
  // recording indicator), revoke the audio URL, drop chunks.
  function teardownSynthMedia() {
    if (synthTimerInterval) { clearInterval(synthTimerInterval); synthTimerInterval = null; }
    if (synStructTimerInterval) { clearInterval(synStructTimerInterval); synStructTimerInterval = null; }
    if (synthRecorder) {
      try { if (synthRecorder.state !== 'inactive') synthRecorder.stop(); } catch (e) {}
      synthRecorder = null;
    }
    if (synthStream) {
      try { synthStream.getTracks().forEach(t => t.stop()); } catch (e) {}
      synthStream = null;
    }
    if (synthAudioUrl) {
      try { URL.revokeObjectURL(synthAudioUrl); } catch (e) {}
      synthAudioUrl = null;
    }
    synthChunks = [];
  }

  function closeSynth() {
    teardownSynthMedia();
    synthState.open = false;
    synthState.liveHook = null;
    const host = document.getElementById('synth-overlay');
    if (host) {
      host.classList.remove('open');
      host.setAttribute('aria-hidden', 'true');
      host.style.zIndex = '';
      host.innerHTML = '';
    }
    // Refresh the case detail so the CTA badge count updates after a save.
    if (currentCaseId) renderCases();
  }

  function handleSynthKey(e) {
    if (!synthState.open) return;
    if (e.key === 'Escape') { closeSynth(); }
  }

  // ---- Recording lifecycle ----
  function startSynthFallback() {
    synthState.fallback = true;
    synthState.phase = 'recording';
    synthState.hasAudio = false;
    synthState.startMs = Date.now();
    renderSynth();
    runSynthTimer();
    runSynStructCountdown();
  }

  function startSynthRecording() {
    // No capture API at all → straight to fallback.
    if (!synthCanRecord()) { startSynthFallback(); return; }
    navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
      synthStream = stream;
      try {
        synthChunks = [];
        synthRecorder = new MediaRecorder(synthStream);
        synthRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) synthChunks.push(ev.data); };
        synthRecorder.onstop = () => {
          // Build the ephemeral blob → object URL for playback only.
          try {
            const type = (synthChunks[0] && synthChunks[0].type) || 'audio/webm';
            const blob = new Blob(synthChunks, { type });
            if (synthAudioUrl) { try { URL.revokeObjectURL(synthAudioUrl); } catch (e) {} }
            synthAudioUrl = (blob.size > 0) ? URL.createObjectURL(blob) : null;
            synthState.hasAudio = !!synthAudioUrl;
          } catch (e) {
            synthAudioUrl = null;
            synthState.hasAudio = false;
          }
          // Release the mic now that capture is done.
          if (synthStream) { try { synthStream.getTracks().forEach(t => t.stop()); } catch (e) {} synthStream = null; }
          synthState.phase = 'review';
          renderSynth();
        };
        synthRecorder.start();
        synthState.fallback = false;
        synthState.phase = 'recording';
        synthState.startMs = Date.now();
        renderSynth();
        runSynthTimer();
        runSynStructCountdown();
      } catch (e) {
        // MediaRecorder construction failed → clean fallback.
        if (synthStream) { try { synthStream.getTracks().forEach(t => t.stop()); } catch (er) {} synthStream = null; }
        startSynthFallback();
      }
    }).catch(() => {
      // Permission denied or no device → degrade to speak-without-recording.
      startSynthFallback();
    });
  }

  function stopSynthRecording() {
    if (synthTimerInterval) { clearInterval(synthTimerInterval); synthTimerInterval = null; }
    if (synStructTimerInterval) { clearInterval(synStructTimerInterval); synStructTimerInterval = null; }
    const elapsed = synthState.startMs ? (Date.now() - synthState.startMs) : 0;
    synthState.durationSec = Math.min(Math.round(elapsed / 1000), 90);
    // Brick D: fuera de tiempo si excede los 75s objetivo (la grabación NO se corta; el cap de 90s del Brick 4 sigue mandando).
    if (synthState.structured && synthState.struct) synthState.struct.overTime = synthState.durationSec > 75;
    if (synthState.fallback || !synthRecorder) {
      synthState.hasAudio = false;
      synthState.phase = 'review';
      renderSynth();
      return;
    }
    try {
      if (synthRecorder.state !== 'inactive') synthRecorder.stop();  // onstop → review
      else { synthState.phase = 'review'; renderSynth(); }
    } catch (e) {
      synthState.phase = 'review';
      renderSynth();
    }
  }

  function runSynthTimer() {
    if (synthTimerInterval) clearInterval(synthTimerInterval);
    synthTimerInterval = setInterval(() => {
      const elapsed = synthState.startMs ? (Date.now() - synthState.startMs) : 0;
      const remaining = Math.max(0, SYNTH_MAX_MS - elapsed);
      updateSynthTimer(remaining);
      if (remaining <= 0) {
        stopSynthRecording();  // auto-stop at 90s
      }
    }, 100);
    updateSynthTimer(SYNTH_MAX_MS);
  }

  // Brick D — countdown VISUAL de 75s (modo estructurado). No corta nada:
  // a 0 se pone rojo y marca "fuera de tiempo"; el auto-stop de 90s del
  // Brick 4 es el único que detiene. Reloj propio con cleanup en teardown/stop.
  function runSynStructCountdown() {
    if (!synthState.structured) return;
    if (synStructTimerInterval) clearInterval(synStructTimerInterval);
    synStructTimerInterval = setInterval(updateSynStructCountdown, 200);
    updateSynStructCountdown();
  }
  function updateSynStructCountdown() {
    const el = document.querySelector('#synth-overlay .syn-struct-count');
    if (!el) return;
    const elapsed = synthState.startMs ? (Date.now() - synthState.startMs) : 0;
    const remaining = SYN_STRUCT_MS - elapsed;
    if (remaining <= 0) {
      el.classList.add('over');
      el.textContent = 'Fuera de tiempo — sigue hablando y cierra';
    } else {
      el.classList.remove('over');
      el.textContent = Math.ceil(remaining / 1000) + 's · target estructura';
    }
  }

  function updateSynthTimer(remainingMs) {
    const sec = Math.ceil(remainingMs / 1000);
    const secEl = document.querySelector('#synth-overlay .synth-timer-sec');
    const fillEl = document.querySelector('#synth-overlay .synth-timer-fill');
    if (secEl) secEl.textContent = sec;
    if (fillEl) {
      const frac = remainingMs / SYNTH_MAX_MS;
      fillEl.style.width = (frac * 100) + '%';
      if (sec <= 15) fillEl.classList.add('urgent'); else fillEl.classList.remove('urgent');
    }
    if (secEl) { if (sec <= 15) secEl.classList.add('urgent'); else secEl.classList.remove('urgent'); }
  }

  // ---- Rubric + save ----
  function synthScore() {
    const r = synthState.rubric;
    return r.answer + r.support + r.risk + r.next;  // range 4–12 once all set
  }
  function synthRubricComplete() {
    const r = synthState.rubric;
    return r.answer > 0 && r.support > 0 && r.risk > 0 && r.next > 0;
  }

  function saveSynth() {
    if (!synthRubricComplete()) return;
    // Modo Caso en Vivo: en vez de grabar en synthLog y mostrar la pantalla
    // standalone, devolvemos la nota al flujo en vivo (fase 6 → 7). El path
    // standalone de abajo queda intacto.
    if (synthState.liveHook) {
      const hook = synthState.liveHook;
      const payload = {
        score: synthScore(),
        rubric: { answer: synthState.rubric.answer, support: synthState.rubric.support, risk: synthState.rubric.risk, next: synthState.rubric.next },
        durationSec: synthState.durationSec || 0
      };
      synthState.liveHook = null;   // un solo disparo
      hook(payload);                // el hook cierra el recorder y avanza a la fase 7
      return;
    }
    if (!Array.isArray(state.synthLog)) state.synthLog = [];
    // Brick D — campos aditivos SOLO en modo estructurado; entradas viejas no
    // los tienen (toda lectura con guard). El shape base queda intacto.
    const synthEntry = {
      caseId: synthState.caseId,
      ts: Date.now(),
      durationSec: synthState.durationSec || 0,
      rubric: {
        answer: synthState.rubric.answer,
        support: synthState.rubric.support,
        risk: synthState.rubric.risk,
        next: synthState.rubric.next
      },
      score: synthScore()
    };
    if (synthState.structured && synthState.struct && synthState.struct.graded) {
      synthEntry.structured = true;
      synthEntry.struct = {
        answer: synthState.struct.answer,
        supports: synthState.struct.supports.slice(),
        risk: synthState.struct.risk,
        next: synthState.struct.next,
        structPass: synthState.struct.structPass,
        overTime: synthState.struct.overTime
      };
      // Forma Y calidad: estructura completa + rubric ≥9/12 (mismo umbral que el live).
      recordStepStat('synthesis', synthState.struct.structPass && synthScore() >= 9);
    }
    state.synthLog.push(synthEntry);
    if (state.synthLog.length > 100) state.synthLog = state.synthLog.slice(-100);
    saveState();
    synthState.saved = true;
    // Drop the audio now — the note is what we keep.
    if (synthAudioUrl) { try { URL.revokeObjectURL(synthAudioUrl); } catch (e) {} synthAudioUrl = null; }
    synthState.hasAudio = false;
    renderSynth();
  }

  // Brick D — persistencia de la transcripción forzada. Mismo patrón que
  // handleDrillsInput (Brick C): guardar en estado sin re-render para no
  // perder el foco del input mientras se escribe.
  function handleSynthInput(e) {
    const t = e.target;
    const role = t && t.dataset && t.dataset.role;
    if (!role || role.indexOf('syn-struct-') !== 0) return;
    if (!synthState.struct) synthState.struct = freshSynStruct();
    const st = synthState.struct;
    if (role === 'syn-struct-answer')      st.answer = t.value;
    else if (role === 'syn-struct-sup1')   st.supports[0] = t.value;
    else if (role === 'syn-struct-sup2')   st.supports[1] = t.value;
    else if (role === 'syn-struct-sup3')   st.supports[2] = t.value;
    else if (role === 'syn-struct-risk')   st.risk = t.value;
    else if (role === 'syn-struct-next')   st.next = t.value;
  }

  // Brick D — grader DURO de completitud estructural (automático, no self-grade).
  // structPass = answer no vacío Y ≥2 supports no vacíos Y risk no vacío Y next no vacío.
  function synStructGrade() {
    const st = synthState.struct;
    if (!st) return;
    const filled = (s) => String(s || '').trim().length > 0;
    const sups = (st.supports || []).filter(filled).length;
    const missing = [];
    if (!filled(st.answer)) missing.push('Answer vacío — no abriste con la recomendación');
    if (sups < 2) missing.push('Solo ' + sups + ' support' + (sups === 1 ? '' : 's') + ' — el mínimo son 2');
    if (!filled(st.risk)) missing.push('Risk vacío — no nombraste el riesgo');
    if (!filled(st.next)) missing.push('Next step vacío — no cerraste con acción');
    st.structPass = missing.length === 0;
    st.missing = missing;
    st.graded = true;
  }

  function handleSynthClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;
    if (action === 'synth-close')  { closeSynth(); return; }
    if (action === 'syn-struct-toggle') {
      synthStructPref = !synthStructPref;
      synthState.structured = synthStructPref;
      if (synthState.structured && !synthState.struct) synthState.struct = freshSynStruct();
      renderSynth();
      return;
    }
    if (action === 'synth-start')  { startSynthRecording(); return; }
    if (action === 'synth-stop')   { stopSynthRecording(); return; }
    if (action === 'synth-redo')   { openSynth(synthState.caseId); return; }
    if (action === 'synth-rubric') {
      const axis = target.dataset.axis;
      const val = parseInt(target.dataset.value, 10);
      if (axis && synthState.rubric.hasOwnProperty(axis) && val >= 1 && val <= 3) {
        synthState.rubric[axis] = val;
        renderSynth();
      }
      return;
    }
    if (action === 'synth-save')   { saveSynth(); return; }
    if (action === 'syn-struct-grade') { synStructGrade(); renderSynth(); return; }
  }

  // ---- Render ----
  function renderSynth() {
    const host = document.getElementById('synth-overlay');
    if (!host) return;
    if (!synthState.open) { host.classList.remove('open'); host.innerHTML = ''; return; }
    const c = CASES.find(x => x.id === synthState.caseId);
    if (!c) { closeSynth(); return; }
    host.classList.add('open');
    host.setAttribute('aria-hidden', 'false');

    let body = '';
    if (synthState.phase === 'intro')          body = renderSynthIntro(c);
    else if (synthState.phase === 'recording') body = renderSynthRecording(c);
    else                                       body = renderSynthReview(c);

    host.innerHTML = `
      <div class="synth-backdrop" data-action="synth-close"></div>
      <div class="synth-panel" role="dialog" aria-modal="true">
        <button class="synth-x" data-action="synth-close" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        ${body}
      </div>
    `;
    const panel = host.querySelector('.synth-panel');
    if (panel) panel.scrollTop = 0;
  }

  function renderSynthIntro(c) {
    const prior = synthCountForCase(c.id);
    return `
      <div class="synth-head">
        <div class="synth-kicker">Síntesis grabada</div>
        <div class="synth-case-title">${escapeHtml(c.title)}</div>
        <div class="synth-case-prompt">${escapeHtml(c.prompt)}</div>
      </div>
      <div class="synth-prompt-fixed">
        <div class="synth-prompt-fixed-label">Tu entrega</div>
        <div class="synth-prompt-fixed-body"><strong>Answer → Support → Risk → Next step.</strong> Top-down, 90 segundos. Empieza por la recomendación, no por el contexto.</div>
      </div>
      ${synthState.fallback ? `
        <div class="synth-nomic">
          Este navegador no permite grabar audio (o no hay micrófono). No pasa nada — el valor está en producir la síntesis y calificarla. Habla en voz alta igual; el cronómetro te marca los 90s y después te autoevalúas.
        </div>
      ` : ''}
      <button class="syn-struct-toggle ${synthState.structured ? 'on' : ''}" data-action="syn-struct-toggle" type="button">
        <span class="syn-struct-toggle-box">${synthState.structured ? '✓' : ''}</span>
        <span class="syn-struct-toggle-text">
          <strong>Modo estructurado</strong> — 75s, estructura forzada
          <span class="syn-struct-toggle-sub">Al parar, transcribes lo que DIJISTE en Answer / Support ×2-3 / Risk / Next y un grader duro califica la forma.</span>
        </span>
      </button>
      <button class="synth-record-btn" data-action="synth-start">
        <span class="synth-record-dot"></span>
        <span>${synthState.fallback ? 'Empieza (habla sin grabar)' : 'Empezar a grabar'}</span>
        <span class="synth-record-sub">90s · auto-stop</span>
      </button>
      ${prior > 0 ? renderSynthHistory(c.id, 'Tus síntesis anteriores de este caso') : ''}
    `;
  }

  function renderSynthRecording(c) {
    return `
      <div class="synth-head">
        <div class="synth-kicker ${synthState.fallback ? '' : 'rec'}">${synthState.fallback ? 'Habla en voz alta' : '● Grabando'}</div>
        <div class="synth-case-prompt synth-recording-cue">Answer → Support → Risk → Next step</div>
      </div>
      ${synthState.structured ? `<div class="syn-struct-count">75s · target estructura</div>` : ''}
      <div class="synth-timer">
        <div class="synth-timer-sec">90</div>
        <div class="synth-timer-track"><div class="synth-timer-fill" style="width:100%"></div></div>
      </div>
      <button class="synth-stop-btn" data-action="synth-stop">
        <span class="synth-stop-square"></span>
        <span>Terminé${synthState.fallback ? '' : ' · detener'}</span>
      </button>
      <div class="synth-recording-hint">Entrega tu recomendación completa. El cronómetro se detiene solo a los 90 segundos.</div>
    `;
  }

  function renderSynthReview(c) {
    const sy = c.synthesis;
    // Brick D — modo estructurado: antes del rubric va la transcripción forzada.
    // Funciona igual con o sin audio (los 4 campos y el grader no dependen del mic).
    if (synthState.structured && synthState.struct && !synthState.struct.graded && !synthState.saved) {
      return renderSynStructTranscribe(c);
    }
    if (synthState.saved) {
      return `
        <div class="synth-head">
          <div class="synth-kicker ok">Guardado ✓</div>
          <div class="synth-case-title">${escapeHtml(c.title)}</div>
        </div>
        <div class="synth-saved-score">
          <div class="synth-saved-num">${synthScore()}<span>/12</span></div>
          <div class="synth-saved-label">Nota de tu síntesis</div>
        </div>
        ${synthState.structured && synthState.struct && synthState.struct.graded ? `
          <div class="syn-struct-saved-line ${synthState.struct.structPass ? 'pass' : 'fail'}">
            Estructura: ${synthState.struct.structPass ? 'completa ✓' : 'incompleta ✗'}${synthState.struct.overTime ? ' · fuera de tiempo' : ''}
          </div>
        ` : ''}
        ${renderSynthHistory(c.id, 'Historial de este caso')}
        <div class="synth-review-actions">
          <button class="synth-redo-btn" data-action="synth-redo">Grabar otra</button>
          <button class="synth-done-btn" data-action="synth-close">Listo</button>
        </div>
      `;
    }
    const axes = [
      { key: 'answer',  label: 'Answer-first claridad', hint: '¿Abriste con la recomendación, sin rodeos?' },
      { key: 'support', label: 'Support con números',   hint: '¿Sustentaste con data concreta, no vibras?' },
      { key: 'risk',    label: 'Risk identificado',     hint: '¿Nombraste el riesgo real de tu recomendación?' },
      { key: 'next',    label: 'Next step accionable',  hint: '¿Cerraste con un siguiente paso concreto?' }
    ];
    return `
      <div class="synth-head">
        <div class="synth-kicker">Reproduce y califica</div>
        <div class="synth-case-title">${escapeHtml(c.title)}</div>
      </div>
      ${synthState.hasAudio && synthAudioUrl ? `
        <audio class="synth-audio" controls src="${synthAudioUrl}"></audio>
      ` : `
        <div class="synth-noaudio">Modo sin grabar — califica tu síntesis de memoria, comparándola con el modelo.</div>
      `}
      ${renderSynStructVerdict()}
      <div class="synth-model">
        <div class="synth-model-title">Modelo del caso</div>
        <div class="synth-model-row"><span class="synth-model-tag answer">Answer</span><span>${escapeHtml(sy.answer)}</span></div>
        <div class="synth-model-row"><span class="synth-model-tag support">Support</span><span>${escapeHtml(sy.support)}</span></div>
        <div class="synth-model-row"><span class="synth-model-tag risk">Risk</span><span>${escapeHtml(sy.risk)}</span></div>
        <div class="synth-model-row"><span class="synth-model-tag next">Next</span><span>${escapeHtml(sy.nextstep)}</span></div>
      </div>
      <div class="synth-rubric">
        <div class="synth-rubric-title">Rúbrica · 4 ejes (1–3 cada uno)</div>
        ${axes.map(a => `
          <div class="synth-axis">
            <div class="synth-axis-head">
              <div class="synth-axis-label">${a.label}</div>
              <div class="synth-axis-hint">${a.hint}</div>
            </div>
            <div class="synth-axis-btns">
              ${[1,2,3].map(v => `
                <button class="synth-axis-btn ${synthState.rubric[a.key] === v ? 'sel' : ''}" data-action="synth-rubric" data-axis="${a.key}" data-value="${v}">${v}</button>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
      <button class="synth-save-btn ${synthRubricComplete() ? '' : 'disabled'}" data-action="synth-save" ${synthRubricComplete() ? '' : 'aria-disabled="true"'}>
        ${synthRubricComplete() ? `Guardar nota (${synthScore()}/12)` : 'Califica los 4 ejes para guardar'}
      </button>
    `;
  }

  // Brick D — pantalla de transcripción forzada (post-stop, modo ON).
  // Transcribes lo que DIJISTE, no lo que quisiste decir — esa honestidad es el entrenamiento.
  function renderSynStructTranscribe(c) {
    const st = synthState.struct;
    return `
      <div class="synth-head">
        <div class="synth-kicker">Transcripción forzada</div>
        <div class="synth-case-title">${escapeHtml(c.title)}</div>
        <div class="synth-case-prompt">Escribe lo que DIJISTE en cada bloque — no lo que quisiste decir. Si no lo dijiste, déjalo vacío: el grader mide la forma real.</div>
      </div>
      ${synthState.hasAudio && synthAudioUrl ? `
        <audio class="synth-audio" controls src="${synthAudioUrl}"></audio>
      ` : `
        <div class="synth-noaudio">Modo sin grabar — transcribe de memoria lo que acabas de decir en voz alta.</div>
      `}
      ${st.overTime ? `<div class="syn-struct-overtime">⏱ Fuera de tiempo: ${synthState.durationSec}s (target 75s)</div>` : ''}
      <div class="syn-struct-fields">
        <div class="syn-struct-field">
          <label class="syn-struct-label answer">Answer</label>
          <input type="text" class="syn-struct-input" data-role="syn-struct-answer" value="${escapeHtml(st.answer)}" placeholder="Tu recomendación, en una línea" autocomplete="off">
        </div>
        <div class="syn-struct-field">
          <label class="syn-struct-label support">Support (mínimo 2)</label>
          <input type="text" class="syn-struct-input" data-role="syn-struct-sup1" value="${escapeHtml(st.supports[0])}" placeholder="Support 1" autocomplete="off">
          <input type="text" class="syn-struct-input" data-role="syn-struct-sup2" value="${escapeHtml(st.supports[1])}" placeholder="Support 2" autocomplete="off">
          <input type="text" class="syn-struct-input" data-role="syn-struct-sup3" value="${escapeHtml(st.supports[2])}" placeholder="Support 3 (opcional)" autocomplete="off">
        </div>
        <div class="syn-struct-field">
          <label class="syn-struct-label risk">Risk</label>
          <input type="text" class="syn-struct-input" data-role="syn-struct-risk" value="${escapeHtml(st.risk)}" placeholder="El riesgo real de tu recomendación" autocomplete="off">
        </div>
        <div class="syn-struct-field">
          <label class="syn-struct-label next">Next step</label>
          <input type="text" class="syn-struct-input" data-role="syn-struct-next" value="${escapeHtml(st.next)}" placeholder="Siguiente paso concreto" autocomplete="off">
        </div>
      </div>
      <button class="syn-struct-grade-btn" data-action="syn-struct-grade">Calificar estructura</button>
      <div class="syn-struct-grade-hint">El grader es duro y de una sola pasada: lo vacío cuenta como no dicho.</div>
    `;
  }

  // Brick D — verdict del grader + transcripción congelada (se inserta antes del modelo/rubric).
  function renderSynStructVerdict() {
    const st = synthState.struct;
    if (!st || !st.graded) return '';
    const filled = (s) => String(s || '').trim().length > 0;
    return `
      <div class="syn-struct-verdict ${st.structPass ? 'pass' : 'fail'}">
        <div class="syn-struct-verdict-head">${st.structPass ? 'Estructura completa ✓' : 'Estructura incompleta ✗'}</div>
        ${st.structPass ? '' : `<ul class="syn-struct-missing">${st.missing.map(m => `<li>${escapeHtml(m)}</li>`).join('')}</ul>`}
        ${st.overTime ? `<div class="syn-struct-verdict-time">⏱ Fuera de tiempo (${synthState.durationSec}s / 75s target)</div>` : ''}
      </div>
      <div class="syn-struct-frozen">
        <div class="syn-struct-frozen-title">Lo que dijiste</div>
        <div class="syn-struct-frozen-row"><span class="synth-model-tag answer">Answer</span><span>${filled(st.answer) ? escapeHtml(st.answer) : '<em>— vacío —</em>'}</span></div>
        ${st.supports.map((s, i) => filled(s) ? `<div class="syn-struct-frozen-row"><span class="synth-model-tag support">Sup ${i + 1}</span><span>${escapeHtml(s)}</span></div>` : '').join('')}
        <div class="syn-struct-frozen-row"><span class="synth-model-tag risk">Risk</span><span>${filled(st.risk) ? escapeHtml(st.risk) : '<em>— vacío —</em>'}</span></div>
        <div class="syn-struct-frozen-row"><span class="synth-model-tag next">Next</span><span>${filled(st.next) ? escapeHtml(st.next) : '<em>— vacío —</em>'}</span></div>
      </div>
    `;
  }

  function renderSynthHistory(caseId, title) {
    const items = (state.synthLog || []).filter(e => e && e.caseId === caseId).slice().reverse();
    if (!items.length) return '';
    return `
      <div class="synth-history">
        <div class="synth-history-title">${title}</div>
        ${items.map(e => {
          const d = new Date(e.ts);
          const ds = isNaN(d.getTime()) ? '' : d.toLocaleDateString('es-CL', { day: '2-digit', month: 'short' }) + ' · ' + d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
          const sc = (typeof e.score === 'number') ? e.score : 0;
          const tier = sc >= 10 ? 'hi' : sc >= 7 ? 'mid' : 'lo';
          return `
            <div class="synth-hist-row">
              <span class="synth-hist-score ${tier}">${sc}/12</span>
              <span class="synth-hist-date">${ds}</span>
              ${e.structured && e.struct ? `<span class="syn-struct-hist-badge ${e.struct.structPass ? 'pass' : 'fail'}" title="Modo estructurado">E${e.struct.structPass ? '✓' : '✗'}</span>` : ''}
              ${e.durationSec ? `<span class="synth-hist-dur">${e.durationSec}s</span>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // ============================================================
  // LIVE CASE (Brick 5a) — caso end-to-end bajo reloj, fases 1–5.
  // Modo PARALELO al caso guiado: produces en cada fase y comparas
  // con el modelo (self-graded, sin LLM). Overlay autocontenido, cero
  // acoplamiento con renderCases / grading / routing existentes.
  // Reusa MCMATH.tolOK para el check numérico (fase 4). phaseScores se
  // acumula en liveState (memoria de sesión, NO se persiste). Síntesis +
  // scorecard son Brick 5b — la fase 5 cierra con placeholder.
  // ============================================================

  // Número clave por caso (fase 4 · math-en-contexto). Desde Brick G los
  // inputs se sortean y viven AUTOCONTENIDOS en q (el texto estático del

  function tlFor(c) {
    return (c && TL_OVERLAY[c.id]) ? TL_OVERLAY[c.id] : UNIVERSAL_TL;
  }

  let liveMounted = false;
  let liveClockInterval = null;
  let liveState = { active: false };

  function defaultLiveState(caseId) {
    return {
      active: true,
      caseId: caseId,
      phase: 1,                 // 1 prompt · 2 estructura · 3 hipótesis · 4 data+math · 5 pushback · 6 síntesis · 7 scorecard
      startTs: Date.now(),
      clarRevealed: false,
      userStruct: '',
      structRevealed: false,
      structRubric: { mece: 0, hyp: 0, tailored: 0 },
      userHyp: '',
      hypRevealed: false,
      hypRubric: 0,             // 1–3 · autoevaluación de la hipótesis
      dataRevealed: false,
      mathVal: '',
      mathChecked: false,
      mathOK: null,
      userPush: '',
      pushRevealed: false,
      pushRubric: 0,            // 1–3 · autoevaluación del pushback
      synthDone: false,         // fase 6 completada (rúbrica de síntesis guardada)
      synthScore: 0,            // 4–12 · nota de la rúbrica de síntesis
      totalSec: 0,              // se congela al entrar al scorecard
      scored: false,            // guarda: mastery/radar/log se aplican una sola vez
      phaseScores: {},          // { structure:3–9, hypo:1–3, math:0|1, pushback:1–3, synth:4–12 }
      discardAsk: null,         // gate: confirmación de descarte pendiente ('close' | 'restart' | null)
      mathQ: liveMathGen(caseId), // Brick G: instancia paramétrica CONGELADA por corrida — render/check/scorecard leen esto, nunca LIVE_MATH
      twist: null,              // Brick J: sub-estado del giro — null hasta interceptar la salida de fase 4; {shown, startMs, revealed, picks, graded}
      mathExtras: (LIVE_MATH_EXTRA[caseId] || []).map(function (g) { return g(); }), // Brick M5: instancias CONGELADAS de los extras — slot 0 sale de fase 3, slot 1 de fase 5; restart re-sortea gratis
      extraResults: [],         // Brick M5: [{slot, ok, pat}] — un registro por extra RESUELTO; el commit lee esto
      extraSub: null,           // Brick M5: sub-estado del check extra en pantalla — {slot, val, checked, ok} | null; sin renumerar fases (patrón J)
      tlConfoundPick: null, tlRevealed: false, tlGrade: null, tlDone: false  // Overlay Test & Learn (Brick A)
    };
  }

  function ensureLiveMounted() {
    if (liveMounted) return;
    const host = document.createElement('div');
    host.id = 'live-overlay';
    host.setAttribute('aria-hidden', 'true');
    document.body.appendChild(host);
    host.addEventListener('click', handleLiveClick);
    host.addEventListener('input', handleLiveInput);
    document.addEventListener('keydown', handleLiveKey);
    liveMounted = true;
  }

  function openLiveCase(caseId) {
    const c = CASES.find(x => x.id === caseId);
    if (!c) return;
    ensureLiveMounted();
    stopLiveClock();
    stopLiveTwistCountdown();   // Brick J: defensivo — un restart jamás hereda el reloj del giro
    liveState = defaultLiveState(caseId);
    renderLiveCase();
    startLiveClock();
  }

  function closeLiveCase() {
    // Gate duro (mini-brick GATE): ÚNICO call site del commit. Solo commitea una corrida
    // que llegó al scorecard CON el overlay T&L hecho; cualquier otro cierre descarta.
    if (liveState.active && liveState.phase === 7 && liveState.tlDone) commitLiveRun();
    stopLiveTwistCountdown();   // Brick J: el sub-estado muere con el live — reloj del giro incluido
    stopLiveClock();
    liveState.active = false;
    const host = document.getElementById('live-overlay');
    if (host) { host.classList.remove('open'); host.setAttribute('aria-hidden', 'true'); host.innerHTML = ''; }
  }

  function handleLiveKey(e) {
    if (!liveState.active) return;
    // Si el recorder de síntesis está abierto encima, Escape lo cierra a él
    // (su propio handler), no el caso en vivo de abajo.
    if (synthState && synthState.open) return;
    if (e.key === 'Escape') {
      // Mismo gate que la X/backdrop: escapar del scorecard sin overlay pide confirmación.
      if (liveState.phase === 7 && !liveState.tlDone && !liveState.scored) {
        liveState.discardAsk = 'close';
        renderLiveCase();
        return;
      }
      closeLiveCase();
    }
  }

  function startLiveClock() {
    if (liveClockInterval) clearInterval(liveClockInterval);
    updateLiveClock();
    liveClockInterval = setInterval(updateLiveClock, 1000);
  }
  function stopLiveClock() {
    if (liveClockInterval) { clearInterval(liveClockInterval); liveClockInterval = null; }
  }
  function updateLiveClock() {
    const el = document.querySelector('#live-overlay .live-clock-time');
    if (!el || !liveState.startTs) return;
    const s = Math.floor((Date.now() - liveState.startTs) / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    el.textContent = mm + ':' + ss;
  }

  // Capture textarea/number edits into state so re-renders never lose input.
  function handleLiveInput(e) {
    const t = e.target;
    if (!t || !t.dataset) return;
    const f = t.dataset.field;
    if (f === 'struct') liveState.userStruct = t.value;
    else if (f === 'hyp') liveState.userHyp = t.value;
    else if (f === 'push') liveState.userPush = t.value;
    else if (f === 'math') liveState.mathVal = t.value;
  }

  function handleLiveClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const a = target.dataset.action;
    const s = liveState;

    if (a === 'tl-confound-live') {
      const idx = parseInt(target.dataset.index, 10);
      if (!isNaN(idx)) liveState.tlConfoundPick = idx;
      renderLiveCase();
      return;
    }
    if (a === 'tl-reveal-live') { liveState.tlRevealed = true; renderLiveCase(); return; }
    if (a === 'tl-selfgrade-live') {
      const v = target.dataset.value;
      if (v === 'yes' || v === 'partial' || v === 'no') { liveState.tlGrade = v; liveState.tlDone = true; }
      renderLiveCase();
      return;
    }
    if (a === 'tl-close-live') { if (liveState.tlDone) closeLiveCase(); return; }
    if (a === 'live-close') {
      // Gate duro: escapar del scorecard sin el overlay pide confirmación — descartar no registra.
      if (s.active && s.phase === 7 && !s.tlDone && !s.scored) { s.discardAsk = 'close'; renderLiveCase(); return; }
      closeLiveCase(); return;
    }
    if (a === 'live-discard-cancel')  { s.discardAsk = null; renderLiveCase(); return; }
    if (a === 'live-discard-confirm') {
      const wantRestart = s.discardAsk === 'restart';
      const cid = s.caseId;
      s.discardAsk = null;
      closeLiveCase();   // sin tlDone NO commitea: descarte real (cero log, cero stats, cero racha)
      if (wantRestart) openLiveCase(cid);
      return;
    }
    if (a === 'live-clar')  { s.clarRevealed = true; renderLiveCase(); return; }

    if (a === 'live-struct-reveal') {
      const ta = document.querySelector('#live-overlay [data-field="struct"]');
      if (ta) s.userStruct = ta.value;
      s.structRevealed = true;
      renderLiveCase();
      return;
    }
    if (a === 'live-rubric') {
      const axis = target.dataset.axis, val = parseInt(target.dataset.value, 10);
      if (axis && s.structRubric.hasOwnProperty(axis) && val >= 1 && val <= 3) {
        s.structRubric[axis] = val;
        if (s.structRubric.mece && s.structRubric.hyp && s.structRubric.tailored) {
          s.phaseScores.structure = s.structRubric.mece + s.structRubric.hyp + s.structRubric.tailored;
        }
        renderLiveCase();
      }
      return;
    }
    if (a === 'live-hyp-reveal') {
      const ta = document.querySelector('#live-overlay [data-field="hyp"]');
      if (ta) s.userHyp = ta.value;
      s.hypRevealed = true;
      renderLiveCase();
      return;
    }
    if (a === 'live-hyp-rubric') {
      const val = parseInt(target.dataset.value, 10);
      if (val >= 1 && val <= 3) { s.hypRubric = val; s.phaseScores.hypo = val; renderLiveCase(); }
      return;
    }
    if (a === 'live-data-reveal') { s.dataRevealed = true; renderLiveCase(); return; }
    if (a === 'live-math-check') {
      const inp = document.querySelector('#live-overlay [data-field="math"]');
      if (inp) s.mathVal = inp.value;
      const lm = s.mathQ;   // Brick G: instancia congelada de la corrida — nunca re-sortea en el check
      const v = MCMATH.parseAns(s.mathVal);   // Brick E: mismo parser que los drills — '$60', '19,5', '1.500', '3,2M' dejan de ser NaN injusto
      s.mathOK = lm ? MCMATH.tolOK(v, lm.answer, lm.kind) : false;
      s.mathChecked = true;
      s.phaseScores.math = s.mathOK ? 1 : 0;   // se acumula en liveState
      renderLiveCase();
      return;
    }
    if (a === 'live-push-reveal') {
      const ta = document.querySelector('#live-overlay [data-field="push"]');
      if (ta) s.userPush = ta.value;
      s.pushRevealed = true;
      renderLiveCase();
      return;
    }
    if (a === 'live-push-rubric') {
      const val = parseInt(target.dataset.value, 10);
      if (val >= 1 && val <= 3) { s.pushRubric = val; s.phaseScores.pushback = val; renderLiveCase(); }
      return;
    }
    if (a === 'live-synth-launch') {
      // Reusa el recorder del Brick 4 con un hook: al guardar la rúbrica,
      // su nota (4–12) entra a phaseScores.synth y avanzamos al scorecard.
      openSynth(s.caseId, function (res) {
        s.synthScore = res.score;
        s.phaseScores.synth = res.score;
        s.synthDone = true;
        closeSynth();
        s.phase = 7;
        // Gate duro: el commit ya NO corre aquí — vive en closeLiveCase, gateado por tlDone.
        // Aquí solo se congela el tiempo para el scorecard; el rato del overlay no cuenta.
        stopLiveClock();
        s.totalSec = Math.max(0, Math.floor((Date.now() - s.startTs) / 1000));
        renderLiveCase();
        const panel = document.querySelector('#live-overlay .live-panel');
        if (panel) panel.scrollTop = 0;
      });
      return;
    }
    if (a === 'live-restart') {
      if (s.active && s.phase === 7 && !s.scored) {
        // Con overlay hecho: cerrar commitea (único site) y se reinicia limpio — mismo UX que antes.
        if (s.tlDone) { const cid = s.caseId; closeLiveCase(); openLiveCase(cid); return; }
        // Sin overlay: reiniciar también descarta — misma confirmación honesta.
        s.discardAsk = 'restart'; renderLiveCase(); return;
      }
      openLiveCase(s.caseId); return;
    }
    if (a === 'live-next') {
      // Brick M5: extras quant — extra A (slot 0) intercepta la SALIDA de la
      // fase 3; extra B (slot 1) la SALIDA de la fase 5 (post-giro si lo hay).
      // Mismo patrón de sub-estado que el giro: la fase NO cambia hasta
      // resolver. Caso sin entrada en LIVE_MATH_EXTRA: flujo byte-idéntico.
      // La salida de fase 4 pertenece al GIRO — los extras jamás tocan ahí.
      if ((s.phase === 3 || s.phase === 5) && !s.extraSub) {
        const slot = (s.phase === 3) ? 0 : 1;
        const ex = (s.mathExtras || [])[slot];
        const resolved = (s.extraResults || []).some(function (r) { return r && r.slot === slot; });
        if (ex && !resolved) {
          s.extraSub = { slot: slot, val: '', checked: false, ok: null };
          renderLiveCase();
          const xp = document.querySelector('#live-overlay .live-panel');
          if (xp) xp.scrollTop = 0;
          return;
        }
      }
      // Brick J: al SALIR de la fase 4 (análisis con datos), si el caso tiene
      // giro y aún no se mostró, el giro intercepta — sub-estado, la fase NO
      // cambia todavía. Caso sin entrada en LIVE_TWIST: flujo byte-idéntico.
      if (s.phase === 4 && LIVE_TWIST[s.caseId] && !s.twist) {
        s.twist = { shown: true, startMs: Date.now(), revealed: false, picks: { c1: null, c2: null, c3: null }, graded: null };
        renderLiveCase();
        startLiveTwistCountdown();
        const tp = document.querySelector('#live-overlay .live-panel');
        if (tp) tp.scrollTop = 0;
        return;
      }
      s.phase = Math.min(7, s.phase + 1);
      renderLiveCase();
      const panel = document.querySelector('#live-overlay .live-panel');
      if (panel) panel.scrollTop = 0;
      return;
    }
    // ── Brick J · handlers del giro ──
    if (a === 'live-twist-react') {
      if (s.twist && s.twist.shown && !s.twist.revealed) {
        stopLiveTwistCountdown();          // estado terminal del countdown; el reloj del live sigue
        s.twist.revealed = true;
        renderLiveCase();
      }
      return;
    }
    if (a === 'live-twist-grade') {
      const crit = target.dataset.crit;
      if (s.twist && s.twist.revealed && !s.twist.graded && (crit === 'c1' || crit === 'c2' || crit === 'c3')) {
        s.twist.picks[crit] = target.dataset.value === '1';
        renderLiveCase();
      }
      return;
    }
    if (a === 'live-twist-continue') {
      const p = s.twist && s.twist.picks;
      if (p && p.c1 !== null && p.c2 !== null && p.c3 !== null && !s.twist.graded) {
        s.twist.graded = { c1: p.c1, c2: p.c2, c3: p.c3 };
        s.phase = Math.min(7, s.phase + 1);   // recién ahora avanza: 4 → 5
        renderLiveCase();
        const panel = document.querySelector('#live-overlay .live-panel');
        if (panel) panel.scrollTop = 0;
      }
      return;
    }
    // ── Brick M5 · handlers de los extras quant ──
    if (a === 'live-extra-check') {
      const sub = s.extraSub;
      if (sub && !sub.checked) {
        const inp = document.querySelector('#live-overlay [data-field="extramath"]');
        if (inp) sub.val = inp.value;
        const ex = (s.mathExtras || [])[sub.slot];   // instancia congelada de la corrida — jamás el registro
        const v = MCMATH.parseAns(sub.val);          // mismo parser que el principal (Brick E)
        sub.ok = ex ? MCMATH.tolOK(v, ex.answer, ex.kind) : false;
        sub.checked = true;                          // UN intento con reveal — no hay reintento
        renderLiveCase();
      }
      return;
    }
    if (a === 'live-extra-continue') {
      const sub = s.extraSub;
      if (sub && sub.checked) {
        const ex = (s.mathExtras || [])[sub.slot];
        s.extraResults.push({ slot: sub.slot, ok: !!sub.ok, pat: ex ? ex.pat : null });
        s.phaseScores[sub.slot === 0 ? 'extraA' : 'extraB'] = sub.ok ? 1 : 0;  // key aditiva — liveTotalScore no la lee
        s.extraSub = null;
        s.phase = Math.min(7, s.phase + 1);   // recién ahora avanza (3→4 o 5→6)
        renderLiveCase();
        const panel = document.querySelector('#live-overlay .live-panel');
        if (panel) panel.scrollTop = 0;
      }
      return;
    }
  }

  function liveProgressDots() {
    let dots = '';
    for (let i = 1; i <= 7; i++) {
      const cls = i < liveState.phase ? 'done' : (i === liveState.phase ? 'active' : '');
      dots += `<div class="live-pdot ${cls}"></div>`;
    }
    return dots;
  }

  function renderLiveCase() {
    const host = document.getElementById('live-overlay');
    if (!host) return;
    if (!liveState.active) { host.classList.remove('open'); host.innerHTML = ''; return; }
    const c = CASES.find(x => x.id === liveState.caseId);
    if (!c) { closeLiveCase(); return; }
    host.classList.add('open');
    host.setAttribute('aria-hidden', 'false');

    let body;
    // Brick M5: check extra en pantalla → reemplaza el body (la fase queda
    // congelada, los dots no mienten — mismo contrato de sub-estado que el giro).
    if (liveState.extraSub) body = renderLiveExtra(c);
    // Brick J: giro mostrado y aún no gradeado → la pantalla del giro
    // reemplaza el body (la fase queda congelada en 4, los dots no mienten).
    else if (liveState.twist && liveState.twist.shown && !liveState.twist.graded) body = renderLiveTwist(c);
    else if (liveState.phase === 1) body = renderLivePhase1(c);
    else if (liveState.phase === 2) body = renderLivePhase2(c);
    else if (liveState.phase === 3) body = renderLivePhase3(c);
    else if (liveState.phase === 4) body = renderLivePhase4(c);
    else if (liveState.phase === 5) body = renderLivePhase5(c);
    else if (liveState.phase === 6) body = renderLivePhase6(c);
    else                            body = renderLivePhase7(c);

    host.innerHTML = `
      <div class="live-backdrop" data-action="live-close"></div>
      <div class="live-panel" role="dialog" aria-modal="true">
        <button class="live-x" data-action="live-close" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="live-clock">
          <span class="live-clock-dot"></span>
          <span class="live-clock-time">00:00</span>
          <span class="live-clock-label">en vivo</span>
          <div class="live-progress">${liveProgressDots()}</div>
        </div>
        ${body}
      </div>
    `;
    updateLiveClock();
  }

  // ── EL GIRO (Brick J) · sub-estado entre fase 4 y 5 ─────────────
  // Countdown VISUAL de 60s, patrón Brick D: a 0 se pone rojo y avisa,
  // pero NO corta — reaccionar tarde sigue siendo reaccionar. Reloj
  // propio con cleanup en react/close/open.
  const LIVE_TWIST_MS = 60000;
  let liveTwistTimerInterval = null;

  function startLiveTwistCountdown() {
    if (liveTwistTimerInterval) clearInterval(liveTwistTimerInterval);
    liveTwistTimerInterval = setInterval(updateLiveTwistCountdown, 200);
    updateLiveTwistCountdown();
  }
  function stopLiveTwistCountdown() {
    if (liveTwistTimerInterval) { clearInterval(liveTwistTimerInterval); liveTwistTimerInterval = null; }
  }
  function updateLiveTwistCountdown() {
    const el = document.querySelector('#live-overlay .live-twist-count');
    if (!el) return;
    const t = liveState.twist;
    const elapsed = (t && t.startMs) ? (Date.now() - t.startMs) : 0;
    const remaining = LIVE_TWIST_MS - elapsed;
    if (remaining <= 0) {
      el.classList.add('over');
      el.textContent = 'Fuera de tiempo — reacciona igual y cierra';
    } else {
      el.classList.remove('over');
      el.textContent = Math.ceil(remaining / 1000) + 's · reacciona en voz alta';
    }
  }

  // Pantalla del giro. Fase congelada (los dots no avanzan): esto es un
  // sub-estado, no una fase — la numeración 1–7 del live está CONGELADA.
  function renderLiveTwist(c) {
    const t = liveState.twist;
    const tw = LIVE_TWIST[liveState.caseId];
    if (!t || !tw) return renderLivePhase4(c);   // guard: jamás debería pasar
    let html = `
      <div class="live-head">
        <div class="live-kicker">⚡ Giro · dato nuevo</div>
        <div class="live-phase-title">El entrevistador te interrumpe</div>
      </div>
      <div class="live-prompt">"${escapeHtml(tw.trigger)}"</div>
    `;
    if (!t.revealed) {
      html += `<div class="live-twist-count">60s · reacciona en voz alta</div>`;
      html += `<div class="live-instruction">EN VOZ ALTA: di <strong>qué invalida</strong> este dato, <strong>revisa tu hipótesis</strong> explícitamente, y <strong>re-toca el número</strong> — no sigas con el plan viejo como si nada.</div>`;
      html += `<button class="live-btn" data-action="live-twist-react">Reaccioné en voz alta<span class="live-btn-sub">revelar qué invalida + autoevaluar</span></button>`;
      return html;
    }
    html += `<div class="live-model"><div class="live-model-title">Qué invalida este dato</div><div class="live-model-line">${escapeHtml(tw.invalidates)}</div></div>`;
    html += `<div class="live-instruction" style="margin-bottom:0"><strong>Autoevalúa tu reacción</strong> — sí/no, honesto:</div>`;
    html += (tw.rubric || []).map((crit, i) => {
      const key = 'c' + (i + 1);
      const pick = t.picks[key];
      return `
      <div class="live-axis">
        <div class="live-axis-head"><div class="live-axis-hint">${escapeHtml(crit)}</div></div>
        <div class="live-axis-btns">
          <button class="live-axis-btn ${pick === true ? 'sel' : ''}" data-action="live-twist-grade" data-crit="${key}" data-value="1">Sí</button>
          <button class="live-axis-btn ${pick === false ? 'sel' : ''}" data-action="live-twist-grade" data-crit="${key}" data-value="0">No</button>
        </div>
      </div>`;
    }).join('');
    const allPicked = t.picks.c1 !== null && t.picks.c2 !== null && t.picks.c3 !== null;
    const nYes = allPicked ? ((t.picks.c1 ? 1 : 0) + (t.picks.c2 ? 1 : 0) + (t.picks.c3 ? 1 : 0)) : 0;
    html += `<button class="live-btn ${allPicked ? '' : 'disabled'}" data-action="live-twist-continue" ${allPicked ? '' : 'aria-disabled="true"'}>Pushback →<span class="live-btn-sub">${allPicked ? ('reacción ' + nYes + '/3 · fase 5') : 'califica los 3 criterios'}</span></button>`;
    return html;
  }

  // Brick M5 · pantalla del check extra. Sub-estado como el giro: la fase
  // queda congelada (dots quietos), la numeración 1–7 del live NO se toca.
  // Un intento con reveal — resolver (bien o mal) es lo que avanza la fase.
  function renderLiveExtra(c) {
    const s = liveState;
    const sub = s.extraSub;
    const ex = sub ? (s.mathExtras || [])[sub.slot] : null;
    if (!sub || !ex) { s.extraSub = null; return renderLivePhase4(c); }   // guard: jamás debería pasar
    const nextLabel = sub.slot === 0 ? 'Datos + cálculo →' : 'Síntesis →';
    const nextSub = sub.slot === 0 ? 'fase 4 · math en contexto' : 'fase 6 · cierra en voz alta';
    let html = `
      <div class="live-head">
        <div class="live-kicker">🧮 Quant extra ${sub.slot === 0 ? 'A' : 'B'} · check rápido</div>
        <div class="live-phase-title">El entrevistador quiere un número</div>
      </div>
      <div class="live-instruction">Números frescos en cada corrida — un solo intento, calcula desde este enunciado: ${escapeHtml(ex.q)}</div>
      <div class="live-math"><div class="live-math-row">
        <input class="live-math-input" data-field="extramath" type="text" inputmode="decimal" placeholder="?" value="${escapeHtml(String(sub.val))}" ${sub.checked ? 'disabled' : ''}>
        <span class="live-math-unit">${escapeHtml(ex.unit)}</span>
        ${sub.checked ? '' : `<button class="live-math-check" data-action="live-extra-check">Comprobar</button>`}
      </div></div>
    `;
    if (sub.checked) {
      html += sub.ok
        ? `<div class="live-math-result ok">✓ Correcto dentro de tolerancia.<span class="live-math-hint">${escapeHtml(ex.hint)}</span></div>`
        : `<div class="live-math-result off">Fuera de tolerancia.<span class="live-math-hint">Camino: ${escapeHtml(ex.hint)}</span></div>`;
      html += `<button class="live-btn" data-action="live-extra-continue">${nextLabel}<span class="live-btn-sub">${nextSub}</span></button>`;
    }
    return html;
  }

  // ── Total agregado de la corrida (0–100): cada fase normalizada a su rango.
  function liveTotalScore(ps) {
    const parts = [];
    if (typeof ps.structure === 'number') parts.push((ps.structure - 3) / 6);  // 3→0, 9→1
    if (typeof ps.hypo === 'number')      parts.push((ps.hypo - 1) / 2);        // 1→0, 3→1
    if (typeof ps.math === 'number')      parts.push(ps.math ? 1 : 0);          // 0|1
    if (typeof ps.pushback === 'number')  parts.push((ps.pushback - 1) / 2);    // 1→0, 3→1
    if (typeof ps.synth === 'number')     parts.push((ps.synth - 4) / 8);       // 4→0, 12→1
    if (!parts.length) return 0;
    const avg = parts.reduce((a, b) => a + b, 0) / parts.length;
    return Math.round(Math.max(0, Math.min(1, avg)) * 100);
  }

  // Fix concreto por fase, surfaceado para las 1–2 fases más bajas del scorecard.
  const LIVE_FIX = {
    structure: 'Estructura: arma 3 buckets MECE tailored al caso (no un 4C de molde) y di el "por qué" de cada uno antes de bajar al detalle.',
    hypo:      'Hipótesis: comprométete con un mecanismo concreto y testeable ("el driver es X porque Y"), no con una etiqueta de bucket.',
    math:      'Cálculo: ordena la operación antes de tocar números — fija la base correcta y evita la confusión de tasas (P2R) que arrastras.',
    pushback:  'Pushback: responde directo, sin defenderte — reconoce el punto, sostén tu lógica con un dato y reencuadra.',
    synth:     'Síntesis: abre con la recomendación (answer-first), respáldala con números, nombra el riesgo real y cierra con un next step acotado.'
  };

  function liveVerdict(ps, total) {
    const norm = {
      structure: (typeof ps.structure === 'number') ? (ps.structure - 3) / 6 : null,
      hypo:      (typeof ps.hypo === 'number') ? (ps.hypo - 1) / 2 : null,
      math:      (typeof ps.math === 'number') ? (ps.math ? 1 : 0) : null,
      pushback:  (typeof ps.pushback === 'number') ? (ps.pushback - 1) / 2 : null,
      synth:     (typeof ps.synth === 'number') ? (ps.synth - 4) / 8 : null
    };
    const ranked = Object.keys(norm).filter(k => norm[k] !== null).sort((a, b) => norm[a] - norm[b]);
    const lowest = ranked.slice(0, 2).filter(k => norm[k] < 0.84);   // sólo fases con margen real
    let tier, headline;
    if (total >= 80)      { tier = 'strong'; headline = 'Listo para tablero.'; }
    else if (total >= 55) { tier = 'good';   headline = 'Sólido, con grietas.'; }
    else                  { tier = 'weak';   headline = 'Hay trabajo por hacer.'; }
    const fixes = lowest.map(k => LIVE_FIX[k]).filter(Boolean);
    if (!fixes.length) fixes.push('Mantén el nivel: repite con un caso más difícil y córtate el reloj.');
    return { tier, headline, fixes };
  }

  // Aplica mastery + radar P1–P4 + persiste la corrida. Corre UNA vez por run.
  function commitLiveRun() {
    const s = liveState;
    if (s.scored) return;
    s.scored = true;
    stopLiveClock();
    // El tiempo se congela al entrar al scorecard (6→7); aquí solo si algún path no lo hizo.
    if (!s.totalSec) s.totalSec = Math.max(0, Math.floor((Date.now() - s.startTs) / 1000));
    const ps = s.phaseScores || {};
    // Radar P1–P4: el resultado del math en contexto alimenta el patrón del caso.
    const lm = s.mathQ;   // Brick G: instancia congelada — pat es fijo por caso, misma dieta del radar
    if (lm && lm.pat) bumpMathPat(lm.pat, !!s.mathOK);
    // Brick M5: señal de los extras — un bump por extra RESUELTO. Hereda el
    // gate s.scored de arriba (mismo gate que el principal); un descarte no
    // pasa por acá. La tabla de tiempos de math NO se toca: el live nunca la escribió.
    for (const xr of (s.extraResults || [])) { if (xr && xr.pat) bumpMathPat(xr.pat, !!xr.ok); }
    // Mastery por skill — mismo stepStats que alimenta el insight del Dashboard.
    if (typeof ps.structure === 'number') recordStepStat('mece', ps.structure >= 7);
    if (typeof ps.hypo === 'number')      recordStepStat('hypothesis', ps.hypo >= 2);
    if (typeof ps.math === 'number')      recordStepStat('math', ps.math === 1);
    if (typeof ps.synth === 'number')     recordStepStat('synthesis', ps.synth >= 9);
    // Brick J: señal del giro — SOLO si el giro apareció y fue gradeado.
    // Un live sin giro no registra giro; un descarte no pasa por acá.
    const twistDone = !!(s.twist && s.twist.graded);
    const twistPass = twistDone && (((s.twist.graded.c1 ? 1 : 0) + (s.twist.graded.c2 ? 1 : 0) + (s.twist.graded.c3 ? 1 : 0)) >= 2);
    if (twistDone) recordStepStat('giro', twistPass);
    // Persiste la corrida (mismo patrón/guarda de array que synthLog).
    if (!Array.isArray(state.liveCaseLog)) state.liveCaseLog = [];
    state.liveCaseLog.push({
      caseId: s.caseId,
      ts: Date.now(),
      totalSec: s.totalSec,
      phaseScores: {
        structure: (typeof ps.structure === 'number') ? ps.structure : null,
        hypo:      (typeof ps.hypo === 'number') ? ps.hypo : null,
        math:      (typeof ps.math === 'number') ? ps.math : null,
        pushback:  (typeof ps.pushback === 'number') ? ps.pushback : null,
        synth:     (typeof ps.synth === 'number') ? ps.synth : null
      },
      total: liveTotalScore(ps)
    });
    // Brick J: campo aditivo en la entrada recién pusheada — solo si hubo giro.
    if (twistDone) {
      state.liveCaseLog[state.liveCaseLog.length - 1].twist = {
        pass: twistPass,
        grades: { c1: !!s.twist.graded.c1, c2: !!s.twist.graded.c2, c3: !!s.twist.graded.c3 }
      };
    }
    // Brick M5: campo aditivo — solo si hubo extras resueltos en la corrida.
    if (s.extraResults && s.extraResults.length) {
      state.liveCaseLog[state.liveCaseLog.length - 1].extras = s.extraResults.map(function (r) { return { ok: !!r.ok, pat: r.pat }; });
    }
    if (state.liveCaseLog.length > 100) state.liveCaseLog = state.liveCaseLog.slice(-100);
    registerSession();   // crédito de streak — una corrida completa es práctica
    saveState();         // garantiza persistencia aunque registerSession ya contara hoy
  }

  // ── Fase 7 · Scorecard — tiempo + scores agregados + veredicto/fixes.
  function renderLivePhase7(c) {
    const s = liveState;
    const ps = s.phaseScores || {};
    const total = liveTotalScore(ps);
    const v = liveVerdict(ps, total);
    const mm = String(Math.floor((s.totalSec || 0) / 60)).padStart(2, '0');
    const ss = String((s.totalSec || 0) % 60).padStart(2, '0');
    const rows = [
      { label: 'Estructura', val: (typeof ps.structure === 'number') ? ps.structure + '/9' : '—' },
      { label: 'Hipótesis',  val: (typeof ps.hypo === 'number') ? ps.hypo + '/3' : '—' },
      { label: 'Cálculo',    val: (typeof ps.math === 'number') ? (ps.math ? '✓' : '✗') : '—' },
      { label: 'Pushback',   val: (typeof ps.pushback === 'number') ? ps.pushback + '/3' : '—' },
      { label: 'Síntesis',   val: (typeof ps.synth === 'number') ? ps.synth + '/12' : '—' }
    ];
    // Brick J: fila aditiva del giro — solo si hubo giro gradeado en la corrida.
    if (s.twist && s.twist.graded) {
      const tg = s.twist.graded;
      const tn = (tg.c1 ? 1 : 0) + (tg.c2 ? 1 : 0) + (tg.c3 ? 1 : 0);
      rows.push({ label: 'Giro', val: tn === 3 ? 'reaccionaste bien' : (tn === 2 ? 'a medias' : 'mal') });
    }
    // Brick M5: fila(s) aditivas de los extras — solo los resueltos en la corrida.
    if (typeof ps.extraA === 'number') rows.push({ label: 'Quant extra A', val: ps.extraA ? '✓' : '✗' });
    if (typeof ps.extraB === 'number') rows.push({ label: 'Quant extra B', val: ps.extraB ? '✓' : '✗' });
    return `
      <div class="live-head">
        <div class="live-kicker">Scorecard</div>
        <div class="live-phase-title">${escapeHtml(c.title)}</div>
      </div>
      ${s.discardAsk ? `
      <div class="reset-confirm">
        <strong>Salir sin el overlay descarta la corrida — no se registra.</strong> ¿${s.discardAsk === 'restart' ? 'Reiniciar' : 'Salir'} igual?
        <div class="reset-actions">
          <button class="reset-cancel" data-action="live-discard-cancel">Cancelar</button>
          <button class="reset-confirm-btn" data-action="live-discard-confirm">${s.discardAsk === 'restart' ? 'Sí, reiniciar sin registrar' : 'Sí, salir sin registrar'}</button>
        </div>
      </div>` : ''}
      <div class="live-sc-top">
        <div class="live-sc-total live-sc-${v.tier}">
          <div class="live-sc-total-num">${total}<span>/100</span></div>
          <div class="live-sc-total-label">${v.headline}</div>
        </div>
        <div class="live-sc-time">
          <div class="live-sc-time-num">${mm}:${ss}</div>
          <div class="live-sc-time-label">tiempo total</div>
        </div>
      </div>
      <div class="live-sc-table">
        ${rows.map(r => `<div class="live-sc-row"><span class="live-sc-row-label">${r.label}</span><span class="live-sc-row-val">${r.val}</span></div>`).join('')}
      </div>
      <div class="live-sc-verdict">
        <div class="live-sc-verdict-title">Para tu próxima corrida</div>
        ${v.fixes.map(f => `<div class="live-sc-fix">${escapeHtml(f)}</div>`).join('')}
      </div>
      ${renderTLOverlay(c, liveState, true)}
      <button class="live-btn" data-action="live-restart">Repetir este caso de cero<span class="live-btn-sub">reinicia las 7 fases · reloj nuevo</span></button>
      <button class="live-btn ghost ${liveState.tlDone ? '' : 'disabled'}" data-action="tl-close-live" ${liveState.tlDone ? '' : 'aria-disabled="true"'}>Cerrar scorecard${liveState.tlDone ? '' : '<span class="live-btn-sub">cierra el overlay Test &amp; Learn para terminar · o usa la X</span>'}</button>
    `;
  }

  // ============================================================
  // RECALL TAB — active recall with timer + branch-by-branch grading
  // ============================================================
  let recallMounted = false;
  let recallTimerInterval = null;
  let recallState = {
    phase: 'pick',            // 'pick' | 'timer' | 'grade' | 'summary'
    frameworkId: null,
    timerStart: null,
    timerDuration: 90000,     // 90 seconds
    currentBranchIdx: 0,
    branchGrades: {},         // { [branchId]: 'got' | 'partial' | 'missed' }
    transitioning: false,     // lock during 350ms auto-advance
    masteryBefore: null,      // snapshot % for this framework at session start — enables before/after delta
    wasDue: true              // framework estaba VENCIDO (SRS) al iniciar: gobierna commit de mastery + reprogramación
  };

  // ============================================================
  // SRS (SM-2 lite) — reemplaza el cooldown plano de 30 min.
  // Programa el próximo Recall por framework con intervalos expansivos.
  // interval en días · ease con piso 1.3 · due = timestamp ms.
  // ============================================================
  const SRS_EASE_FLOOR = 1.3;
  const SRS_EASE_START = 2.5;

  // Entrada SRS de un framework, o una base fresca si nunca se ha repasado.
  function srsEntryOrBase(fwId) {
    const e = state.srs && state.srs[fwId];
    if (e && typeof e.interval === 'number' && typeof e.ease === 'number' && typeof e.due === 'number') return e;
    return { interval: 1, ease: SRS_EASE_START, due: 0 }; // due:0 → vence ahora (nunca repasado)
  }
  // ¿El framework está vencido (toca repasarlo hoy)? Sin entrada = sí.
  function srsIsDue(fwId, now) {
    const e = state.srs && state.srs[fwId];
    if (!e || typeof e.due !== 'number') return true;
    return e.due <= (now || Date.now());
  }
  // due usado para ordenar el pick (sin entrada = 0 → arriba del todo).
  function srsDueOf(fwId) {
    const e = state.srs && state.srs[fwId];
    return (e && typeof e.due === 'number') ? e.due : 0;
  }
  // Cuántos frameworks vencen hoy o antes.
  function srsDueCount(now) {
    const t = now || Date.now();
    return FRAMEWORKS.reduce(function (n, f) { return n + (srsIsDue(f.id, t) ? 1 : 0); }, 0);
  }
  // Aplica SM-2 lite tras una sesión calificada. grade: 'got'|'partial'|'missed'.
  // Muta state.srs[fwId] y persiste. Devuelve la entrada nueva.
  function srsApply(fwId, grade, now) {
    const t = now || Date.now();
    const base = srsEntryOrBase(fwId);
    let interval = base.interval > 0 ? base.interval : 1;
    let ease = base.ease > 0 ? base.ease : SRS_EASE_START;
    if (grade === 'got') {
      interval = interval * ease;
      ease = ease + 0.1;
    } else if (grade === 'partial') {
      interval = interval * 1.2;
      ease = ease - 0.15;
    } else { // missed
      interval = 1;
      ease = ease - 0.2;
    }
    if (ease < SRS_EASE_FLOOR) ease = SRS_EASE_FLOOR; // piso de facilidad (SM-2 estándar)
    if (!(interval > 0)) interval = 1;                 // intervalo siempre positivo
    const entry = { interval: interval, ease: ease, due: t + Math.round(interval * SRS_DAY_MS) };
    if (!state.srs || typeof state.srs !== 'object') state.srs = {};
    state.srs[fwId] = entry;
    saveState();
    return entry;
  }
  // Agrega las calificaciones por rama de la sesión en un veredicto único got/partial/missed
  // para SM-2. Mismo earned/total que el % del summary: ≥65% got · ≥35% partial · resto missed.
  function srsSessionGrade(branchGrades, branches) {
    let earned = 0;
    branches.forEach(function (b) {
      const g = branchGrades[b.id];
      if (g === 'got') earned += 1;
      else if (g === 'partial') earned += 0.5;
    });
    const pct = (earned / branches.length) * 100;
    if (pct >= 65) return 'got';
    if (pct >= 35) return 'partial';
    return 'missed';
  }
  // Etiqueta relativa en español para una fecha de vencimiento SRS.
  function srsDueLabel(due) {
    const ms = due - Date.now();
    if (ms <= 0) return 'hoy';
    const days = Math.ceil(ms / SRS_DAY_MS);
    if (days <= 1) return 'mañana';
    if (days < 7)  return 'en ' + days + ' días';
    if (days < 14) return 'en 1 semana';
    if (days < 30) return 'en ' + Math.round(days / 7) + ' semanas';
    if (days < 60) return 'en 1 mes';
    return 'en ' + Math.round(days / 30) + ' meses';
  }

  function renderRecall(opts) {
    const root = document.getElementById('recall-root');
    if (!root) return;
    if (opts && opts.startFramework && FRAMEWORK_DATA[opts.startFramework]) {
      // Deep-link from Dashboard Smart Recall CTA
      recallState.frameworkId = opts.startFramework;
      recallState.phase = 'timer';
      recallState.currentBranchIdx = 0;
      recallState.branchGrades = {};
      recallState.transitioning = false;
      recallState.masteryBefore = frameworkMastery(opts.startFramework);
      recallState.wasDue = srsIsDue(opts.startFramework); // SRS reemplaza el cooldown: ¿estaba vencido?
      startRecallTimer();
    }
    switch (recallState.phase) {
      case 'pick':    root.innerHTML = renderRecallPick();    break;
      case 'timer':   root.innerHTML = renderRecallTimer();   break;
      case 'grade':   root.innerHTML = renderRecallGrade();   break;
      case 'summary': root.innerHTML = renderRecallSummary(); break;
    }
    if (!recallMounted) {
      root.addEventListener('click', handleRecallClick);
      recallMounted = true;
    }
  }

  function renderRecallPick() {
    const now = Date.now();
    const dueCount = srsDueCount(now);
    // Orden por vencimiento (due asc): los más atrasados arriba. Sin entrada = due 0 = primero.
    const dueSorted = FRAMEWORKS.slice().sort((a, b) => srsDueOf(a.id) - srsDueOf(b.id));
    // Lead del smart card: el vencido con due más antiguo; si nada vence, el más débil.
    const firstDue = dueSorted.find(f => srsIsDue(f.id, now));
    const lead = firstDue || weakestFramework();
    const leadData = FRAMEWORK_DATA[lead.id];
    const leadIsDue = srsIsDue(lead.id, now);
    const dueLine = dueCount === 1 ? '1 framework due hoy' : dueCount + ' frameworks due hoy';

    return `
      <div class="cases-header">
        <div class="cases-title">Active Recall</div>
        <div class="cases-subtitle">90 segundos para reconstruir un framework de memoria. Califícate rama por rama — el sistema reprograma cada uno por separado (spaced repetition).</div>
      </div>

      <div class="recall-smart-card" data-action="start-recall" data-fw="${lead.id}" style="cursor:pointer">
        <div class="recall-smart-label">${leadIsDue ? 'Spaced Recall · ' + dueLine : 'Smart Recall · Tu más débil'}</div>
        <div class="recall-smart-fw">
          <span class="color-dot color-dot-lg" style="background:${lead.color}"></span>
          ${escapeHtml(leadData.name)}
        </div>
        <div class="recall-smart-meta">${frameworkMastery(lead.id)}% de dominio · ${leadIsDue ? 'vence ' + escapeHtml(srsDueLabel(srsDueOf(lead.id))) : 'al día · ' + masteryTier(frameworkMastery(lead.id)).label}</div>
        <button class="reveal-btn" data-action="start-recall" data-fw="${lead.id}">Empezar drill de 90 segundos →</button>
      </div>

      <div class="recall-section-label">${dueCount > 0 ? 'Ordenados por vencimiento' : 'Nada vencido · vas al día'}</div>

      ${dueSorted.map(f => {
        const fw = FRAMEWORK_DATA[f.id];
        const mastery = frameworkMastery(f.id);
        const isDue = srsIsDue(f.id, now);
        return `

  function renderRecallGrade() {

    const branches = fw.branches;
    const idx = recallState.currentBranchIdx;
