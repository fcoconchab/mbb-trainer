  // ---- HYPOTHESIS drill body ----
  function renderHypothesisDrill(drill) {
    const s = drillsState;
    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Prompt del caso</div>
        <div class="drill-prompt-text">"${escapeHtml(drill.prompt)}"</div>
      </div>
      <div class="drill-task"><strong>Tu tarea:</strong> Elige la hipótesis más fuerte. Comprométete antes de tocar "Revisar respuesta."</div>
      <div class="drill-options">
        ${drill.options.map((opt, i) => {
          const sel = s.selectedOption === i ? `selected-${opt.strength}` : '';
          return `<button class="option-btn ${sel}" data-action="drill-pick-option" data-index="${i}">${escapeHtml(opt.text)}</button>`;
        }).join('')}
      </div>
    `;
    if (s.selectedOption !== null && !s.revealed) {
      html += `<button class="reveal-btn" data-action="drill-reveal">Revisar respuesta</button>`;
    }
    if (s.revealed && s.selectedOption !== null) {
      const opt = drill.options[s.selectedOption];
      const isCorrect = opt.strength === 'strong';
      html += `
        <div class="drill-verdict ${isCorrect ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${isCorrect ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${isCorrect ? 'Correcto' : 'Pick débil'}</div>
        </div>
        <div class="feedback-block show ${opt.strength}" style="display:block">
          <div class="feedback-title">${opt.strength === 'strong' ? 'Por qué funciona' : 'Por qué se queda corta'}</div>
          <div class="feedback-body">${escapeHtml(opt.feedback)}</div>
          ${opt.failurePath ? `
            <div class="failure-path">
              <div class="failure-path-label">Camino de falla — a dónde lleva esta hipótesis</div>
              ${escapeHtml(opt.failurePath)}
            </div>
          ` : ''}
        </div>
      `;
      if (!isCorrect) {
        const strongIdx = drill.options.findIndex(o => o.strength === 'strong');
        const strong = drill.options[strongIdx];
        html += `
          <div class="feedback-block show strong" style="display:block;margin-top:var(--sp-3)">
            <div class="feedback-title">La hipótesis fuerte era</div>
            <div class="feedback-body" style="font-style:italic;margin-bottom:12px">"${escapeHtml(strong.text)}"</div>
            <div class="feedback-body">${escapeHtml(strong.feedback)}</div>
          </div>
          <button class="reveal-btn" style="margin-top:var(--sp-3)" data-action="drill-retry">Reintenta este drill</button>
        `;
      }
    }
    return html;
  }

  // ---- MATH drill body ----
  function renderMathDrill(drill) {
    const s = drillsState;
    const inputDisabled = s.revealed ? 'disabled' : '';
    // Verbalize mode: stored on drillsState so it persists while cycling drills; default off
    const verbalize = !!s.verbalizeMode;
    const verbalizedStep = s.verbalizedStep || 0;
    const mc = drill.__mc || null;
    const ansDisplay = mc ? escapeHtml(mc.ansFmt) : (drill.answer + (drill.unit ? ' ' + escapeHtml(drill.unit) : ''));

    // Radar de patrones (solo math generado): perfil de vulnerabilidad en vivo, colapsable.
    let radarCard = '';
    if (mc) {
      const open = !!s.radarOpen;
      const totAtt = mathPatsTotal();
      const weakId = MCMATH.weakestPat(state.mathPats);
      const weakName = (MCMATH.PAT[weakId] && MCMATH.PAT[weakId].name) || weakId;
      // Brick B: estado del foco de generación (drillsState.mathFocus). El label reúsa MCMATH.PAT
      // (mismo patrón que weakName). (Brick I: los labels P* del plan SdH viven en SKILL_LABELS.)
      const focusOn = !!s.mathFocus;
      const focusName = focusOn ? ((MCMATH.PAT[s.mathFocus] && MCMATH.PAT[s.mathFocus].name) || s.mathFocus) : '';
      const summary = (totAtt === 0
        ? 'aún sin datos — resuelve drills para llenarlo'
        : ('más débil: ' + weakName + ' · ' + totAtt + ' intentos'))
        + (focusOn ? ' · ◎ foco ON' : '');
      let body = '';
      if (open) {
        const nudge = totAtt === 0
          ? 'El radar se llena a medida que respondes. Tu vértice marcado en oro es <strong>P2 tasas / base</strong> — tu vulnerabilidad #1.'
          : ('Patrón más débil ahora: <strong>' + escapeHtml(weakName) + '</strong>. Practícalo con drills tipo <span class="mc-mono">' + (MCMATH.PRACT[weakId] || []).join(', ') + '</span>.');
        // Línea de velocidad del patrón más débil (solo con datos): mediana vs meta + tag accuracy×velocidad.
        const wTag = mathSpeedTag(weakId), wMed = mathMedian((state.mathTimes || {})[weakId]);
        const wN = (Array.isArray((state.mathTimes || {})[weakId]) ? state.mathTimes[weakId].length : 0);
        const speedLine = (totAtt > 0 && wTag && wMed != null)
          ? '<div class="mc-radar-nudge mc-radar-speed">Velocidad en <strong>' + escapeHtml(weakName) + '</strong>: mediana ' + wMed + 's · n=' + wN + ' vs meta ' + (MATH_TARGET[weakId] || 30) + 's · <span class="' + wTag.cls + '">' + wTag.label + '</span></div>'
          : '';
        // Brick B: chip que alterna el foco de generación (null ↔ weakestPat). Afecta la PRÓXIMA
        // generación — el drill en curso no se re-genera (ver branch toggle-math-focus).
        const focusChip =
          '<button class="mc-focus-chip' + (focusOn ? ' on' : '') + '" data-action="toggle-math-focus">' +
            (focusOn
              ? '◎ Foco: ' + escapeHtml(focusName) + ' — próximos drills solo de este patrón · toca para soltar'
              : '○ Enfocar próximos drills en tu patrón débil (' + escapeHtml(weakName) + ')') +
          '</button>';
        body = '<div class="mc-radar-body"><div class="mc-radar-svg">' + MCMATH.radarSVG(state.mathPats) + '</div><div class="mc-radar-nudge">' + nudge + '</div>' + speedLine + focusChip + '</div>';
      }
      radarCard =
        '<div class="mc-radar-card ' + (open ? 'open' : '') + '">' +
          '<button class="mc-radar-head" data-action="toggle-radar">' +
            '<span class="mc-radar-head-title">◈ Radar de patrones</span>' +
            '<span class="mc-radar-head-sum">' + escapeHtml(summary) + '</span>' +
            '<svg class="mc-radar-chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
          '</button>' + body +
        '</div>';
    }

    let html = radarCard + `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">${mc && mc.eyebrow ? 'Enunciado · ' + escapeHtml(mc.eyebrow) : 'Enunciado'}</div>
        <div class="drill-prompt-text">${escapeHtml(drill.prompt)}</div>
      </div>
      ${mc && mc.legendHTML ? mc.legendHTML : ''}
      ${mc && mc.ask ? `<div class="mc-ask">${escapeHtml(mc.ask)}</div>` : ''}
      ${mc && mc.unitNote ? `<div class="mc-unitnote"><span>Responde en:</span> ${escapeHtml(mc.unitNote)}</div>` : ''}

      <div class="verbalize-toggle ${verbalize ? 'active' : ''}" data-action="toggle-verbalize">
        <div class="verbalize-checkbox"></div>
        <div>
          <span class="verbalize-label"><strong>Modo verbalizar</strong> — di cada paso en voz alta antes de responder</span>
          <span class="verbalize-hint">entrena el "pensar en voz alta" que escuchan los entrevistadores MBB</span>
        </div>
      </div>
    `;

    if (!verbalize) {
      // Standard mode: type answer directly
      html += `
        <div class="drill-task"><strong>Tu tarea:</strong> haz el cálculo mental. Comprométete a una respuesta antes de tocar Verificar.</div>
        <div class="math-input-row">
          <input type="text" class="math-input" data-role="math-input" inputmode="decimal"
                 placeholder="Tu respuesta${drill.unit ? ' (' + escapeHtml(drill.unit) + ')' : ''}"
                 value="${escapeHtml(s.mathValue)}" ${inputDisabled}>
          <button class="math-submit" data-action="drill-math-submit" ${s.mathValue === '' || s.revealed ? 'disabled' : ''}>Verificar</button>
        </div>
      `;
    } else {
      // Verbalize mode: reveal one step at a time, user says it out loud, then taps to continue
      html += `
        <div class="drill-task"><strong>Tu tarea:</strong> di cada paso en voz alta antes de revelar el siguiente. Cuando hayas verbalizado todo el ledger, comprométete a tu respuesta y verifica.</div>
      `;
      // Show the already-revealed verbalize steps
      for (let i = 0; i < verbalizedStep; i++) {
        const step = drill.steps[i];
        if (!step) break;
        html += `
          <div class="verbalize-step-block">
            <div class="verbalize-step-block-label">Paso ${i + 1}</div>
            <div class="verbalize-step-block-body">${escapeHtml(step)}</div>
          </div>
        `;
      }
      // If more steps to reveal
      if (verbalizedStep < drill.steps.length) {
        html += `
          <button class="reveal-btn" data-action="verbalize-next">
            ${verbalizedStep === 0 ? 'Empecé a razonar — muestra el paso 1' : `Siguiente paso (${verbalizedStep + 1} de ${drill.steps.length})`}
          </button>
        `;
      } else if (!s.revealed) {
        // All steps shown, now enter final answer
        html += `
          <div class="math-input-row">
            <input type="text" class="math-input" data-role="math-input" inputmode="decimal"
                   placeholder="Respuesta final${drill.unit ? ' (' + escapeHtml(drill.unit) + ')' : ''}"
                   value="${escapeHtml(s.mathValue)}" ${inputDisabled}>
            <button class="math-submit" data-action="drill-math-submit" ${s.mathValue === '' || s.revealed ? 'disabled' : ''}>Verificar</button>
          </div>
        `;
      }
    }

    if (s.revealed && s.mathResult) {
      const isCorrect = s.mathResult.correct;
      html += `
        <div class="drill-verdict ${isCorrect ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${isCorrect ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${isCorrect ? 'Correcto' : 'Casi'}</div>
        </div>
      `;
      if (!isCorrect && s.mathResult.diagnosis) {
        html += `
          <div class="feedback-block show weak" style="display:block;margin-bottom:var(--sp-3)">
            <div class="feedback-title">Patrón de error</div>
            <div class="feedback-body">${escapeHtml(s.mathResult.diagnosis)}</div>
          </div>
        `;
      }
      // F2 — trap-retrieval: solo math generado (mc). Recuperación activa de la trampa,
      // correcto O incorrecto. Un tap → feedback de 1 línea. Cero efecto en señal persistente.
      if (mc && s.trapOpts && s.trapReal) {
        const answered = s.trapPick != null;
        html += `
          <div class="trap-card">
            <div class="trap-title">¿Cuál era la trampa de este problema?</div>
            <div class="trap-opts">
              ${s.trapOpts.map(p => {
                const nm = (MCMATH.PAT[p] && MCMATH.PAT[p].name) || p;
                let cls = 'trap-opt';
                if (answered) {
                  if (p === s.trapReal) cls += ' trap-hit';
                  else if (p === s.trapPick) cls += ' trap-miss';
                  else cls += ' trap-off';
                }
                return `<button class="${cls}" data-action="trap-pick" data-pat="${p}" ${answered ? 'disabled' : ''}>${escapeHtml(nm)}</button>`;
              }).join('')}
            </div>
            ${answered ? `
              <div class="trap-fb ${s.trapPick === s.trapReal ? 'trap-fb-ok' : 'trap-fb-bad'}">
                ${s.trapPick === s.trapReal
                  ? '✓ Exacto. ' + escapeHtml((MCMATH.PAT[s.trapReal] && MCMATH.PAT[s.trapReal].tip) || '')
                  : '× Era <strong>' + escapeHtml((MCMATH.PAT[s.trapReal] && MCMATH.PAT[s.trapReal].name) || s.trapReal) + '</strong>. ' + escapeHtml((MCMATH.PAT[s.trapReal] && MCMATH.PAT[s.trapReal].tip) || '')}
              </div>
            ` : ''}
          </div>
        `;
      }
      // In verbalize mode we've already shown all steps, so only show the answer summary
      if (!verbalize) {
        html += `
          <div class="math-working">
            <div class="math-working-label">Ledger paso a paso</div>
            ${drill.steps.map(step => `<div class="math-working-step">${escapeHtml(step)}</div>`).join('')}
            <div class="math-working-answer">Respuesta: ${ansDisplay}</div>
          </div>
        `;
      } else {
        html += `
          <div class="math-working">
            <div class="math-working-answer">Respuesta: ${ansDisplay}</div>
          </div>
        `;
      }
      if (!isCorrect) {
        html += `<button class="reveal-btn" data-action="drill-retry">Reintentar</button>`;
      }
    }
    return html;
  }

  // ---- M10 · PROTOCOLO P2R drill body ----
  function renderProtocolDrill(srcDrill) {
    const s = drillsState;
    const d = ensureProtocolRep();
    const slots = s.protSlots || [];
    const picks = s.protLabelPicks || {};
    const labelsReady = slots.length > 0 && slots.every(slot => picks[slot.id] !== undefined && picks[slot.id] !== '');
    const labelsOK = !!s.protLabelsOK;
    const submitted = !!(s.protResult && s.protResult.submitted);
    const ansDisplay = d ? MCMATH.fmtAns(d.answer, d.kind) : '';
    const sourceLabel = srcDrill && srcDrill.prompt ? srcDrill.prompt : 'Etiqueta antes de calcular.';

    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Protocolo P2R · ${d && d.eyebrow ? escapeHtml(d.eyebrow) : 'tasas/base'}</div>
        <div class="drill-prompt-text">${escapeHtml(d ? d.scenario : sourceLabel)}</div>
      </div>
      ${d && d.legend ? mcLegendHTML(d.legend) : ''}
      ${d && d.ask ? `<div class="mc-ask">${escapeHtml(d.ask)}</div>` : ''}
      ${d && d.unitNote ? `<div class="mc-unitnote"><span>Responde en:</span> ${escapeHtml(d.unitNote)}</div>` : ''}
      <div class="drill-task"><strong>Fase 1:</strong> etiqueta las bases y tasas confundibles. El cálculo se libera solo cuando el protocolo está correcto.</div>
      <div class="prot-slots">
        ${slots.map(slot => {
          const pick = picks[slot.id] !== undefined ? String(picks[slot.id]) : '';
          return `
            <div class="prot-slot">
              <div class="prot-slot-label">${escapeHtml(slot.label)}</div>
              <div class="prot-slot-why">${escapeHtml(slot.why)}</div>
              <select class="prot-select" data-role="prot-label" data-slot="${escapeHtml(slot.id)}" ${labelsOK || submitted ? 'disabled' : ''}>
                <option value="">Elige un dato de la leyenda</option>
                ${(d.legend || []).map((r, i) => `<option value="${i}" ${pick === String(i) ? 'selected' : ''}>${escapeHtml(r.l)} · ${escapeHtml(r.v)}</option>`).join('')}
              </select>
            </div>
          `;
        }).join('')}
      </div>
    `;

    if (!labelsOK && s.protLabelsChecked) {
      const wrong = slots.filter(slot => String(picks[slot.id]) !== String(slot.legendIndex)).length;
      html += `<div class="prot-feedback bad"><strong>${wrong || 'Alguna'} etiqueta fuera de caja.</strong> Revisa el alcance de cada tasa/base y vuelve a comprobar antes de calcular.</div>`;
    }
    if (labelsOK) {
      html += `<div class="prot-feedback ok"><strong>Gate abierto.</strong> Las etiquetas P2R están alineadas; ahora calcula sin cambiar de base.</div>`;
    }
    if (!labelsOK) {
      html += `<button class="reveal-btn" data-action="prot-label-check" ${labelsReady && !submitted ? '' : 'disabled'}>Comprobar etiquetas</button>`;
    } else if (!submitted) {
      html += `
        <div class="drill-task"><strong>Fase 2:</strong> resuelve el cálculo numérico con las etiquetas ya fijadas.</div>
        <div class="math-input-row">
          <input type="text" class="math-input" data-role="prot-input" inputmode="decimal"
                 placeholder="Tu respuesta" value="${escapeHtml(s.protValue || '')}">
          <button class="math-submit" data-action="prot-submit" ${(s.protValue || '').trim() ? '' : 'disabled'}>Verificar</button>
        </div>
      `;
    }
    if (submitted && s.protResult) {
      const pass = !!s.protResult.pass;
      const calcOK = !!s.protResult.calcOK;
      html += `
        <div class="drill-verdict ${pass ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${pass ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${pass ? 'Protocolo limpio' : (calcOK ? 'Cálculo OK, protocolo tardío' : 'Revisa el cálculo')}</div>
        </div>
        <div class="feedback-block show ${pass ? 'strong' : 'weak'}" style="display:block;margin-bottom:var(--sp-3)">
          <div class="feedback-title">Fase 3 · Feedback final</div>
          <div class="feedback-body">${pass ? 'Etiquetaste bien en el primer intento y calculaste correctamente.' : (calcOK ? 'El número está bien, pero las etiquetas no salieron correctas en el primer intento: para P2R eso cuenta como fallo de protocolo.' : 'Las etiquetas ya estaban correctas; el fallo quedó en la ejecución numérica.')}</div>
        </div>
        <div class="math-working">
          <div class="math-working-label">Ledger paso a paso</div>
          ${String(d.steps || '').split('\n').map(step => `<div class="math-working-step">${escapeHtml(step)}</div>`).join('')}
          <div class="math-working-answer">Respuesta: ${escapeHtml(ansDisplay)}</div>
        </div>
      `;
    }
    return html;
  }

  // ---- MECE drill body ----
  function renderMECEDrill(drill) {
    const s = drillsState;
    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Chequeo MECE</div>
        <div class="drill-prompt-text">${escapeHtml(drill.prompt)}</div>
      </div>
      <div class="mece-buckets">
        ${drill.buckets.map(b => `
          <div class="mece-bucket">
            <div class="mece-bucket-name">${escapeHtml(b.name)}</div>
            <ul class="mece-bucket-items">${b.items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>
          </div>
        `).join('')}
      </div>
      <div class="drill-task"><strong>Tu tarea:</strong> ¿Este desglose es MECE? Si no, ¿qué está mal?</div>
      <div class="drill-options">
        ${drill.options.map((opt, i) => {
          const sel = s.selectedOption === i ? `selected-${opt.correct ? 'strong' : 'weak'}` : '';
          return `<button class="option-btn ${sel}" data-action="drill-pick-option" data-index="${i}">${escapeHtml(opt.text)}</button>`;
        }).join('')}
      </div>
    `;
    if (s.selectedOption !== null && !s.revealed) {
      html += `<button class="reveal-btn" data-action="drill-reveal">Revisar respuesta</button>`;
    }
    if (s.revealed && s.selectedOption !== null) {
      const opt = drill.options[s.selectedOption];
      html += `
        <div class="drill-verdict ${opt.correct ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${opt.correct ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${opt.correct ? 'Correcto' : 'Casi'}</div>
        </div>
        <div class="feedback-block show ${opt.correct ? 'strong' : 'weak'}" style="display:block">
          <div class="feedback-title">${opt.correct ? 'Por qué está bien' : 'Por qué falla'}</div>
          <div class="feedback-body">${escapeHtml(opt.feedback)}</div>
        </div>
      `;
      if (!opt.correct) {
        const rightIdx = drill.options.findIndex(o => o.correct);
        const right = drill.options[rightIdx];
        html += `
          <div class="feedback-block show strong" style="display:block;margin-top:var(--sp-3)">
            <div class="feedback-title">La respuesta correcta era</div>
            <div class="feedback-body" style="font-style:italic;margin-bottom:12px">"${escapeHtml(right.text)}"</div>
            <div class="feedback-body">${escapeHtml(right.feedback)}</div>
          </div>
          <button class="reveal-btn" style="margin-top:var(--sp-3)" data-action="drill-retry">Reintenta este drill</button>
        `;
      }
    }
    return html;
  }

  // ---- SYNTHESIS drill body ----
  function renderSynthesisDrill(drill) {
    const s = drillsState;
    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Diagnóstico del caso</div>
        <div class="drill-prompt-text">${escapeHtml(drill.prompt)}</div>
      </div>
      <div class="drill-task"><strong>Tu tarea:</strong> Elige la síntesis más fuerte de 60–90s. Piensa Respuesta → Sustento → Riesgo → Siguiente paso.</div>
      <div class="drill-options">
        ${drill.options.map((opt, i) => {
          const sel = s.selectedOption === i ? `selected-${opt.strength}` : '';
          return `<button class="option-btn ${sel}" data-action="drill-pick-option" data-index="${i}" style="font-size:12.5px">${escapeHtml(opt.text)}</button>`;
        }).join('')}
      </div>
    `;
    if (s.selectedOption !== null && !s.revealed) {
      html += `<button class="reveal-btn" data-action="drill-reveal">Revisar respuesta</button>`;
    }
    if (s.revealed && s.selectedOption !== null) {
      const opt = drill.options[s.selectedOption];
      const isCorrect = opt.strength === 'strong';
      html += `
        <div class="drill-verdict ${isCorrect ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${isCorrect ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${isCorrect ? 'Correcto' : 'Síntesis débil'}</div>
        </div>
        <div class="feedback-block show ${opt.strength}" style="display:block">
          <div class="feedback-title">${isCorrect ? 'Por qué funciona' : 'Por qué se queda corta'}</div>
          <div class="feedback-body">${escapeHtml(opt.feedback)}</div>
          ${opt.failurePath ? `
            <div class="failure-path">
              <div class="failure-path-label">Camino de falla — cómo cae con el entrevistador</div>
              ${escapeHtml(opt.failurePath)}
            </div>
          ` : ''}
        </div>
      `;
      if (!isCorrect) {
        const strongIdx = drill.options.findIndex(o => o.strength === 'strong');
        const strong = drill.options[strongIdx];
        html += `
          <div class="feedback-block show strong" style="display:block;margin-top:var(--sp-3)">
            <div class="feedback-title">La síntesis fuerte era</div>
            <div class="feedback-body" style="font-style:italic;margin-bottom:12px">"${escapeHtml(strong.text)}"</div>
            <div class="feedback-body">${escapeHtml(strong.feedback)}</div>
          </div>
          <button class="reveal-btn" style="margin-top:var(--sp-3)" data-action="drill-retry">Reintenta este drill</button>
        `;
      }
    }
    return html;
  }

  // ---- BUILD A TREE drill body ----
  function renderBuilderDrill(drill) {
    const s = drillsState;
    if (!s.builderSlots) s.builderSlots = [null, null, null];
    const slots = s.builderSlots;
    const allFilled = slots.every(x => x !== null);

    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Prompt del caso</div>
        <div class="drill-prompt-text">"${escapeHtml(drill.prompt)}"</div>
      </div>
      <div class="drill-task"><strong>Tu tarea:</strong> Toca 3 buckets del pool para armar una estructura MECE. Toca un slot lleno para vaciarlo. El pool tiene tanto buckets reales como distractores — elige con cuidado.</div>
    `;

    // Slots
    html += `<div class="builder-slots">`;
    for (let i = 0; i < 3; i++) {
      const filledIdx = slots[i];
      if (filledIdx !== null && filledIdx !== undefined) {
        html += `
          <div class="builder-slot filled" data-action="builder-clear" data-slot="${i}">
            <div class="builder-slot-num">B${i+1}</div>
            <div class="builder-slot-content">${escapeHtml(drill.pool[filledIdx])}</div>
            <button class="builder-slot-clear" data-action="builder-clear" data-slot="${i}">×</button>
          </div>
        `;
      } else {
        html += `
          <div class="builder-slot">
            <div class="builder-slot-num">B${i+1}</div>
            <div class="builder-slot-content">Toca un bucket abajo…</div>
          </div>
        `;
      }
    }
    html += `</div>`;

    // Pool
    html += `
      <div class="builder-pool">
        <div class="builder-pool-label">Pool · elige 3</div>
        <div class="builder-pool-tiles">
          ${drill.pool.map((p, i) => {
            const placed = slots.includes(i);
            return `<button class="builder-tile ${placed ? 'placed' : ''}" data-action="builder-pick" data-pool-index="${i}">${escapeHtml(p)}</button>`;
          }).join('')}
        </div>
      </div>
    `;

    if (allFilled && !s.revealed) {
      html += `<button class="reveal-btn" data-action="drill-reveal">Revisar mi estructura</button>`;
    }

    if (s.revealed) {
      // Grade: are all the picked slots in correctSlots? Order matters only if drill.correctOrder === 'strict'.
      const correctSet = new Set(drill.correctSlots);
      const allCorrect = slots.every(idx => correctSet.has(idx));
      const orderCorrect = drill.correctOrder === 'strict'
        ? slots.every((idx, i) => idx === drill.correctSlots[i])
        : true;
      const fullyRight = allCorrect && orderCorrect;

      html += `
        <div class="drill-verdict ${fullyRight ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${fullyRight ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${fullyRight ? 'Estructura MECE' : (allCorrect ? 'Buckets correctos, orden incorrecto' : 'Revisa tu elección')}</div>
        </div>
        <div class="builder-judge">
          <div class="builder-judge-row">
            <div class="builder-judge-icon ${allCorrect ? 'pass' : 'fail'}">${allCorrect ? '✓' : '×'}</div>
            <div class="builder-judge-row-label">Buckets correctos elegidos</div>
            <div class="builder-judge-detail">${allCorrect ? 'Sí — los 3 son buckets reales de primer nivel' : 'No — al menos una de tus elecciones es un distractor o algo específico downstream'}</div>
          </div>
          ${drill.correctOrder === 'strict' ? `
            <div class="builder-judge-row">
              <div class="builder-judge-icon ${orderCorrect ? 'pass' : 'fail'}">${orderCorrect ? '✓' : '×'}</div>
              <div class="builder-judge-row-label">El orden importa</div>
              <div class="builder-judge-detail">${orderCorrect ? 'Sí — secuenciado correctamente' : 'No — este caso tiene un orden requerido. Relee por qué.'}</div>
            </div>
          ` : ''}
        </div>
        <div class="feedback-block show ${fullyRight ? 'strong' : 'weak'}" style="display:block;margin-bottom:var(--sp-3)">
          <div class="feedback-title">${fullyRight ? 'Por qué funciona' : 'Qué corregir'}</div>
          <div class="feedback-body">${escapeHtml(fullyRight ? drill.verdict.complete : drill.verdict.wrongPicks)}</div>
        </div>
        ${renderIssueTree({
          title: 'Issue tree modelo',
          rootText: drill.modelTree.rootText,
          branches: drill.modelTree.branches.map((b, i) => ({
            ...b,
            color: ['emerald','blue','amber','gold','pink','purple'][i % 6]
          })),
          treeId: 'builder-tree-' + drillsState.drillIdx
        })}
        ${!fullyRight ? `<button class="reveal-btn" data-action="drill-retry">Reintenta este drill</button>` : ''}
      `;
    }
    return html;
  }

  // ---- MARKET SIZING drill body ----
  function renderSizingDrill(drill) {
    const s = drillsState;
    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Prompt de sizing</div>
        <div class="drill-prompt-text">${escapeHtml(drill.prompt)}</div>
      </div>
      <div class="drill-task"><strong>Tu tarea:</strong> Estima desde primeros principios — Population × Penetration × Frequency × Price. Razona tu math en voz alta, después ingresa tu respuesta final. Dentro de 0.5x–2x del modelo es aceptable; lo que importa es la estructura.</div>
    `;

    if (!s.revealed) {
      html += `
        <div class="math-input-row">
          <input type="text" class="math-input" data-role="sizing-input" inputmode="decimal"
                 placeholder="Tu respuesta${drill.unit ? ' (' + escapeHtml(drill.unit.split(' ')[0]) + ')' : ''}"
                 value="${escapeHtml(s.sizingValue || '')}">
          <button class="math-submit" data-action="sizing-submit" ${!s.sizingValue ? 'disabled' : ''}>Verificar</button>
        </div>
      `;
    }

    if (s.revealed && s.mathResult) {
      const isCorrect = s.mathResult.correct;
      html += `
        <div class="drill-verdict ${isCorrect ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${isCorrect ? '✓' : '~'}</div>
          <div class="drill-verdict-label">${isCorrect ? 'En el orden correcto' : 'Te pasaste por más de 2x'}</div>
        </div>
        <div class="math-working">
          <div class="math-working-label">Modelo paso a paso</div>
          ${drill.steps.map((step, i) => `
            <div class="sizing-step-block">
              <div class="sizing-step-num">Paso ${i+1}</div>
              <div class="sizing-step-text">${escapeHtml(step)}</div>
            </div>
          `).join('')}
          <div class="math-working-answer">Respuesta del modelo: ~${drill.answer} ${escapeHtml(drill.unit || '')}</div>
        </div>
        ${!isCorrect ? `<button class="reveal-btn" data-action="drill-retry">Reintenta este drill</button>` : ''}
      `;
    }
    return html;
  }

  // ---- AMBIGUITY drill body (Brick C) — producción contra 90s; rubric espejo del structRubric del live ----
  function renderAmbiguityDrill(drill) {
    const s = drillsState;
    const ready = !!(String(s.ambObjetivo).trim() && String(s.ambExito).trim() && String(s.ambRamas).trim());
    const overTime = s.ambTimeUsed != null && s.ambTimeUsed > AMB_LIMIT_SEC;
    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Prompt vago — así abre Rebeca</div>

        ${s.revealed
          ? (s.ambTimeUsed != null
              ? escapeHtml((overTime ? 'Fuera de tiempo — usaste ' : 'A tiempo — usaste ') + fmtAmbClock(s.ambTimeUsed))

    if (!s.revealed) {

        <div class="amb-field">
          <div class="amb-field-label">Objetivo probable</div>
          <textarea class="live-textarea amb-ta" rows="2" data-role="amb-objetivo" placeholder="Qué quiere lograr el cliente de verdad — propón uno y di qué confirmarías">${escapeHtml(s.ambObjetivo)}</textarea>
        </div>
        <div class="amb-field">
          <div class="amb-field-label">Definición de éxito</div>

        </div>
        <div class="amb-field">
          <div class="amb-field-label">3 ramas — una por línea</div>

      `;

    }
    // ── Reveal: lo tuyo vs. el modelo, side-by-side ──
    html += `
      <div class="amb-compare">

          <div class="amb-col-title">Lo tuyo</div>
          <div class="amb-block"><div class="amb-block-label">Objetivo</div><div class="amb-block-text amb-pre">${escapeHtml(String(s.ambObjetivo).trim()) || '—'}</div></div>
          <div class="amb-block"><div class="amb-block-label">Éxito</div><div class="amb-block-text amb-pre">${escapeHtml(String(s.ambExito).trim()) || '—'}</div></div>
          <div class="amb-block"><div class="amb-block-label">Ramas</div><div class="amb-block-text amb-pre">${escapeHtml(String(s.ambRamas).trim()) || '—'}</div></div>
        </div>
        <div class="amb-col amb-col-model">
          <div class="amb-col-title">Modelo</div>
          <div class="amb-block"><div class="amb-block-label">Objetivo</div><div class="amb-block-text">${escapeHtml(drill.model.objetivo)}</div></div>
          <div class="amb-block"><div class="amb-block-label">Éxito</div><div class="amb-block-text">${escapeHtml(drill.model.exito)}</div></div>
          <div class="amb-block"><div class="amb-block-label">Ramas</div><div class="amb-block-text">${drill.model.ramas.map((r, i) => `<div class="amb-rama">${i + 1}) ${escapeHtml(r)}</div>`).join('')}</div></div>
        </div>
      </div>
      <div class="amb-trap"><div class="amb-trap-label">⚠ La trampa de este prompt</div>${escapeHtml(drill.trampa)}</div>
    `;
    // ── Self-grade 3 ejes 1–3, suma ≥7 = correct — espejo exacto del structRubric del live ──
    const axes = [
      { key: 'obj',   label: '¿Objetivo probable?',        hint: 'Apunta a lo que el cliente quiere de verdad — y dice qué confirmaría.' },
      { key: 'exito', label: '¿Éxito medible?',             hint: 'Métrica + restricción + horizonte, no un slogan.' },
      { key: 'ramas', label: '¿Ramas MECE y accionables?',  hint: 'Sin solapes ni outputs disfrazados de drivers; a medida del prompt, no de molde.' }
    ];
    html += `<div class="live-instruction" style="margin-bottom:0"><strong>Autoevalúa tu apertura</strong> contra el modelo (1–3):</div>`;
    html += axes.map(ax => `
      <div class="live-axis">
        <div class="live-axis-head"><div class="live-axis-label">${ax.label}</div><div class="live-axis-hint">${ax.hint}</div></div>
        <div class="live-axis-btns">${[1, 2, 3].map(v => `<button class="live-axis-btn ${s.ambRubric[ax.key] === v ? 'sel' : ''}" data-action="amb-grade" data-axis="${ax.key}" data-val="${v}" ${s.ambGraded ? 'disabled' : ''}>${v}</button>`).join('')}</div>
      </div>
    `).join('');
    if (s.ambGraded) {
      const total = s.ambRubric.obj + s.ambRubric.exito + s.ambRubric.ramas;
      const ok = total >= 7;
      html += `
        <div class="drill-verdict ${ok ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${ok ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${ok ? ('Apertura sólida · ' + total + '/9') : ('Apertura débil · ' + total + '/9')}</div>
        </div>
      `;
      if (!ok) html += `<button class="reveal-btn" style="margin-top:var(--sp-3)" data-action="drill-retry">Reintenta este drill contra el reloj</button>`;
    }
    return html;
  }

  // ---- EXPERIMENT drill body (M3) — producción de las 6 piezas contra 3:00; grade binario por pieza ----
  function renderExperimentDrill(drill) {
    const s = drillsState;
    const overTime = s.expTimeUsed != null && s.expTimeUsed > EXP_LIMIT_SEC;
    let html = `
      <div class="drill-prompt-card">
        <div class="drill-prompt-label">Situación de negocio — "¿cómo lo probarías antes de escalar?"</div>

      </div>

        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${s.revealed
          ? (s.expTimeUsed != null
              ? escapeHtml((overTime ? 'Fuera de tiempo — usaste ' : 'A tiempo — usaste ') + fmtAmbClock(s.expTimeUsed))

    if (!s.revealed) {

        <button class="reveal-btn" data-action="exp-reveal">Revelar la key</button>
        <div class="amb-hint">Habla las 6 piezas completas primero. Revelar sin producir es leer, no entrenar.</div>
      `;
      return html;
    }
    // ── Reveal: key curada pieza por pieza, con self-grade binario inline ──
    html += `<div class="live-instruction" style="margin-bottom:var(--sp-3)"><strong>Autoevalúa pieza por pieza</strong> — ¿la tuya cubrió lo esencial de la key? Sé duro: pass = 5 de 6.</div>`;
    html += EXPERIMENT_PIECES.map(p => {
      const k = drill.key[p.key];
      const v = s.expRubric[p.key];
      return `
        <div class="exp-piece">
          <div class="exp-piece-name">${escapeHtml(p.label)}</div>
          <div class="exp-piece-r">${escapeHtml(k.r)}</div>

          <div class="exp-grade-row">

            <button class="live-axis-btn ${v === 1 ? 'sel' : ''}" data-action="exp-grade" data-piece="${p.key}" data-val="1" ${s.expGraded ? 'disabled' : ''}>Sí</button>
            <button class="live-axis-btn ${v === 0 ? 'sel' : ''}" data-action="exp-grade" data-piece="${p.key}" data-val="0" ${s.expGraded ? 'disabled' : ''}>No</button>
          </div>
        </div>
      `;
    }).join('');
    if (s.expGraded) {
      const total = EXPERIMENT_PIECES.reduce((acc, p) => acc + (s.expRubric[p.key] === 1 ? 1 : 0), 0);
      const ok = total >= 5;
      html += `
        <div class="drill-verdict ${ok ? 'correct' : 'incorrect'}">
          <div class="drill-verdict-icon">${ok ? '✓' : '×'}</div>
          <div class="drill-verdict-label">${ok ? ('Diseño sólido · ' + total + '/6') : ('Diseño incompleto · ' + total + '/6')}</div>
        </div>
      `;
      if (!ok) html += `<button class="reveal-btn" style="margin-top:var(--sp-3)" data-action="drill-retry">Reintenta este drill contra el reloj</button>`;
    }
    return html;
  }

  function resetDrillDetailState() {
    drillsState.selectedOption = null;
    drillsState.revealed = false;
    drillsState.mathValue = '';
    drillsState.mathResult = null;
    drillsState.trapOpts = null;             // F2: trap-retrieval se limpia por drill (efímero por diseño)
    drillsState.trapReal = null;
    drillsState.trapPick = null;
    drillsState.mathStartMs = Date.now();   // reloj del drill de math: START en cada drill NUEVO; renderMathDrill NO llama esta fn, así el toggle del radar no reinicia el reloj
    drillsState.verbalizedStep = 0;  // reset step progress; verbalizeMode preference PERSISTS across drills
    drillsState.builderSlots = [null, null, null];   // for Build a Tree drill
    drillsState.sizingValue = '';                    // for Market Sizing drill
    drillsState.sizingShowSteps = false;
    // Brick C — Ambigüedad 90s: todo se limpia entre drills (efímero por diseño; no hay preferencias que persistir)
    drillsState.ambObjetivo = '';
    drillsState.ambExito = '';
    drillsState.ambRamas = '';
    drillsState.ambRubric = { obj: 0, exito: 0, ramas: 0 };
    drillsState.ambGraded = false;
    drillsState.ambStartMs = 0;      // el reloj de 90s parte cuando el detail se pinta (startAmbTimer), no acá
    drillsState.ambTimeUsed = null;
    // M3 — Diseña el experimento: todo se limpia entre drills (efímero por diseño; abandono pre-grade = cero señal)
    drillsState.expRubric = { unidad: null, control: null, duracion: null, metrica: null, guardrail: null, lectura: null };
    drillsState.expGraded = false;
    drillsState.expStartMs = 0;      // el reloj de 3:00 parte cuando el detail se pinta (startExpTimer), no acá
    drillsState.expTimeUsed = null;
    // M10 — Protocolo P2R: todo efímero; abandono pre-submit = cero señal persistente
    drillsState.protSourceIdx = null;
    drillsState.protSourceType = null;
    drillsState.protDrill = null;
    drillsState.protSlots = [];
    drillsState.protLabelPicks = {};
    drillsState.protLabelsChecked = false;
    drillsState.protLabelsOK = false;
    drillsState.protLabelsFirstTry = true;
    drillsState.protValue = '';
    drillsState.protResult = null;
    drillsState.protCommitted = false;
  }

  function handleDrillsClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    if (target.disabled) return;
    const action = target.dataset.action;

    if (action === 'drill-open-type') {
      drillsState.type = target.dataset.type;
      if (DRILL_TYPES[drillsState.type].generated) {
        // Infinite types skip the list: start a fresh in-memory session and drop into the runner.
        drillsState.mathDone = 0;
        drillsState.drillIdx = 0;
        ensureMathSession(true);
        resetDrillDetailState();
        drillsState.view = 'detail';
      } else {
        drillsState.view = 'list';
      }
      renderDrills();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    if (action === 'drill-back-to-hub') {
      drillsState.view = 'hub';
      drillsState.type = null;
      resetDrillDetailState();
      renderDrills();
      return;
    }
    if (action === 'drill-open') {
      drillsState.view = 'detail';
      drillsState.drillIdx = parseInt(target.dataset.index, 10);
      resetDrillDetailState();
      renderDrills();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    if (action === 'drill-back-to-list') {
      drillsState.view = 'list';
      resetDrillDetailState();
      renderDrills();
      return;
    }
    if (action === 'drill-prev') {
      if (drillsState.drillIdx > 0) {
        drillsState.drillIdx -= 1;
        resetDrillDetailState();
        renderDrills();
        const scrollHost = document.getElementById('scroll-host');
        if (scrollHost) scrollHost.scrollTop = 0;
      }
      return;
    }
    if (action === 'drill-next') {
      const type = DRILL_TYPES[drillsState.type];
      if (type.generated) {
        // Append a freshly generated drill when at the end → effectively infinite.
        if (drillsState.drillIdx >= type.drills.length - 1) type.drills.push(mcGenAdapted());
        drillsState.drillIdx += 1;
        resetDrillDetailState();
        renderDrills();
        const scrollHost = document.getElementById('scroll-host');
        if (scrollHost) scrollHost.scrollTop = 0;
      } else if (drillsState.drillIdx < type.drills.length - 1) {
        drillsState.drillIdx += 1;
        resetDrillDetailState();
        renderDrills();
        const scrollHost = document.getElementById('scroll-host');
        if (scrollHost) scrollHost.scrollTop = 0;
      }
      return;
    }
    if (action === 'drill-pick-option') {
      drillsState.selectedOption = parseInt(target.dataset.index, 10);
      drillsState.revealed = false;
      renderDrills();
      return;
    }
    if (action === 'drill-reveal') {
      if (drillsState.selectedOption === null) return;
      drillsState.revealed = true;
      const drill = DRILL_TYPES[drillsState.type].drills[drillsState.drillIdx];
      const opt = drill.options[drillsState.selectedOption];
      const isCorrect = drillsState.type === 'mece' ? !!opt.correct : opt.strength === 'strong';
      markDrillDone(drillsState.type, drillsState.drillIdx, isCorrect);
      // Track step-level pattern for Dashboard insights
      recordStepStat(drillsState.type, isCorrect);
      renderDrills();
      return;
    }
    if (action === 'drill-retry') {
      resetDrillDetailState();
      renderDrills();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    if (action === 'toggle-verbalize') {
      drillsState.verbalizeMode = !drillsState.verbalizeMode;
      drillsState.verbalizedStep = 0;  // reset step progress when mode flips
      renderDrills();
      return;
    }
    if (action === 'toggle-radar') {
      drillsState.radarOpen = !drillsState.radarOpen;
      renderDrills();
      return;
    }
    if (action === 'toggle-math-focus') {
      // Brick B: alterna el foco de generación. Solo afecta la PRÓXIMA generación —
      // no re-genera el drill en curso (drills[] y drillIdx intactos; renderMathDrill no resetea el reloj).
      drillsState.mathFocus = drillsState.mathFocus ? null : MCMATH.weakestPat(state.mathPats);
      renderDrills();
      return;
    }
    if (action === 'verbalize-next') {
      const drill = DRILL_TYPES.math.drills[drillsState.drillIdx];
      drillsState.verbalizedStep = Math.min((drillsState.verbalizedStep || 0) + 1, drill.steps.length);
      renderDrills();
      return;
    }
    if (action === 'trap-pick') {
      // F2 — trap-retrieval: un solo intento; si ya respondió, no-op. No muta señal persistente.
      if (drillsState.trapPick != null || !drillsState.trapOpts) return;
      const p = target.dataset.pat;
      if (!p || drillsState.trapOpts.indexOf(p) === -1) return;
      drillsState.trapPick = p;
      renderDrills();
      return;
    }
    if (action === 'prot-label-check') {
      if (drillsState.type !== 'protocolo' || drillsState.protCommitted) return;
      ensureProtocolRep();
      const slots = drillsState.protSlots || [];
      const picks = drillsState.protLabelPicks || {};
      const ready = slots.length > 0 && slots.every(slot => picks[slot.id] !== undefined && picks[slot.id] !== '');
      if (!ready) return;
      const ok = slots.every(slot => String(picks[slot.id]) === String(slot.legendIndex));
      drillsState.protLabelsChecked = true;
      drillsState.protLabelsOK = ok;
      if (!ok) drillsState.protLabelsFirstTry = false;
      renderDrills();
      return;
    }
    if (action === 'prot-submit') {
      if (drillsState.type !== 'protocolo' || drillsState.protCommitted || !drillsState.protLabelsOK) return;
      const d = ensureProtocolRep();
      const parsed = MCMATH.parseAns(drillsState.protValue);
      const calcOK = MCMATH.tolOK(parsed, d.answer, d.kind);
      const pass = !!drillsState.protLabelsFirstTry && !!calcOK;
      drillsState.protCommitted = true;
      drillsState.protResult = { submitted: true, calcOK: calcOK, pass: pass };
      if (!state.drillHistory) state.drillHistory = {};
      state.drillHistory.protocolo = (state.drillHistory.protocolo || 0) + 1;
      if (pass) {
        if (!state.drillCompletions) state.drillCompletions = {};
        if (!state.drillCompletions.protocolo) state.drillCompletions.protocolo = {};
        state.drillCompletions.protocolo[drillsState.drillIdx] = true;
      }
      registerSession();
      recordStepStat('protocolo', pass);
      renderDrills();
      return;
    }
    if (action === 'drill-math-submit') {
      const drill = DRILL_TYPES.math.drills[drillsState.drillIdx];
      let parsed, isCorrect, diagnosis = null, matchedPat = null;
      if (drill.__mc) {
        // Generated drills grade EXACTLY like the donor engine: parseAns + tolOK (no drift vs. the
        // derived absolute tolerance). The matched distractor's `pat` is captured for the radar (step 4).
        parsed = MCMATH.parseAns(drillsState.mathValue);
        isCorrect = MCMATH.tolOK(parsed, drill.answer, drill.__mc.kind);
        if (!isCorrect && isFinite(parsed) && Array.isArray(drill.commonMistakes)) {
          for (const m of drill.commonMistakes) {
            if (MCMATH.tolOK(parsed, m.value, drill.__mc.kind)) { diagnosis = m.diagnosis; matchedPat = m.pat || null; break; }
          }
          if (!diagnosis) {
            const mf = MCMATH.magFlag(parsed, drill.answer);
            if (mf) { matchedPat = 'P1'; diagnosis = 'Te desviaste por un factor de 10^' + Math.abs(mf) + ': la lógica puede estar bien, la magnitud no. ' + MCMATH.PAT.P1.tip; }
          }
        }
        drillsState.mathResult = { correct: isCorrect, diagnosis: diagnosis, pat: matchedPat, pats: drill.__mc.pats };
        // F2 — trap-retrieval: opciones se arman UNA vez acá (no en el render: un re-render las re-barajaría).
        // Metacognición session-only: NO escribe mathPats / stepStats / drillHistory ni nada en localStorage.
        const __tReal = (Array.isArray(drill.__mc.pats) && drill.__mc.pats[0] && MCMATH.PAT[drill.__mc.pats[0]]) ? drill.__mc.pats[0] : null;
        if (__tReal) {
          const __tPool = ['P1','P2D','P2R','P3','P4'].filter(p => (drill.__mc.pats || []).indexOf(p) === -1);
          drillsState.trapOpts = MCMATH.shuffle([__tReal].concat(MCMATH.shuffle(__tPool).slice(0, 2)));
          drillsState.trapReal = __tReal;
        } else {
          drillsState.trapOpts = null; drillsState.trapReal = null;
        }
        drillsState.trapPick = null;
        if (isCorrect) drillsState.mathDone = (drillsState.mathDone || 0) + 1;
        // Radar bump — faithful port of donor numericQA: on correct, credit every pattern the drill trains;
        // on wrong, penalize only the pattern you fell into (diagP), else all of the drill's patterns.
        // Tiempo hasta comprometer la respuesta (correcto e incorrecto), alineado 1:1 con cada bump de mathPats.tot.
        const __sec = drillsState.mathStartMs ? (Date.now() - drillsState.mathStartMs) / 1000 : null;
        const pats = drill.__mc.pats || [];
        if (isCorrect) pats.forEach(p => { bumpMathPat(p, true); recordMathTime(p, __sec); });
        else (matchedPat ? [matchedPat] : pats).forEach(p => { bumpMathPat(p, false); recordMathTime(p, __sec); });
      } else {
        // Fixed-drill path — byte-identical to before.
        parsed = parseFloat(String(drillsState.mathValue).replace(/[,\s]/g, ''));
        isCorrect = !isNaN(parsed) && Math.abs(parsed - drill.answer) <= (drill.tolerance || 0.01);
        if (!isCorrect && !isNaN(parsed) && Array.isArray(drill.commonMistakes)) {
          for (const m of drill.commonMistakes) {
            if (Math.abs(parsed - m.value) <= (m.tolerance || 0.01)) {
              diagnosis = m.diagnosis;
              break;
            }
          }
        }
        drillsState.mathResult = { correct: isCorrect, diagnosis };
      }
      drillsState.revealed = true;
      markDrillDone('math', drillsState.drillIdx, isCorrect);
      recordStepStat('math', isCorrect);
      renderDrills();
      return;
    }
    // ---- BUILDER drill ----
    if (action === 'builder-pick') {
      const idx = parseInt(target.dataset.poolIndex, 10);
      if (!drillsState.builderSlots) drillsState.builderSlots = [null, null, null];
      if (drillsState.builderSlots.includes(idx)) return;  // already placed
      // Place into first empty slot
      const slotIdx = drillsState.builderSlots.findIndex(x => x === null || x === undefined);
      if (slotIdx >= 0) {
        drillsState.builderSlots[slotIdx] = idx;
        renderDrills();
      }
      return;
    }
    if (action === 'builder-clear') {
      const slot = parseInt(target.dataset.slot, 10);
      if (!drillsState.builderSlots) return;
      drillsState.builderSlots[slot] = null;
      drillsState.revealed = false;  // un-grade if user changes mind
      renderDrills();
      return;
    }
    if (action === 'drill-reveal' && drillsState.type === 'builder') {
      // Grade the builder structure
      const drill = DRILL_TYPES.builder.drills[drillsState.drillIdx];
      const slots = drillsState.builderSlots || [];
      if (slots.some(x => x === null || x === undefined)) return;  // not yet ready
      const correctSet = new Set(drill.correctSlots);
      const allCorrect = slots.every(idx => correctSet.has(idx));
      const orderCorrect = drill.correctOrder === 'strict'
        ? slots.every((idx, i) => idx === drill.correctSlots[i])
        : true;
      const fullyRight = allCorrect && orderCorrect;
      drillsState.revealed = true;
      markDrillDone('builder', drillsState.drillIdx, fullyRight);
      recordStepStat('mece', fullyRight);  // Builder is fundamentally a MECE skill — count it as such
      renderDrills();
      return;
    }
    // ---- SIZING drill ----
    if (action === 'sizing-submit') {
      const drill = DRILL_TYPES.sizing.drills[drillsState.drillIdx];
      const parsed = parseFloat(String(drillsState.sizingValue || '').replace(/[,\s]/g, ''));
      // Sizing tolerance is wide — within 0.5x to 2x is acceptable
      const isCorrect = !isNaN(parsed) && parsed > 0 && (parsed >= drill.answer * 0.5) && (parsed <= drill.answer * 2);
      drillsState.mathResult = { correct: isCorrect };
      drillsState.revealed = true;
      markDrillDone('sizing', drillsState.drillIdx, isCorrect);
      recordStepStat('math', isCorrect);  // Sizing counts toward math fluency
      renderDrills();
      return;
    }
    // ---- AMBIGUITY drill (Brick C) ----
    if (action === 'amb-reveal') {
      if (drillsState.type !== 'ambiguedad' || drillsState.revealed) return;
      // Captura el tiempo usado ANTES de marcar revealed (el reloj real vive en ambStartMs)
      drillsState.ambTimeUsed = drillsState.ambStartMs
        ? Math.round((Date.now() - drillsState.ambStartMs) / 1000)
        : null;
      drillsState.revealed = true;
      stopAmbTimer();          // salida del countdown; el hook post-render lo mantiene muerto (revealed=true)
      renderDrills();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    if (action === 'amb-grade') {
      if (drillsState.type !== 'ambiguedad' || drillsState.ambGraded) return;   // el stepStat se registra UNA sola vez
      const axis = target.dataset.axis;
      const val = parseInt(target.dataset.val, 10);
      if (axis && drillsState.ambRubric.hasOwnProperty(axis) && val >= 1 && val <= 3) {
        drillsState.ambRubric[axis] = val;
        // Mismo patrón que el structRubric del live: el compromiso llega con el 3er eje calificado
        if (drillsState.ambRubric.obj && drillsState.ambRubric.exito && drillsState.ambRubric.ramas) {
          drillsState.ambGraded = true;
          const total = drillsState.ambRubric.obj + drillsState.ambRubric.exito + drillsState.ambRubric.ramas;
          const isCorrect = total >= 7;    // mismo umbral que el live: suma ≥7 sobre 9
          markDrillDone('ambiguedad', drillsState.drillIdx, isCorrect);
          recordStepStat('ambiguedad', isCorrect);
        }
        renderDrills();
      }
      return;
    }
    // ---- EXPERIMENT drill (M3) ----
    if (action === 'exp-reveal') {
      if (drillsState.type !== 'experimento' || drillsState.revealed) return;
      // Captura el tiempo usado ANTES de marcar revealed (el reloj real vive en expStartMs)
      drillsState.expTimeUsed = drillsState.expStartMs
        ? Math.round((Date.now() - drillsState.expStartMs) / 1000)
        : null;
      drillsState.revealed = true;
      stopExpTimer();          // salida del countdown; el hook post-render lo mantiene muerto (revealed=true)
      renderDrills();
      const scrollHost = document.getElementById('scroll-host');
      if (scrollHost) scrollHost.scrollTop = 0;
      return;
    }
    if (action === 'exp-grade') {
      if (drillsState.type !== 'experimento' || drillsState.expGraded) return;   // el stepStat se registra UNA sola vez
      const piece = target.dataset.piece;
      const val = parseInt(target.dataset.val, 10);
      if (piece && drillsState.expRubric.hasOwnProperty(piece) && (val === 0 || val === 1)) {
        drillsState.expRubric[piece] = val;
        // Mismo patrón que amb-grade: el compromiso llega cuando las 6 piezas tienen valor
        const allGraded = EXPERIMENT_PIECES.every(p => drillsState.expRubric[p.key] === 0 || drillsState.expRubric[p.key] === 1);
        if (allGraded) {
          drillsState.expGraded = true;
          const total = EXPERIMENT_PIECES.reduce((acc, p) => acc + (drillsState.expRubric[p.key] === 1 ? 1 : 0), 0);
          const isCorrect = total >= 5;    // producción exige casi-perfección: pass = ≥5/6
          markDrillDone('experimento', drillsState.drillIdx, isCorrect);
          recordStepStat('experimento', isCorrect);
        }
        renderDrills();
      }
      return;
    }
  }

  function handleDrillsInput(e) {
    const target = e.target;
    if (target && target.dataset && target.dataset.role === 'math-input') {
      drillsState.mathValue = target.value;
      // Re-enable submit button based on input without full re-render (would lose focus)
      const submit = document.querySelector('[data-action="drill-math-submit"]');
      if (submit) submit.disabled = (target.value.trim() === '' || drillsState.revealed);
    }
    if (target && target.dataset && target.dataset.role === 'sizing-input') {
      drillsState.sizingValue = target.value;
      const submit = document.querySelector('[data-action="sizing-submit"]');
      if (submit) submit.disabled = (target.value.trim() === '' || drillsState.revealed);
    }
    if (target && target.dataset && target.dataset.role === 'prot-label') {
      if (!drillsState.protLabelPicks) drillsState.protLabelPicks = {};
      drillsState.protLabelPicks[target.dataset.slot] = target.value;
      drillsState.protLabelsChecked = false;
      drillsState.protLabelsOK = false;
      const slots = drillsState.protSlots || [];
      const picks = drillsState.protLabelPicks || {};
      const ready = slots.length > 0 && slots.every(slot => picks[slot.id] !== undefined && picks[slot.id] !== '');
      const check = document.querySelector('[data-action="prot-label-check"]');
      if (check) check.disabled = !ready || drillsState.protCommitted;
    }
    if (target && target.dataset && target.dataset.role === 'prot-input') {
      drillsState.protValue = target.value;
      const submit = document.querySelector('[data-action="prot-submit"]');
      if (submit) submit.disabled = (target.value.trim() === '' || !drillsState.protLabelsOK || drillsState.protCommitted);
    }
    // Brick C — Ambigüedad 90s: persistir lo tecleado en drillsState SIN re-render
    // (repintar acá se comería el foco del textarea — misma razón que math-input).
    const ambRole = target && target.dataset && target.dataset.role;
    if (ambRole === 'amb-objetivo' || ambRole === 'amb-exito' || ambRole === 'amb-ramas') {
      if (ambRole === 'amb-objetivo') drillsState.ambObjetivo = target.value;
      if (ambRole === 'amb-exito')    drillsState.ambExito    = target.value;
      if (ambRole === 'amb-ramas')    drillsState.ambRamas    = target.value;
      const ambReady = !!(String(drillsState.ambObjetivo).trim() && String(drillsState.ambExito).trim() && String(drillsState.ambRamas).trim());
      const reveal = document.querySelector('[data-action="amb-reveal"]');
      if (reveal) reveal.disabled = !ambReady || drillsState.revealed;
      const hint = document.getElementById('amb-reveal-hint');
      if (hint) hint.style.display = ambReady ? 'none' : '';
    }
  }

  function handleDrillsKeydown(e) {
    if (e.target && e.target.dataset && e.target.dataset.role === 'math-input' && e.key === 'Enter') {
      e.preventDefault();
      const submit = document.querySelector('[data-action="drill-math-submit"]');
      if (submit && !submit.disabled) submit.click();
    }
    if (e.target && e.target.dataset && e.target.dataset.role === 'sizing-input' && e.key === 'Enter') {
      e.preventDefault();
      const submit = document.querySelector('[data-action="sizing-submit"]');
      if (submit && !submit.disabled) submit.click();
    }
    if (e.target && e.target.dataset && e.target.dataset.role === 'prot-input' && e.key === 'Enter') {
      e.preventDefault();
      const submit = document.querySelector('[data-action="prot-submit"]');
      if (submit && !submit.disabled) submit.click();
    }
  }

  // a 0 marca "Fuera de tiempo" (en la sala seguirías hablando). Tick por id
  // sin re-render; fmtAmbClock y la clase amb-over se reusan read-only (precedente M3). ──
  let fitgymTimerInterval = null;
  function startFitgymTimer() {
    if (!fitgymState.startMs) fitgymState.startMs = Date.now();
    if (fitgymTimerInterval) return;   // idempotente: un re-render no reinicia el reloj
    fitgymTimerInterval = setInterval(tickFitgymTimer, 250);
    tickFitgymTimer();
  }
  function stopFitgymTimer() {
    if (fitgymTimerInterval) {
      clearInterval(fitgymTimerInterval);
      fitgymTimerInterval = null;
    }
  }
  function tickFitgymTimer() {
    const el = document.getElementById('fitgym-timer');
    if (!el) { stopFitgymTimer(); return; }   // el nodo se fue (otra vista/tab) → higiene (3ª salida)
    const remain = FITGYM_LIMIT_SEC - (Date.now() - fitgymState.startMs) / 1000;
    if (remain <= 0) {
      el.textContent = 'Fuera de tiempo';
      el.classList.add('amb-over');
      fitgymState.overTime = true;
      stopFitgymTimer();                      // estado terminal del countdown; el reloj real sigue en startMs
    } else {
      el.textContent = fmtAmbClock(remain);
    }
  }

  // ── M9: grabación efímera — CLON del ciclo de media del Brick 4 con globals
  // propias (el recorder de síntesis no se toca; su acoplamiento a synthState /
  // CASES / synthLog lo hace no-reusable). Mismo degrade: sin API o sin permiso
  // → se habla sin grabar. Audio: grabado → reproducido → descartado. ──
  let fitgymRecorder = null;
  let fitgymStream = null;
  let fitgymChunks = [];
  let fitgymAudioUrl = null;
  function fitgymCanRecord() {
    return !!(navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function'
              && typeof window.MediaRecorder === 'function');
  }
  function teardownFitgymMedia() {
    if (fitgymRecorder) {
      try { if (fitgymRecorder.state !== 'inactive') fitgymRecorder.stop(); } catch (e) {}
      fitgymRecorder = null;
    }
    if (fitgymStream) {
      try { fitgymStream.getTracks().forEach(t => t.stop()); } catch (e) {}
      fitgymStream = null;
    }
    if (fitgymAudioUrl) {
      try { URL.revokeObjectURL(fitgymAudioUrl); } catch (e) {}
      fitgymAudioUrl = null;
    }
    fitgymChunks = [];
  }
  function startFitgymRecording() {
    if (!fitgymCanRecord()) {
      fitgymState.recStatus = 'nomic';
      updateFitgymRecBadge();
      return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true }).then((stream) => {
      // El usuario pudo salir de la rep mientras el permiso estaba pendiente → soltar y no grabar.
      if (fitgymState.view !== 'rep') { try { stream.getTracks().forEach(t => t.stop()); } catch (e) {} return; }
      fitgymStream = stream;
      try {
        fitgymChunks = [];
        fitgymRecorder = new MediaRecorder(fitgymStream);
        fitgymRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) fitgymChunks.push(ev.data); };
        fitgymRecorder.onstop = () => {
          try {
            const type = (fitgymChunks[0] && fitgymChunks[0].type) || 'audio/webm';
            const blob = new Blob(fitgymChunks, { type });
            if (fitgymAudioUrl) { try { URL.revokeObjectURL(fitgymAudioUrl); } catch (e) {} }
            fitgymAudioUrl = (blob.size > 0) ? URL.createObjectURL(blob) : null;
            fitgymState.hasAudio = !!fitgymAudioUrl;
          } catch (e) {
            fitgymAudioUrl = null;
            fitgymState.hasAudio = false;
          }
          if (fitgymStream) { try { fitgymStream.getTracks().forEach(t => t.stop()); } catch (e) {} fitgymStream = null; }
          // El onstop llega DESPUÉS del click en "revelar": si ya estamos en reveal, re-pintar para mostrar el playback.
          if (fitgymState.view === 'reveal' && fitState.view === 'gym') renderFit();
        };
        fitgymRecorder.start();
        fitgymState.recStatus = 'rec';
        updateFitgymRecBadge();
      } catch (e) {
        if (fitgymStream) { try { fitgymStream.getTracks().forEach(t => t.stop()); } catch (er) {} fitgymStream = null; }
        fitgymState.recStatus = 'nomic';
        updateFitgymRecBadge();
      }
    }).catch(() => {
      fitgymState.recStatus = 'nomic';
      updateFitgymRecBadge();
    });
  }
  function stopFitgymRecording() {
    if (fitgymRecorder) {
      try { if (fitgymRecorder.state !== 'inactive') fitgymRecorder.stop(); }  // onstop → blob → re-pinta reveal
      catch (e) { fitgymState.hasAudio = false; }
    }
  }
  // Badge de grabación por id — sin re-render (el timer corre en el mismo view).
  function updateFitgymRecBadge() {
    const el = document.getElementById('fitgym-rec-badge');
    if (!el) return;
    if (fitgymState.recStatus === 'rec') { el.textContent = '● Grabando'; el.className = 'fitgym-rec-badge rec'; }
    else if (fitgymState.recStatus === 'nomic') { el.textContent = 'Sin micrófono — habla igual, contra el reloj'; el.className = 'fitgym-rec-badge nomic'; }
    else { el.textContent = ''; el.className = 'fitgym-rec-badge'; }
  }
  // Abandono / reset: mata timer + media, estado fresco. CERO señal — la señal
  // solo existe dentro del commit de fitgym-grade (patrón M3).
  function resetFitgym() {
    stopFitgymTimer();
    teardownFitgymMedia();
    fitgymState = freshFitgym();
  }

      root.innerHTML = renderFitDetail(fitState.questionIdx);
    } else {
      root.innerHTML = renderFitList();
    }
    if (!fitMounted) {
      root.addEventListener('click', handleFitClick);
      fitMounted = true;
    }
  }

    const nChecks = (c.s?1:0) + (c.t?1:0) + (c.a?1:0) + (c.r?1:0) + (c.trapOk?1:0);
    const audioBlock = fitgymState.hasAudio && fitgymAudioUrl
      ? `<div class="fitgym-audio"><audio controls src="${fitgymAudioUrl}"></audio><div class="fitgym-audio-note">Escúchate antes de gradear — muletillas y rodeos se oyen, no se recuerdan. El audio se descarta al salir.</div></div>`
      : '';
    const angles = mc
      ? `
        <div class="fit-section"><div class="fit-section-label fitgym-angle-matias">Qué busca Matias</div><div class="fit-section-body">${renderFitMarkdown(q.angleMatias)}</div></div>
        <div class="fit-section"><div class="fit-section-label fitgym-angle-rebeca">Qué busca Rebeca</div><div class="fit-section-body">${renderFitMarkdown(q.angleRebeca)}</div></div>
        <div class="fit-section"><div class="fit-section-label">La trampa</div><div class="fit-section-body">${renderFitMarkdown(q.trap)}</div></div>
        <div class="fit-section"><div class="fit-section-label">Puntos que debieron sonar</div><div class="fit-section-body"><ul class="fitgym-key">${q.key.map(k => `<li>${escapeHtml(k)}</li>`).join('')}</ul></div></div>`
      : `
        <div class="fit-section"><div class="fit-section-label">Estructura</div><div class="fit-section-body">${renderFitMarkdown(q.framework)}</div></div>
        <div class="fit-section"><div class="fit-section-label">La trampa</div><div class="fit-section-body">${renderFitMarkdown(q.trap)}</div></div>

    const checkRow = (k, label) => `
      <div class="fitgym-check ${c[k] ? 'on' : ''}" data-action="fitgym-check" data-k="${k}">

    const gradeBlock = fitgymState.graded
      ? `<div class="fitgym-verdict ${fitgymState.pass ? 'pass' : 'fail'}">
           <div class="fitgym-verdict-head">${fitgymState.pass ? 'PASS' : 'FAIL'} — ${nChecks}/5${fitgymState.overTime ? ' · fuera de tiempo' : ''}</div>
           <div class="fitgym-verdict-sub">${fitgymState.pass ? 'Señal registrada. Repite la misma pregunta en dos días — la segunda pasada es la que fija.' : 'Señal registrada. La brecha más común: la Action sin el counterfactual. Repite esta misma pregunta antes de cambiar de banco.'}</div>
         </div>
         <button class="fitgym-btn primary" data-action="fitgym-open">Otra pregunta</button>
         <button class="fitgym-btn ghost" data-action="fitgym-exit">Salir a la biblioteca</button>`
      : `<div class="fitgym-grade">
           <div class="fitgym-grade-title">Self-grade — sé brutal, la señal alimenta tu skill graph</div>
           ${checkRow('s', 'Situation en ≤2 frases, con stakes')}
           ${checkRow('t', 'Task: tu responsabilidad específica quedó clara')}
           ${checkRow('a', 'Action: el 60% del tiempo, en primera persona, con mecanismo')}
           ${checkRow('r', 'Result: número o counterfactual explícito')}
           ${checkRow('trapOk', 'Evité la trampa de esta pregunta')}
           <button class="fitgym-btn primary" data-action="fitgym-grade">Gradear (pass = 4 de 5)</button>
           <div class="fitgym-grade-hint">${fitgymState.overTime ? 'Fuiste sobre los 2:00 — en la sala eso comprime tu caso. ' : ''}Salir sin gradear no registra nada.</div>
