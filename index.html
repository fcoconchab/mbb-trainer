  // ============================================================
  // BRICK I · skillGraph — computeSkills / weakestSkills / composeSdhPlan
  // (M16 + M21 de la auditoría). Señal DERIVADA: se computa SIEMPRE desde
  // la señal primaria (stepStats + mathPats + mathTimes) y JAMÁS se
  // persiste — no puede quedar stale ni mentir. Todo el módulo es lectura
  // pura: cero mutación de state, cero Math.random, cero consumo del RNG
  // global de MCMATH (instancia LOCAL mulberry32 sembrada por fecha →
  // plan idéntico intra-día, distinto entre días).
  // ============================================================
  const SKILL_MIN_N = 3;  // n<3 = 'sin datos' → modo explorar; NUNCA se presenta como debilidad medida
  const SKILL_MATH_PATS = ['P1', 'P2D', 'P2R', 'P3', 'P4'];
  const SKILL_LABELS = {
    diagnose: 'Diagnóstico', hypothesis: 'Hipótesis', math: 'Case math',
    mece: 'MECE', synthesis: 'Síntesis', clarifying: 'Clarificación',
    ambiguedad: 'Ambigüedad', giro: 'Reacción al giro',
    experimento: 'Diseño de experimento',  // M3
    fit: 'FIT / Behavioral',               // M9 — entra al skill graph; FUERA de SDH_SKILL_DRILL a propósito (el gym es una pestaña, no un drill del hub → SdH no lo propone, patrón diagnose/clarifying)
    protocolo: 'Protocolo P2R',            // M10 — drill standalone proponible por Sesión de Hoy
    P1: 'magnitud/ceros', P2D: 'división por fracción',
    P2R: 'tasas/base', P3: 'multi-paso', P4: 'división final/escala'
  };

  // skill → { rate, n, slow? }. Un skill por key REAL de stepStats
  // (diagnose/hypothesis/math/mece/synthesis/clarifying/ambiguedad, shape
  // [{correct,ts}] rolling-20) + un skill por patrón P1–P4 (rate desde
  // mathPats {ok,tot}, slow = mediana de mathTimes sobre MATH_TARGET,
  // reusando mathMedian con su gate n≥3 del Brick F).
  function computeSkills(st) {
    const out = {};
    const stats = (st && st.stepStats) || {};
    for (const k of Object.keys(DEFAULT_STATE.stepStats)) {
      const arr = Array.isArray(stats[k]) ? stats[k] : [];
      const n = arr.length;
      out[k] = (n < SKILL_MIN_N)
        ? { rate: null, n: n }
        : { rate: arr.filter(a => a && a.correct).length / n, n: n };
    }
    const mp = (st && st.mathPats) || {};
    const mt = (st && st.mathTimes) || {};
    for (const p of SKILL_MATH_PATS) {
      const e = mp[p] || { ok: 0, tot: 0 };
      const n = (typeof e.tot === 'number') ? e.tot : 0;
      const med = mathMedian(mt[p]);   // gate n≥3 vive adentro de mathMedian (F1)
      const slow = (med != null) && med > (MATH_TARGET[p] || 30);
      out[p] = (n < SKILL_MIN_N)
        ? { rate: null, n: n, slow: slow }
        : { rate: (e.ok || 0) / n, n: n, slow: slow };
    }
    return out;
  }

  // Orden: rate asc — 'sin datos' (rate null) va PRIMERO como 'explorar'
  // (prioridad alta pero etiquetada, nunca vendida como debilidad medida) —,
  // luego slow (lento antes que rápido), luego n asc; empates por key
  // alfabética. Determinista: JAMÁS RNG acá.
  function weakestSkills(st, k) {
    const skills = computeSkills(st);
    const keys = Object.keys(skills).sort();  // base alfabética = desempate estable
    keys.sort(function (a, b) {
      const A = skills[a], B = skills[b];
      const ra = (A.rate == null) ? -1 : A.rate;
      const rb = (B.rate == null) ? -1 : B.rate;
      if (ra !== rb) return ra - rb;
      const sa = A.slow ? 0 : 1, sb = B.slow ? 0 : 1;
      if (sa !== sb) return sa - sb;
      if (A.n !== B.n) return A.n - B.n;
      return a < b ? -1 : a > b ? 1 : 0;
    });
    return keys.slice(0, k || keys.length).map(function (key) {
      return Object.assign({ key: key }, skills[key]);
    });
  }

  // Pesos del score del slot de caso — constantes nombradas, fáciles de tunear.
  const SDH_W_MC  = 3;   // densidad de contenido Mastercard (vector (a) de la auditoría)
  const SDH_W_DEB = 2;   // match del pat de math del caso con la debilidad P* vigente
  const SDH_W_REC = 3;   // recencia: lo recién vivido baja, lo viejo / nunca vivido sube.
                         // 3 (no 2): con 2, un caso denso + match de pat vivido HOY quedaba
                         // 8+ε y le ganaba el empate a los densos no vividos (8.0) — SdH
                         // reproponía el mismo día lo recién hecho. Con 3 el fresco (8+ε)
                         // queda bajo los densos no vividos (9).
  const SDH_RECENCY_DAYS = 14;  // un caso vivido hace ≥14 días vuelve a recencia máxima
  // densidadMC — escala 1–2: 2 = overlay T&L enriquecido con fuentes
  // Mastercard reales (Ítem 6); 1 (default) = overlay estándar. Const, NO state.
  const CASE_MC_DENSITY = {
    'wallet-entry': 2, 'marketplace': 2, 'streaming': 2,
    'pe-grocery': 2, 'mobile-gaming': 2, 'saas-pricing-usage': 2,
    'smart-branch': 2, 'card-activation': 2, 'acquirer-mdr': 2, 'credit-launch': 2
  };
  // Pat de math FIJO por caso (contrato Brick G) — espejo ESTÁTICO de los
  // literales `pat:` de los 20 generadores de LIVE_MATH. Registro aditivo:
  // leer el pat vía liveMathGen() consumiría el RNG del motor en pleno
  // render (prohibido); este espejo mantiene el render puro. Si un caso
  // nuevo entra a LIVE_MATH, su pat entra acá (default: sin match, deb=0).
  const CASE_MATH_PAT = {
    'hotel': 'P1', 'saas-nrr': 'P2R', 'pe-grocery': 'P1', 'streaming': 'P2R',
    'airline-co2': 'P3', 'hospital': 'P1', 'city-congestion': 'P2R',
    'saas-pricing': 'P2R', 'cloud-migration': 'P1', 'marketplace': 'P4',
    'wallet-entry': 'P3', 'sizing-delivery': 'P3', 'saas-pricing-usage': 'P1',
    'marketplace-gmv': 'P2R', 'dtc-margin': 'P2R', 'saas-acquisition': 'P1',
    'mobile-gaming': 'P3', 'enterprise-disrupt': 'P2R', 'streaming-entry': 'P3',
    'b2b-saas-sizing': 'P3',
    'smart-branch': 'P4',
    'card-activation': 'P2R',
    'acquirer-mdr': 'P2R',
    'credit-launch': 'P2R'
  };
  // Mapa skill → tipo de drill accionable del hub. math y P1–P4 quedan
  // FUERA a propósito: el slot de math ya ataca weakestPat (Brick B) y
  // duplicar el músculo en dos slots es ruido. diagnose/clarifying no
  // tienen drill standalone (se gradean dentro del caso guiado) → los
  // cubre el slot de caso.
  const SDH_SKILL_DRILL = {
    ambiguedad: 'ambiguedad', synthesis: 'synthesis',
    hypothesis: 'hypothesis', mece: 'mece',
    experimento: 'experimento',   // M3 — edición autorizada: skill 'experimento' → su drill
    protocolo: 'protocolo'        // M10 — Protocolo P2R sí es drill standalone del hub
  };

  // Semilla YYYYMMDD en hora LOCAL — mismo día = misma semilla.
  function sdhDateSeed(d) {
    const t = d || new Date();
    return t.getFullYear() * 10000 + (t.getMonth() + 1) * 100 + t.getDate();
  }

  // Composición PURA del plan de Sesión de Hoy. No muta state; toda
  // elección estocástica pasa por la instancia LOCAL rng — mismo (state,
  // seed) → plan idéntico. El orden de consumo del rng es fijo:
  // (1) drill de debilidad, (2) pick de caso.
  function composeSdhPlan(st, seed) {
    const rng = MCMATH.mulberry32(seed | 0);
    const weak = weakestSkills(st);
    const focus = weak[0] || null;

    // (1) Recall — semántica intacta (srsDueCount: sin entrada = due; los tl- entran gratis).
    const dueCount = srsDueCount();

    // (2) Math — intacto (sdh-math siembra weakestPat, congelado Brick B);
    // aditivo: mediana del patrón débil si pasa el gate n≥3 (F1).
    const mathPat = MCMATH.weakestPat(st.mathPats);
    const mathMed = mathMedian((st.mathTimes || {})[mathPat]);

    // (3) Drill de debilidad — peor skill de weakestSkills CON drill
    // mapeado; el ítem dentro del tipo se elige con el rng del día.
    let skillDrill = null;
    for (const s of weak) {
      const dt = SDH_SKILL_DRILL[s.key];
      if (!dt || !DRILL_TYPES[dt] || DRILL_TYPES[dt].generated) continue;
      const total = (DRILL_TYPES[dt].drills || []).length;
      if (!total) continue;
      skillDrill = { skill: s.key, rate: s.rate, n: s.n, drillType: dt, drillIdx: Math.floor(rng() * total) };
      break;
    }

    // (4) Caso — score = wMC×densidadMC + wDeb×match-pat + wRec×recencia;
    // el rng del día elige entre los top 3. Ningún caso puede dar score 0
    // (mc mínimo = 1 → piso SDH_W_MC): los 20 siguen alcanzables.
    const lastLiveTs = {};
    for (const e of (st.liveCaseLog || [])) {
      if (e && e.caseId && typeof e.ts === 'number' && (!lastLiveTs[e.caseId] || e.ts > lastLiveTs[e.caseId])) lastLiveTs[e.caseId] = e.ts;
    }
    const liveDoneSet = new Set((st.liveCaseLog || []).map(function (e) { return e && e.caseId; }).filter(Boolean));
    const allCasesLive = CASES.length > 0 && CASES.every(function (c) { return liveDoneSet.has(c.id); });
    const now = Date.now();
    const weakMathPat = weak.find(function (s) { return SKILL_MATH_PATS.indexOf(s.key) >= 0; }) || null;
    const scored = CASES.map(function (c) {
      // Recencia: SOLO lo vivido tiene timestamp (liveCaseLog). Lo guiado
      // completado (completedCases = array de IDs SIN timestamps) se trata
      // como 'hecho hace tiempo' → recencia máxima, no baja el caso.
      // Decisión documentada: sin timestamp no hay señal honesta de frescura.
      let rec = 1;
      const ts = lastLiveTs[c.id];
      if (typeof ts === 'number') rec = Math.min(1, Math.max(0, (now - ts) / (SDH_RECENCY_DAYS * 86400000)));
      const deb = (weakMathPat && CASE_MATH_PAT[c.id] === weakMathPat.key) ? 1 : 0;
      const mc = CASE_MC_DENSITY[c.id] || 1;
      return { c: c, score: SDH_W_MC * mc + SDH_W_DEB * deb + SDH_W_REC * rec };
    });
    scored.sort(function (a, b) {
      return (b.score - a.score) || (a.c.id < b.c.id ? -1 : a.c.id > b.c.id ? 1 : 0);
    });
    const top = scored.slice(0, 3);
    const liveCase = top.length ? top[Math.floor(rng() * top.length)].c : null;

    // (5) Exhibit — comportamiento actual intacto: primer no-leído
    // (pick determinista; no hay pick aleatorio que sembrar).
    const exhDone = new Set(st.exhibitsCompleted || []);
    const exhibit = EXHIBITS.find(function (x) { return !exhDone.has(x.id); }) || null;

    return {
      focus: focus,
      dueCount: dueCount,
      mathPat: mathPat, mathMed: mathMed,
      skillDrill: skillDrill,
      liveCase: liveCase,
      caseIsRepaso: liveCase ? liveDoneSet.has(liveCase.id) : false,
      allCasesLive: allCasesLive,
      exhibit: exhibit,
      allExhibits: !exhibit,
      empty: (dueCount === 0 && !exhibit && allCasesLive)
    };
  }

    // ============================================================
    // BRICK 7 + BRICK I · SESIÓN DE HOY — plan compuesto por skillGraph
    // (composeSdhPlan): render puro, determinista por día (instancia LOCAL
    // mulberry32 sembrada con YYYYMMDD), slots por debilidad REAL.
    // NO muta state, NO consume el RNG global de MCMATH.
    // ============================================================
    const sdhPlan = composeSdhPlan(state, sdhDateSeed());
    const sdhDueCount = sdhPlan.dueCount;
    // (2) Patrón de math más flojo — reusa MCMATH.weakestPat (tot>=3, menor acc, default P2R).
    const sdhWeakPat  = sdhPlan.mathPat;

    // Header de foco — la señal visible nunca miente: rate solo con n≥3;

    const sdhFocus = sdhPlan.focus;
    const sdhFocusLabel = sdhFocus ? (SKILL_LABELS[sdhFocus.key] || sdhFocus.key) : '';
    const sdhFocusHtml = sdhFocus

    sdhItems.push({

    // Slot NUEVO Brick I: drill del skill más débil con drill mapeado.

    if (sdhCase) {

    }

    const sdhRacha = state.streak > 0
      ? `<span class="badge badge-gold">Racha: ${state.streak} ${state.streak === 1 ? 'día' : 'días'}</span>`
      : '';
    const sdhRow = (inner) => `<div class="flex justify-between items-center" style="gap:12px;padding:12px 0;border-top:1px solid var(--border-soft)">${inner}</div>`;
    const sdhBody = sdhEmpty
      ? `${sdhRow('<div class="body-sm c-2" style="flex:1">Estás al día. Haz un caso en vivo libre para mantener la racha.</div>')}
         <button class="btn btn-secondary btn-sm" style="width:auto;margin-top:12px" data-action="goto" data-tab="cases">Ir a Casos</button>`

          ? sdhRow(`<div class="body-sm c-2" style="flex:1">${it.text}</div>`)

        ).join('');
    const sesionHoyHtml = `
      <div class="card-elevated sp-5" style="padding:18px">
        <div class="flex justify-between items-center" style="gap:12px">

    root.innerHTML = `

  // Delegated dashboard click handler — attached ONCE at boot, not per render
  function handleDashboardClick(e) {
    const actionEl = e.target.closest('[data-action]');
    const rowEl = e.target.closest('.mastery-row');

    if (actionEl) {
      const action = actionEl.dataset.action;
      if (action === 'goto') { switchTab(actionEl.dataset.tab); return; }
      if (action === 'start-recall') {
        const fwId = actionEl.dataset.fw;
        switchTab('recall');
        // Kick off the drill for the specific framework (pick screen is skipped)
        if (fwId && FRAMEWORK_DATA[fwId]) {
          renderRecall({ startFramework: fwId });
        }
        return;
      }
      if (action === 'cycle-tip') {
        state.tipIndex = (state.tipIndex + 1) % TIPS.length;
        saveState();
        renderDashboard();
        return;
      }
      // ── Brick 7 · Sesión de Hoy: deep-links a las actividades ──
      if (action === 'sdh-math') {
        // Mismo path que el hub de Drills para 'math' (tipo generated → runner directo).
        if (DRILL_TYPES && DRILL_TYPES.math) {
          drillsState.type = 'math';
          drillsState.mathDone = 0;
          drillsState.drillIdx = 0;
          // Brick B: foco ANTES de sembrar — ensureMathSession(true) genera el drill #1 adentro,
          // y ese primero YA debe salir del patrón débil (es la promesa "foco <patrón>" de SdH).
          drillsState.mathFocus = MCMATH.weakestPat(state.mathPats);
          ensureMathSession(true);
          resetDrillDetailState();
          drillsState.view = 'detail';
        }
        switchTab('drills');
        return;
      }
      if (action === 'sdh-skill') {
        // Brick I: deep-link al drill del skill más débil. Mismo destino que
        // drill-open-type → drill-open del hub: tipo de lista + idx directo
        // (el idx viene del plan del día — determinista). Los tipos
        // generated (math) no pasan por acá: sdh-math ya los cubre.
        const t = actionEl.dataset.skillType;
        if (DRILL_TYPES && DRILL_TYPES[t] && !DRILL_TYPES[t].generated) {
          const total = (DRILL_TYPES[t].drills || []).length;
          let idx = parseInt(actionEl.dataset.drillIdx, 10);
          if (isNaN(idx) || idx < 0 || idx >= total) idx = 0;
          drillsState.type = t;
          drillsState.drillIdx = idx;
          resetDrillDetailState();
          drillsState.view = 'detail';
        }
        switchTab('drills');
        return;
      }
      if (action === 'sdh-live') {
        const cid = actionEl.dataset.caseId;
        switchTab('cases'); // deja Casos detrás del overlay (fallback al cerrar)
        if (cid && CASES.some(c => c.id === cid)) openLiveCase(cid);
        return;
      }
      if (action === 'sdh-exhibit') {
        const xid = actionEl.dataset.exhibitId;
        if (xid && EXHIBITS.some(x => x.id === xid)) currentExhibitId = xid;
        switchTab('exhibits'); // renderExhibits() abre el detalle si hay currentExhibitId
        return;
      }
      return;
    }
    if (rowEl) {
      // Deep-link into Learn for the tapped framework
      const fwId = rowEl.dataset.fw;
      if (fwId && FRAMEWORK_DATA[fwId]) {

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c];
    });
  }

  // ============================================================
  // ISSUE TREE — interactive, expandable visual representation
  // ============================================================
  // Renders an MBB-style issue tree. Default state is COLLAPSED branches
  // (so the structure is visible at-a-glance without overwhelming detail).
  // User taps a branch to expand sub-items inline.
  //
  // Args:
  //   opts.title      - heading shown at top of tree container
  //   opts.rootText   - the hypothesis or guiding question pinned at root (gold)
  //   opts.branches   - array of { name, color?, items: [{ lead, detail? }] }
  //                     color: 'gold'|'emerald'|'blue'|'amber'|'pink'|'purple'
  //   opts.treeId     - unique DOM id to scope expansion clicks
  function renderIssueTree(opts) {
    const branches = opts.branches || [];
    const rootHtml = opts.rootText ? `
      <div class="tree-root">
        <div class="tree-root-label">Hypothesis at root</div>
        <div class="tree-root-text">"${escapeHtml(opts.rootText)}"</div>
      </div>
    ` : '';
    const branchesHtml = branches.map((b, i) => {
      const colorClass = b.color ? `color-${b.color}` : 'color-gold';
      const subsHtml = (b.items || []).map(item => {
        const detail = item.detail || (item.subs && item.subs.length ? item.subs.join(' · ') : '');
        return `
          <div class="tree-sub">
            <span class="tree-sub-lead">${escapeHtml(item.lead || item)}</span>
            ${detail ? `<span class="tree-sub-detail">${escapeHtml(detail)}</span>` : ''}
          </div>
        `;
      }).join('');
      return `
        <div class="tree-branch ${colorClass}" data-tree-branch="${i}">
          <div class="tree-branch-head" data-action="tree-toggle" data-branch="${i}">
            <svg class="tree-branch-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            <span class="tree-branch-num">${String(i+1).padStart(2,'0')}</span>
            <span class="tree-branch-name">${escapeHtml(b.name)}</span>
            <span class="tree-branch-count">${(b.items||[]).length} sub</span>
          </div>
          <div class="tree-subs">${subsHtml}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="tree-container" data-tree-root="${opts.treeId || 'tree'}">
        ${opts.title ? `
          <div class="tree-header">
            <div class="tree-title">${escapeHtml(opts.title)}</div>
            <button class="tree-collapse-all" data-action="tree-toggle-all" data-tree="${opts.treeId || 'tree'}">Expand all</button>
          </div>
        ` : ''}
        ${rootHtml}
        <div class="tree-branches">${branchesHtml}</div>
      </div>
    `;
  }

  // Generic delegated handler for tree toggle actions — attached at document level
  // so trees rendered anywhere (Cases, Learn, future tabs) all work without per-tab wiring.
  document.addEventListener('click', function(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.dataset.action;
    if (action === 'tree-toggle') {
      const branchEl = target.closest('.tree-branch');
      if (branchEl) branchEl.classList.toggle('expanded');
      return;
    }
    if (action === 'tree-toggle-all') {
      const treeId = target.dataset.tree;
      const treeRoot = document.querySelector(`[data-tree-root="${treeId}"]`);
      if (!treeRoot) return;
      const branchEls = treeRoot.querySelectorAll('.tree-branch');
      const anyCollapsed = Array.from(branchEls).some(b => !b.classList.contains('expanded'));
      branchEls.forEach(b => b.classList.toggle('expanded', anyCollapsed));
      target.textContent = anyCollapsed ? 'Collapse all' : 'Expand all';
      return;
    }
  });

  function fmtQuantAnswer(q) {
    const s = (Math.round(q.answer * 100) / 100).toString().replace('.', ',');
    if (q.unit === '%') return s + '%';
    if (q.unit === 'x') return s + 'x';
    if (q.unit === 'pts') return s + ' pts';
    return s + ' ' + q.unit;
  }

  function exhTableHTML(t) {
    const head = '<tr>' + t.headers.map(function (h) { return '<th>' + escapeHtml(h) + '</th>'; }).join('') + '</tr>';
    const body = t.rows.map(function (r) {
      return '<tr>' + r.map(function (c) { return '<td>' + escapeHtml(c) + '</td>'; }).join('') + '</tr>';
    }).join('');
    return '<div class="exh-table-wrap"><table class="exh-table"><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
  }

  function exhBarsHTML(b) {
    // ancho proporcional al MAXIMO valor absoluto; eje centrado; +verde / −rojo.
    const maxAbs = Math.max.apply(null, [1].concat(b.items.map(function (it) { return Math.abs(it.value); })));
    const rows = b.items.map(function (it) {
      const pos = it.value >= 0;
      const pct = (Math.abs(it.value) / maxAbs) * 50;   // 50% = media pista (el eje esta al centro)
      const sign = it.value > 0 ? '+' : (it.value < 0 ? '\u2212' : '');
      const valTxt = sign + Math.abs(it.value);
      return '<div class="exh-bar-row">'
        + '<div class="exh-bar-label">' + escapeHtml(it.label) + '</div>'
        + '<div class="exh-bar-track"><div class="exh-bar-axis"></div>'
        + '<div class="exh-bar-fill ' + (pos ? 'pos' : 'neg') + '" style="width:' + pct.toFixed(1) + '%">'
        + '<span class="exh-bar-val">' + valTxt + '</span></div></div></div>';
    }).join('');
    return '<div class="exh-bars"><div class="exh-bars-unit">Unidad: ' + escapeHtml(b.unit) + '</div>' + rows + '</div>';
  }

    return ''
      + '<div class="exh-header">'
      +   '<div class="exh-title">Exhibits</div>'
      +   '<div class="exh-subtitle">Once lecturas de gr\u00e1ficos y tablas. El entrevistador te pasa un dato y pregunta "\u00bfqu\u00e9 ves ac\u00e1?". Observa, saca el "so what", evita la trampa y cierra con el c\u00e1lculo de seguimiento.</div>'
      + '</div>'
      + EXHIBITS.map(function (ex) {
          return '<div class="exh-card ' + (done.has(ex.id) ? 'completed' : '') + '" data-exhibit-id="' + ex.id + '">'
            + '<div class="exh-card-type">' + (ex.render === 'bars' ? '\u25a6 Gr\u00e1fico de barras' : '\u25a6 Tabla') + '</div>'
            + '<div class="exh-card-title">' + escapeHtml(ex.title) + '</div>'
            + (done.has(ex.id) ? checkSVG : '')
            + '</div>';
        }).join('');
  }

  function renderExhibitDetail(id) {
    const ex = EXHIBITS.find(function (x) { return x.id === id; });
    if (!ex) return renderExhibitList();
    const revealed = !!exhRevealed[id];
    let html = ''
      + '<button class="back-btn" data-action="exh-back">'
      +   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>'
      +   'Volver a exhibits'
      + '</button>'
      + '<div class="exh-context">' + escapeHtml(ex.context) + '</div>'
      + (ex.render === 'bars' ? exhBarsHTML(ex.bars) : exhTableHTML(ex.table))
      + '<div class="exh-prompt">'
      +   '<div class="exh-prompt-label">La pregunta</div>'
      +   '<div class="exh-prompt-text">' + escapeHtml(ex.prompt) + '</div>'
      + '</div>';

    if (!revealed) {
      html += '<button class="btn btn-primary" data-action="exh-reveal">Revelar lectura</button>';
      return html;
    }

    html += '<div class="exh-reveal-sec">'
      + '<div class="exh-block-label" style="color:var(--gold)">Observaciones</div>'
      + '<ul class="exh-obs">' + ex.observations.map(function (o) { return '<li>' + escapeHtml(o) + '</li>'; }).join('') + '</ul>'
      + '<div class="exh-insight">'
      +   '<div class="exh-block-label">El insight \u00b7 so what</div>'
      +   '<div class="exh-insight-text">' + escapeHtml(ex.insight) + '</div>'
      + '</div>'
      + '<div class="exh-trap">'
      +   '<div class="exh-block-label">\u26a0 La trampa</div>'
      +   '<div class="exh-trap-text">' + escapeHtml(ex.trap) + '</div>'
      + '</div>';

    if (ex.quant) {
      html += '<div class="exh-quant">'
        + '<div class="exh-quant-q">' + escapeHtml(ex.quant.q) + '</div>'
        + '<div class="exh-quant-row">'
        +   '<input class="exh-quant-input" type="text" inputmode="decimal" placeholder="Tu respuesta (' + escapeHtml(ex.quant.unit) + ')" />'
        +   '<button class="exh-quant-btn" data-action="exh-check">Comprobar</button>'
        + '</div>'
        + '<div class="exh-quant-result"></div>'
        + '</div>';
    }

    html += '</div>';
    return html;
  }

  function renderExhibits() {
    const root = document.getElementById('exhibits-root');
    if (!root) return;
    if (currentExhibitId) {
      root.innerHTML = renderExhibitDetail(currentExhibitId);
    } else {
      root.innerHTML = renderExhibitList();
    }
    if (!exhibitsMounted) {
      root.addEventListener('click', handleExhibitsClick);
      root.addEventListener('keydown', handleExhibitsKey);
      exhibitsMounted = true;
    }
  }

  function handleExhibitsClick(e) {
    const target = e.target.closest('[data-action], [data-exhibit-id]');
    if (!target) return;
    const action = target.dataset.action;

    if (!action && target.dataset.exhibitId) {
      currentExhibitId = target.dataset.exhibitId;
      renderExhibits();
      const host = document.getElementById('scroll-host');
      if (host) host.scrollTop = 0;
      return;
    }
    if (action === 'exh-back') {
      currentExhibitId = null;
      renderExhibits();
      const host = document.getElementById('scroll-host');
      if (host) host.scrollTop = 0;
      return;
    }
    if (action === 'exh-reveal') {
      if (!currentExhibitId) return;
      exhRevealed[currentExhibitId] = true;
      // marca completado (array de ids, mismo patron que completedCases) — una sola vez.
      if (!Array.isArray(state.exhibitsCompleted)) state.exhibitsCompleted = [];
      if (state.exhibitsCompleted.indexOf(currentExhibitId) === -1) {
        state.exhibitsCompleted.push(currentExhibitId);
        saveState();
      }
      renderExhibits();
      return;
    }
    if (action === 'exh-check') {
      const ex = EXHIBITS.find(function (x) { return x.id === currentExhibitId; });
      if (!ex || !ex.quant) return;
      const input = document.querySelector('.exh-quant-input');
      const resultEl = document.querySelector('.exh-quant-result');
      if (!input || !resultEl) return;
      const v = MCMATH.parseAns(input.value);
      const ok = MCMATH.tolOK(v, ex.quant.answer, ex.quant.kind);
      const ans = fmtQuantAnswer(ex.quant);
      resultEl.className = 'exh-quant-result show ' + (ok ? 'correct' : 'incorrect');
      resultEl.innerHTML = (ok ? '\u2713 Correcto. <b>' : '\u2717 Revisa. La respuesta es <b>') + ans + '</b>. ' + escapeHtml(ex.quant.hint);
      return;
    }
  }

  function handleExhibitsKey(e) {
    if (e.key !== 'Enter') return;
    if (!e.target.closest('.exh-quant-input')) return;
    e.preventDefault();
    const btn = document.querySelector('.exh-quant-btn');
    if (btn) btn.click();
  }

  function renderCases() {
    const root = document.getElementById('cases-root');
    if (!root) return;
    if (currentCaseId) {
      root.innerHTML = renderCaseDetail(currentCaseId);
    } else {
      root.innerHTML = renderCaseList();
    }
    if (!casesMounted) {
      root.addEventListener('click', handleCasesClick);
      casesMounted = true;
    }
  }

  function renderCaseList() {
    const completedSet = new Set(state.completedCases || []);
    return `
      <div class="cases-header">
        <div class="cases-title">Walkthroughs de casos</div>
        <div class="cases-subtitle">Diez casos interactivos. Cada uno te obliga a una hipótesis antes de los datos — y te muestra exactamente dónde las hipótesis débiles te llevan mal.</div>
      </div>
      ${CASES.map((c, i) => `
        <div class="case-card ${completedSet.has(c.id) ? 'completed' : ''}" data-case-id="${c.id}">
          <div class="case-card-num">Caso ${String(i+1).padStart(2,'0')} · ${escapeHtml(c.difficulty)}</div>
          <div class="case-card-title">${escapeHtml(c.title)}</div>
          <div class="case-card-meta">
            <span class="badge ${c.typeColor}">${escapeHtml(c.type)}</span>
            <span class="badge badge-muted">${escapeHtml(c.industry)}</span>
          </div>
          <div class="case-card-prompt">${escapeHtml(c.prompt)}</div>
          <div class="case-card-foot">
            <span class="case-card-guided-hint">Toca · modo guiado</span>
            <button class="case-live-btn" data-action="open-live" data-live-id="${c.id}">Modo en vivo ⏱</button>
          </div>
        </div>
      `).join('')}
    `;
  }

  function renderCaseDetail(caseId) {
    const c = CASES.find(x => x.id === caseId);
    if (!c) return renderCaseList();
    const s = caseSessionState;
    const stepOrder = ['diagnose', 'clarifying', 'hypothesis', 'framework', 'data', 'pushback', 'synthesis'];
    const stepStatus = {
      diagnose:   s.diagnoseRevealed ? 'done' : 'active',
      clarifying: !s.diagnoseRevealed ? 'pending' : (s.clarifyingRevealed ? 'done' : 'active'),
      hypothesis: !s.clarifyingRevealed ? 'pending' : (s.hypothesisRevealed ? 'done' : 'active'),
      framework:  !s.hypothesisRevealed ? 'pending' : (s.revealedFramework ? 'done' : 'active'),
      data:       !s.revealedFramework ? 'pending' : (s.revealedDataCount >= c.dataReveals.length ? 'done' : 'active'),
      pushback:   (s.revealedDataCount < c.dataReveals.length) ? 'pending' : (s.revealedPushback ? 'done' : 'active'),
      synthesis:  !s.revealedPushback ? 'pending' : (s.revealedSynthesis ? 'done' : 'active')
    };

    let html = `
      <button class="back-btn" data-action="back-to-list">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Volver a casos
      </button>
      <div class="case-prompt-card">
        <div class="case-prompt-label">${escapeHtml(c.title)} · ${escapeHtml(c.industry)}</div>
        <div class="case-prompt-text">"${escapeHtml(c.prompt)}"</div>
        <div class="case-context">${c.context}</div>
      </div>
      <div class="step-dots">
        ${stepOrder.map(st => `<div class="step-dot ${stepStatus[st]==='done'?'done':''} ${stepStatus[st]==='active'?'active':''}"></div>`).join('')}
      </div>

      <div class="step-heading"><span class="step-num-big">01</span><span class="step-title">Diagnóstico</span></div>
      <div class="step-instruction">¿Qué tipo de caso es este? Elige antes de seguir leyendo.</div>
      ${c.diagnose.map((opt, i) => {
        const letter = ['A','B','C'][i];
        const sel = s.selectedDiagnose === i ? `selected-${opt.strength}` : '';
        return `<button class="option-btn ${sel}" data-action="select-diagnose" data-index="${i}"><div class="option-label">Opción ${letter}</div>${escapeHtml(opt.text)}</button>`;
      }).join('')}
      ${s.selectedDiagnose !== null && !s.diagnoseRevealed ? renderFeedbackBlock(c.diagnose[s.selectedDiagnose], 'Diagnóstico') : ''}
    `;

    if (!s.diagnoseRevealed) return html;

    // Show selected diagnose feedback as read-only reference
    html += renderFeedbackBlockStatic(c.diagnose[s.selectedDiagnose], 'Diagnóstico');

    // STEP 2 — CLARIFYING
    const priorities = CLARIFYING_PRIORITY[c.id] || [];
    html += `
      <div class="step-heading"><span class="step-num-big">02</span><span class="step-title">Preguntas aclaratorias</span></div>
      <div class="step-instruction">Los entrevistadores reales te dejan hacer 1–2 preguntas aclaratorias antes de estructurar. Elige las que realmente harías primero — las de mayor leverage, no todas.</div>
    `;
    if (!s.clarifyingRevealed) {
      // Pre-reveal: plain selectable options
      html += c.clarifying.map((q, i) => `
        <div class="clarify-option ${s.selectedClarifying.includes(i) ? 'selected' : ''}" data-action="toggle-clarifying" data-index="${i}">
          <div class="clarify-check"></div>
          <div class="clarify-text">"${escapeHtml(q)}"</div>
        </div>
      `).join('');
      html += `<button class="reveal-btn" data-action="reveal-clarifying">Ya elegí mis preguntas — muestra el feedback</button>`;
    } else {
      // Post-reveal: priority feedback per question
      html += c.clarifying.map((q, i) => {
        const priority = priorities[i] || 'good';
        const picked = s.selectedClarifying.includes(i);
        const priorityLabelText =
          priority === 'best' ? 'Mejor primera pregunta' :
          priority === 'good' ? 'Vale la pena preguntar' :
                                'Baja prioridad — puedes saltarla';
        return `
          <div class="clarify-option revealed priority-${priority} ${picked ? 'selected' : 'not-picked'}">
            <div class="clarify-check"></div>
            <div>
              <div class="clarify-text">"${escapeHtml(q)}"</div>
              <div class="clarify-priority-label ${priority}">${picked ? '✓ Elegiste · ' : ''}${priorityLabelText}</div>
            </div>
          </div>
        `;
      }).join('');
      // Summary
      const bestCount = priorities.filter(p => p === 'best').length;
      const pickedBest = s.selectedClarifying.filter(i => priorities[i] === 'best').length;
      const pickedLow = s.selectedClarifying.filter(i => priorities[i] === 'low').length;
      let coachMsg;
      if (pickedBest === bestCount && pickedLow === 0) {
        coachMsg = `Elegiste la${bestCount > 1 ? 's' : ''} pregunta${bestCount > 1 ? 's' : ''} de mayor prioridad y saltaste las de bajo valor. Esta es la disciplina que te compra tiempo para estructurar — los entrevistadores lo notan.`;
      } else if (pickedBest === bestCount) {
        coachMsg = `Elegiste la${bestCount > 1 ? 's' : ''} mejor${bestCount > 1 ? 'es' : ''} pregunta${bestCount > 1 ? 's' : ''} — que es lo principal. Soltar la de baja prioridad la próxima vez te mantiene enfocado en un caso real de 30 min.`;
      } else if (pickedBest > 0) {
        coachMsg = `Elegiste algunas pero no todas las preguntas de mayor leverage. En un caso real, perderte la mejor pregunta de scoping te puede costar 5 minutos estructurando lo equivocado.`;
      } else {
        coachMsg = `Te perdiste la pregunta de mayor leverage. Este es el failure mode más común: preguntar "nice to know" en vez de "need to know." Relee cuál estaba marcada como 'best' — el patrón se generaliza entre casos.`;
      }
      html += `
        <div class="clarify-summary">
          <div class="clarify-summary-title">Nota del coach</div>
          ${coachMsg}
        </div>
      `;
    }

    if (!s.clarifyingRevealed) return html;

    // STEP 3 — HYPOTHESIS
    html += `
      <div class="step-heading"><span class="step-num-big">03</span><span class="step-title">Hipótesis</span></div>
      <div class="step-instruction">Antes de tener más datos — ¿qué crees que está pasando en realidad? Comprométete con una.</div>
      ${c.hypotheses.map((h, i) => {
        const letter = ['A','B','C'][i];
        const sel = s.selectedHypothesis === i ? `selected-${h.strength}` : '';
        return `<button class="option-btn ${sel}" data-action="select-hypothesis" data-index="${i}"><div class="option-label">Hipótesis ${letter}</div>${escapeHtml(h.text)}</button>`;
      }).join('')}
      ${(() => {
        if (s.selectedHypothesis === null || s.hypothesisRevealed) return '';
        const bestIdx = (typeof HYPOTHESIS_BEST[c.id] === 'number') ? HYPOTHESIS_BEST[c.id] : 0;
        const picked = c.hypotheses[s.selectedHypothesis];
        const ctx = {
          isTopPick:   s.selectedHypothesis === bestIdx,
          isSecondary: picked.strength === 'strong' && s.selectedHypothesis !== bestIdx,
          bestOption:  c.hypotheses[bestIdx]
        };
        return renderFeedbackBlock(picked, 'Hipótesis', ctx);
      })()}
    `;

    if (!s.hypothesisRevealed) return html;

    {
      const bestIdx = (typeof HYPOTHESIS_BEST[c.id] === 'number') ? HYPOTHESIS_BEST[c.id] : 0;
      const picked = c.hypotheses[s.selectedHypothesis];
      const ctx = {
        isTopPick:   s.selectedHypothesis === bestIdx,
        isSecondary: picked.strength === 'strong' && s.selectedHypothesis !== bestIdx,
        bestOption:  c.hypotheses[bestIdx]
      };
      html += renderFeedbackBlockStatic(picked, 'Hipótesis', ctx);
    }

    // STEP 4 — FRAMEWORK (rendered as a visual issue tree)
    html += `
      <div class="step-heading"><span class="step-num-big">04</span><span class="step-title">Issue tree modelo</span></div>
      <div class="step-instruction">Un candidato MBB fuerte no solo lista buckets — dibuja un issue tree con la hipótesis en la raíz y 2–3 niveles de descomposición. Toca las ramas para expandirlas, igual que las recorrerías en un caso real.</div>
    `;
    if (!s.revealedFramework) {
      html += `<button class="reveal-btn" data-action="reveal-framework">Mostrar issue tree modelo</button>`;
    } else {
      // Pull the user\'s selected hypothesis (or a default) for the root
      const hypothesisAtRoot = s.selectedHypothesis !== null
        ? c.hypotheses[s.selectedHypothesis].text
        : (c.hypotheses.find(h => h.strength === 'strong') || c.hypotheses[0]).text;
      // Color-cycle branches for visual variety, matching the framework type
      const colorPalette = ['emerald', 'blue', 'amber', 'gold', 'pink', 'purple'];
      const treeBranches = c.framework.map((b, i) => ({
        name: b.name,
        color: colorPalette[i % colorPalette.length],
        items: (b.items || []).map(item => ({
          lead: typeof item === 'string' ? item : item.lead,
          detail: typeof item === 'string' ? null : (item.detail || null)
        }))
      }));
      html += renderIssueTree({
        title: 'Issue tree · ' + escapeHtml(c.title),
        rootText: hypothesisAtRoot,
        branches: treeBranches,
        treeId: 'case-tree-' + c.id
      });
    }

    if (!s.revealedFramework) return html;

    // STEP 5 — DATA REVEALS
    html += `
      <div class="step-heading"><span class="step-num-big">05</span><span class="step-title">Revelado de datos</span></div>
      <div class="step-instruction">Los datos llegan de a uno, como en un caso en vivo. Lee, interpreta, después pide más.</div>
    `;
    for (let i = 0; i < s.revealedDataCount; i++) {
      const d = c.dataReveals[i];
      html += `
        <div class="data-reveal">
          <div class="data-reveal-label">${escapeHtml(d.label)}</div>
          <div class="data-reveal-text">${escapeHtml(d.text)}</div>
          <div class="data-reveal-insight">${d.insight}</div>
        </div>
      `;
    }
    if (s.revealedDataCount < c.dataReveals.length) {
      html += `<button class="reveal-btn" data-action="reveal-data">Revelar siguiente data point (${s.revealedDataCount + 1} / ${c.dataReveals.length})</button>`;
    }

    if (s.revealedDataCount < c.dataReveals.length) return html;

    // STEP 6 — PUSHBACK
    html += `
      <div class="step-heading"><span class="step-num-big">06</span><span class="step-title">Push-back del entrevistador</span></div>
      <div class="step-instruction">El entrevistador te desafía — y después dice: <em>"Entonces, ¿cuál es tu recomendación?"</em> <strong>Antes de tocar abajo, formula tu síntesis completa en voz alta</strong> (o en tu cabeza). 60–90 segundos: Respuesta → Sustento → Riesgo → Siguiente paso. Solo revela el modelo una vez que te hayas comprometido con la tuya.</div>
      <div class="pushback-card">
        <div class="pushback-label">Push-back del entrevistador</div>
        <div class="pushback-text">"${escapeHtml(c.pushback)}"</div>
      </div>
      ${!s.revealedPushback ? `<button class="reveal-btn" data-action="reveal-pushback">Ya dije mi síntesis — ahora revela el modelo</button>` : ''}
    `;

    if (!s.revealedPushback) return html;

    // STEP 7 — SYNTHESIS + GRADE
    html += `
      <div class="step-heading"><span class="step-num-big">07</span><span class="step-title">Síntesis modelo</span></div>
      <div class="step-instruction">Una recomendación top-down de 60–90 segundos. Así es como deberías sonar en voz alta.</div>
      <div class="synthesis-block">
        <div class="synthesis-header">
          <div class="synthesis-header-label">Respuesta modelo</div>
          <div class="synthesis-header-sub">Respuesta → Sustento → Riesgo → Siguiente paso</div>
        </div>
        <div class="synthesis-row answer"><div class="synthesis-row-label">Respuesta</div><div class="synthesis-row-text">${escapeHtml(c.synthesis.answer)}</div></div>
        <div class="synthesis-row support"><div class="synthesis-row-label">Sustento</div><div class="synthesis-row-text">${escapeHtml(c.synthesis.support)}</div></div>
        <div class="synthesis-row risk"><div class="synthesis-row-label">Riesgo clave</div><div class="synthesis-row-text">${escapeHtml(c.synthesis.risk)}</div></div>
        <div class="synthesis-row nextstep"><div class="synthesis-row-label">Siguiente paso</div><div class="synthesis-row-text">${escapeHtml(c.synthesis.nextstep)}</div></div>
      </div>

      <div class="step-heading"><span class="step-num-big">08</span><span class="step-title">Autocalifica tu síntesis</span></div>
      <div class="step-instruction">Chequea con honestidad TU síntesis (la que acabas de decir en voz alta) contra el modelo de arriba. Tres preguntas concretas — nada de vibras.</div>
      ${renderGradeQuestion('gradeAnswer',   'Respuesta principal',     '¿Tu recomendación principal coincidió con la del modelo?',                                   s.gradeAnswer)}
      ${renderGradeQuestion('gradeSupport',  'Evidencia de soporte', '¿Citaste al menos uno de los data points clave del modelo o sus cadenas de lógica?', s.gradeSupport)}
      ${renderGradeQuestion('gradeRiskNext', 'Riesgo + siguiente paso',    '¿Tu síntesis incluyó TANTO un riesgo relevante COMO un siguiente paso concreto?',           s.gradeRiskNext)}
      ${(s.gradeAnswer && s.gradeSupport && s.gradeRiskNext) ? renderScoreCard(c, s) : ''}
      ${(s.gradeAnswer && s.gradeSupport && s.gradeRiskNext) ? renderTLOverlay(c, s, false) : ''}

      <div class="step-heading"><span class="step-num-big">⏺</span><span class="step-title">Síntesis grabada</span></div>
      <div class="step-instruction">Elegir la respuesta correcta no es lo mismo que poder decirla. Produce TU recomendación en voz alta — 90 segundos, top-down — y califícala contra el modelo.</div>
      <button class="synth-cta" data-action="open-synth">
        <span class="synth-cta-rec"></span>
        <span class="synth-cta-text">Sintetiza en voz alta</span>
        ${synthCountForCase(c.id) > 0 ? `<span class="synth-cta-count">${synthCountForCase(c.id)}</span>` : ''}
      </button>
    `;

    return html;
  }

  // Count of recorded syntheses logged for a given case (for the CTA badge).
  function synthCountForCase(caseId) {
    if (!Array.isArray(state.synthLog)) return 0;
    return state.synthLog.filter(e => e && e.caseId === caseId).length;
  }

  function renderGradeQuestion(field, title, question, selected) {
    const opts = [
      { val: 'yes',     label: 'Sí',      cls: 'nailed' },
      { val: 'partial', label: 'Parcial', cls: 'close'  },
      { val: 'no',      label: 'No',      cls: 'missed' }
    ];
    return `
      <div class="grade-question">
        <div class="grade-q-title">${title}</div>
        <div class="grade-q-body">${question}</div>
        <div class="grade-row">
          ${opts.map(o => `
            <button class="grade-btn ${o.cls} ${selected === o.val ? 'grade-selected' : ''}" data-action="grade-subq" data-field="${field}" data-value="${o.val}">
              <div>${o.label}</div>
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }

  // Compute a case score from actual choices (not self-graded)
  function computeCaseScore(c, s) {
    const priorities = CLARIFYING_PRIORITY[c.id] || [];
    const bestIdx = (typeof HYPOTHESIS_BEST[c.id] === 'number') ? HYPOTHESIS_BEST[c.id] : 0;

    // Diagnose: strong=3, partial=1, weak=0
    const diagnoseStrength = c.diagnose[s.selectedDiagnose].strength;
    const diagnosePts = diagnoseStrength === 'strong' ? 3 : diagnoseStrength === 'partial' ? 1 : 0;

    // Clarifying: best=2, good=1, low=0 — summed, capped at 4
    let clarifyPts = 0;
    s.selectedClarifying.forEach(i => {
      const p = priorities[i];
      clarifyPts += (p === 'best' ? 2 : p === 'good' ? 1 : 0);
    });
    // Penalty for NOT picking a 'best' question
    const bestIndices = priorities.map((p, i) => p === 'best' ? i : -1).filter(i => i >= 0);
    const missedBest = bestIndices.filter(i => !s.selectedClarifying.includes(i)).length;
    clarifyPts = Math.max(0, Math.min(4, clarifyPts - missedBest));

    // Hypothesis: top-pick(strong) = 4, other strong = 3, partial = 1, weak = 0
    const hypPick = c.hypotheses[s.selectedHypothesis];
    let hypPts;
    if (s.selectedHypothesis === bestIdx && hypPick.strength === 'strong') hypPts = 4;
    else if (hypPick.strength === 'strong') hypPts = 3;
    else if (hypPick.strength === 'partial') hypPts = 1;
    else hypPts = 0;

    // Synthesis: 3 sub-questions, each yes=2 / partial=1 / no=0 → max 6
    const grade = { yes: 2, partial: 1, no: 0 };
    const synthA = grade[s.gradeAnswer]    || 0;
    const synthS = grade[s.gradeSupport]   || 0;
    const synthR = grade[s.gradeRiskNext]  || 0;
    const synthPts = synthA + synthS + synthR;

    const total = diagnosePts + clarifyPts + hypPts + synthPts;
    const max = 17;  // 3 + 4 + 4 + 6

    return {
      diagnose:   { label: describeDiagnose(diagnoseStrength),                   pts: diagnosePts, color: colorFor(diagnosePts, 3) },
      clarifying: { label: describeClarify(clarifyPts),                          pts: clarifyPts,  color: colorFor(clarifyPts, 4) },
      hypothesis: { label: describeHypothesis(s.selectedHypothesis === bestIdx, hypPick.strength), pts: hypPts, color: colorFor(hypPts, 4) },
      synthesis:  { label: describeSynthesis(synthPts),                          pts: synthPts,    color: colorFor(synthPts, 6) },
      total, max
    };
  }
  function describeSynthesis(pts) {
    if (pts >= 5) return 'Síntesis fuerte';
    if (pts >= 3) return 'Parcial — gaps clave';
    if (pts >= 1) return 'Síntesis débil';
    return 'Síntesis perdida';
  }
  function describeDiagnose(str) {
    return str === 'strong' ? 'Tipo de caso correcto' : str === 'partial' ? 'Parcial — vas bien encaminado' : 'Tipo de caso incorrecto';
  }
  function describeClarify(pts) {
    return pts >= 3 ? 'Pregunta de máxima prioridad hecha' : pts >= 2 ? 'Buena cobertura' : pts >= 1 ? 'Elegiste algunas útiles' : 'Te perdiste la pregunta clave';
  }
  function describeHypothesis(isBest, strength) {
    if (isBest) return 'Mejor opción — la hipótesis más fuerte';
    if (strength === 'strong')  return 'Fuerte — pero no la mejor opción';
    if (strength === 'partial') return 'Parcial — solo direccional';
    return 'Hipótesis débil';
  }
  function colorFor(pts, max) {
    const pct = pts / max;
    if (pct >= 0.75) return 'good';
    if (pct >= 0.35) return 'mid';
    return 'bad';
  }
  // Overlay Test & Learn: pick del confound (gradeado best/good/low) → revelar
  // overlay modelo (5 pasos) → self-grade → habilita el cierre del caso.
  // isLive gobierna solo el sufijo de data-action (dispatchers guiado/live separados).
  function renderTLGrade(isLive) {
    const A = isLive ? '-live' : '';
    const sel = isLive ? liveState.tlGrade : caseSessionState.tlGrade;
    const opts = [
      { val: 'yes',     label: 'Si',      cls: 'nailed' },
      { val: 'partial', label: 'Parcial', cls: 'close'  },
      { val: 'no',      label: 'No',      cls: 'missed' }
    ];
    return `
      <div class="grade-question">
        <div class="grade-q-title">Tu overlay hablado</div>
        <div class="grade-q-body">Antes de revelar: dijiste en voz alta los 5 pasos — control, lift incremental, el confound, los dos gates, y el pilot con su guardrail?</div>
        <div class="grade-row">
          ${opts.map(o => `<button class="grade-btn ${o.cls} ${sel === o.val ? 'grade-selected' : ''}" data-action="tl-selfgrade${A}" data-value="${o.val}"><div>${o.label}</div></button>`).join('')}
        </div>
      </div>`;
  }

  function renderTLOverlay(c, s, isLive) {
    const A = isLive ? '-live' : '';
    const tl = tlFor(c);
    const opts = (tl.confound && tl.confound.opts) ? tl.confound.opts : UNIVERSAL_TL.confound.opts;
    const picked = s.tlConfoundPick;
    const hasPick = (picked !== null && picked !== undefined);
    const bestOpt = opts.find(o => o.p === 'best') || opts[0];
    const confoundBlock = opts.map((o, i) => {
      const isSel = picked === i;
      const vcls = o.p === 'best' ? 'correct' : (o.p === 'good' ? 'partial' : 'incorrect');
      const fbTxt = o.p === 'best' ? 'Ese es el confound que manda aca — sin grupo control, el antes/despues lo confunde con el efecto real.'
                  : (o.p === 'good' ? 'Aplica, pero no es lo que mas contamina el antes/despues en este caso.'
                  : 'No es el confound principal — vuelve a mirar que mueve a AMBOS grupos por igual.');
      return `<button class="option-btn ${isSel ? 'selected' : ''}" data-action="tl-confound${A}" data-index="${i}">${escapeHtml(o.t)}</button>${isSel ? `<div class="tl-fb ${vcls}">${fbTxt}</div>` : ''}`;
    }).join('');

    let html = `
      <div class="tl-overlay">
        <div class="tl-kicker">Overlay Test &amp; Learn — cierra como en Mastercard</div>
        <div class="tl-lead">Un antes/despues sin grupo control siempre miente. Antes de dar el caso por cerrado, arma el experimento.</div>
        <div class="tl-step-label">Cual es el confound principal a aislar en ESTE caso?</div>
        <div class="tl-confound">${confoundBlock}</div>`;

    if (hasPick && !s.tlRevealed) {
      html += `<button class="reveal-btn" data-action="tl-reveal${A}">Ya lo pense — revelar el overlay modelo</button>`;
    } else if (hasPick && s.tlRevealed) {
      html += `
        <div class="tl-model">
          <div class="tl-model-row"><span class="tl-model-k">Test vs. control</span><span class="tl-model-v">${escapeHtml(tl.control)}</span></div>
          <div class="tl-model-row"><span class="tl-model-k">Lift incremental</span><span class="tl-model-v">${escapeHtml(tl.incremental)}</span></div>
          <div class="tl-model-row"><span class="tl-model-k">Confound</span><span class="tl-model-v">${escapeHtml(bestOpt.t)}</span></div>
          <div class="tl-model-row"><span class="tl-model-k">Gate estadistico</span><span class="tl-model-v">${escapeHtml(tl.gateStat)}</span></div>
          <div class="tl-model-row"><span class="tl-model-k">Gate economico</span><span class="tl-model-v">${escapeHtml(tl.gateEcon)}</span></div>
          <div class="tl-model-row"><span class="tl-model-k">Pilot + guardrail</span><span class="tl-model-v">${escapeHtml(tl.pilot)}</span></div>
        </div>
        ${renderTLGrade(isLive)}`;
    }
    html += `</div>`;
    return html;
  }

  function renderScoreCard(c, s) {
    const score = computeCaseScore(c, s);
    const pct = score.total / score.max;
    let tier, verdict, coach;
    if (pct >= 0.85) {
      tier = 'tier-strong';
      verdict = 'Razonamiento MBB-ready en este caso';
      coach = 'Tipo de caso correcto, preguntas correctas, mejor hipótesis comprometida. Así se ve un desempeño de primera ronda — sigue entrenando el patrón en distintas familias de casos.';
    } else if (pct >= 0.60) {
      tier = 'tier-solid';
      verdict = 'Sólido — con espacio para afinar';
      coach = 'Los fundamentos están. Mira qué paso te costó puntos — esa es tu área de foco la próxima sesión. Un paso débil por caso es normal al practicar; tres es una alerta.';
    } else if (pct >= 0.35) {
      tier = 'tier-solid';
      verdict = 'Oportunidad real de aprender aquí';
      coach = 'Algo core está mal — probablemente el diagnóstico o la hipótesis. Vuelve a recorrer los caminos de falla escritos para las opciones débiles. Ahí vive el razonamiento real de nivel MBB.';
    } else {
      tier = 'tier-weak';
      verdict = 'Trabaja este caso de nuevo';
      coach = 'La mayoría de los pasos salieron mal. No te flageles — pero tampoco sigas de largo. Relee el prompt, reabre este caso mañana sin tocar nada, y ve si el patrón queda más claro en la segunda pasada.';
    }
    return `
      <div class="score-card">
        <div class="score-banner ${tier}">
          <div class="score-number">${score.total}<span style="font-size:22px;opacity:0.5">/${score.max}</span></div>
          <div class="score-total">Score de desempeño del caso</div>
          <div class="score-verdict">${verdict}</div>
          <div class="score-coach">${coach}</div>
        </div>
        <div class="score-breakdown">
          <div class="score-row">
            <div class="score-row-label">Diagnóstico</div>
            <div class="score-row-choice ${score.diagnose.color}">${score.diagnose.label}</div>
            <div class="score-row-points">${score.diagnose.pts}/3</div>
          </div>
          <div class="score-row">
            <div class="score-row-label">Preguntas aclaratorias</div>
            <div class="score-row-choice ${score.clarifying.color}">${score.clarifying.label}</div>
            <div class="score-row-points">${score.clarifying.pts}/4</div>
          </div>
          <div class="score-row">
            <div class="score-row-label">Hipótesis</div>
            <div class="score-row-choice ${score.hypothesis.color}">${score.hypothesis.label}</div>
            <div class="score-row-points">${score.hypothesis.pts}/4</div>
          </div>
          <div class="score-row">
            <div class="score-row-label">Síntesis</div>
            <div class="score-row-choice ${score.synthesis.color}">${score.synthesis.label}</div>
            <div class="score-row-points">${score.synthesis.pts}/6</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderFeedbackBlock(opt, stepLabel, extraContext) {
    const strengthLabel = opt.strength === 'strong' ? 'Fuerte' : opt.strength === 'partial' ? 'Parcial' : 'Débil';
    const isTopPick = extraContext && extraContext.isTopPick;
    const isSecondary = extraContext && extraContext.isSecondary;
    const bestOption = extraContext && extraContext.bestOption;
    return `
      <div class="feedback-block show ${opt.strength}">
        <div class="feedback-title">
          ${stepLabel} · ${strengthLabel}${isTopPick ? '<span class="top-pick-badge">Mejor opción</span>' : ''}
        </div>
        <div class="feedback-body">${escapeHtml(opt.feedback)}</div>
        ${isSecondary && bestOption ? `
          <div class="secondary-note">
            <div class="secondary-note-label">Pero la mejor opción era ≠ esta</div>
            <strong>Hipótesis más fuerte para este caso:</strong> "${escapeHtml(bestOption.text)}"<br/><br/>
            La tuya es defendible — un candidato senior podría sostener ambas en paralelo. Pero si te obligan a comprometerte con UNA antes de los datos, la de arriba es la que los datos de este caso van a probar. La disciplina es identificar cuál de dos hipótesis plausibles es más probable que confirmen los datos del entrevistador.
          </div>
        ` : ''}
        ${opt.failurePath ? `
          <div class="failure-path">
            <div class="failure-path-label">Camino de falla — a dónde lleva esta hipótesis</div>
            ${escapeHtml(opt.failurePath)}
          </div>
        ` : ''}
        <button class="reveal-btn" data-action="advance-after-feedback" style="margin-top:12px">Continuar</button>
      </div>
    `;
  }

  function renderFeedbackBlockStatic(opt, stepLabel, extraContext) {
    const strengthLabel = opt.strength === 'strong' ? 'Fuerte' : opt.strength === 'partial' ? 'Parcial' : 'Débil';
    const isTopPick = extraContext && extraContext.isTopPick;
    const isSecondary = extraContext && extraContext.isSecondary;
    const bestOption = extraContext && extraContext.bestOption;
    return `
      <div class="feedback-block show ${opt.strength}" style="margin-bottom:var(--sp-5)">
        <div class="feedback-title">
          ${stepLabel} · ${strengthLabel}${isTopPick ? '<span class="top-pick-badge">Mejor opción</span>' : ''}
        </div>
        <div class="feedback-body">${escapeHtml(opt.feedback)}</div>
        ${isSecondary && bestOption ? `
          <div class="secondary-note">
            <div class="secondary-note-label">Pero la mejor opción era ≠ esta</div>
            <strong>Hipótesis más fuerte para este caso:</strong> "${escapeHtml(bestOption.text)}"
          </div>
        ` : ''}
        ${opt.failurePath ? `
          <div class="failure-path">
            <div class="failure-path-label">Camino de falla — a dónde lleva esta hipótesis</div>
            ${escapeHtml(opt.failurePath)}
